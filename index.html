<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM // PROD DEBUG GAME</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  overflow:hidden;
  color:#00ff9f;
}

/* MATRIX */
#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

/* TERMINAL */
#console{
  position:fixed;
  inset:0;
  background:black;
  padding:20px;
  display:flex;
  flex-direction:column;
  z-index:10;
}

#terminalHeader{opacity:0.8;margin-bottom:10px;}

#terminalLog{
  flex:1;
  overflow:auto;
  font-size:14px;
  line-height:1.4;
}

#terminalInputLine{
  display:flex;
  gap:10px;
  border-top:1px solid #00ff9f;
  padding-top:10px;
}

#cmd{
  flex:1;
  background:black;
  border:none;
  color:#00ff9f;
  outline:none;
  font-size:16px;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:20px;
  z-index:5;
}

/* TIMER + INSTRUCTION */
#timer{
  position:fixed;
  top:40px;
  left:50%;
  transform:translateX(-50%);
}

#instruction{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:14px;
  opacity:0.7;
}

/* LEVEL */
#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
}

.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}

/* FLOAT TEXT */
.float{
  position:absolute;
  font-size:14px;
  animation:up 1s forwards;
}
@keyframes up{
  to{transform:translateY(-40px);opacity:0;}
}

/* LOVE */
#loveWrap{
  position:fixed;
  top:110px;
  left:50%;
  transform:translateX(-50%);
  width:300px;
  height:16px;
  border:2px solid #ff4d4d;
  z-index:5;
}

#loveBar{
  width:50%;
  height:100%;
  background:#ff4d4d;
  transition:.3s;
}

/* BOSS */
#bossModal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.9);
  z-index:999;
  flex-direction:column;
}

/* CAKES */
.cake{
  position:absolute;
  font-size:30px;
  animation:fall linear forwards;
}
@keyframes fall{
  from{transform:translateY(-50px);}
  to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="console">
  <div id="terminalHeader">SYSTEM TERMINAL // PROD CRASH</div>

  <div id="terminalLog">
    > PROD BROKEN DETECTED<br>
    > баги = 🐀<br>
    > фичи = 🐻<br><br>
    > type: start<br>
  </div>

  <div id="terminalInputLine">
    >
    <input id="cmd" autocomplete="off">
  </div>
</div>

<div id="hud">
  <div id="left">🐻 0</div>
  <div id="right">🐀 0</div>
</div>

<div id="timer"></div>

<div id="instruction">
🐀 фиксить | 🐻 фичи | F freeze | D delete | P +5
</div>

<div id="level"></div>

<div id="loveWrap"><div id="loveBar"></div></div>

<div id="bossModal"></div>

<script>

/* MATRIX */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

const drops=Array(60).fill(1);

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";

  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?0:1,i*18,y*18);
    drops[i]=y*18>c.height?0:y+1;
  });
},50);

/* SOUND */
function sound(){
  new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg").play();
}
function legendary(){
  new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

/* STATE */
let f=0,b=0,lvl=0,run=false,love=50;
let freeze=false;
let timer=20;
let timerInterval;

const memes=[
"у меня локально работает",
"это не баг, это фича",
"перезапусти прод"
];

/* LEVELS */
const levels=[
  {name:"JUNIOR",goal:4},
  {name:"MIDDLE",goal:6},
  {name:"SENIOR",goal:8}
];

/* TERMINAL */
cmd.onkeydown=(e)=>{
  if(e.key!=="Enter") return;

  if(cmd.value==="start"){
    console.style.display="none";
    hud.style.display="flex";
    run=true;
    start();
  }

  cmd.value="";
};

function start(){
  next();
}

/* TIMER */
function startTimer(){
  timer=20;
  timerEl.innerText="⏱ "+timer;

  clearInterval(timerInterval);

  timerInterval=setInterval(()=>{
    if(!run) return;

    timer--;
    timerEl.innerText="⏱ "+timer;

    if(timer<=0){
      lvl++;
      next();
    }
  },1000);
}

/* FLOAT */
function floatText(text,x,y,color="#fff"){
  let d=document.createElement("div");
  d.className="float";
  d.innerText=text;
  d.style.left=x+"px";
  d.style.top=y+"px";
  d.style.color=color;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1000);
}

/* GAME */
function next(){

  if(lvl>=levels.length){
    boss();
    return;
  }

  startTimer();

  level.innerText="LEVEL: "+levels[lvl].name;

  setInterval(()=>{

    if(!run || freeze) return;

    let e=document.createElement("div");
    let type=Math.random()>0.5?"feature":"rat";

    e.className="entity "+type;
    e.innerText=type==="feature"?"🐻":"🐀";

    e.style.left=Math.random()*innerWidth+"px";
    e.style.top=Math.random()*innerHeight+"px";

    let clicked=false;

    e.onclick=()=>{
      clicked=true;

      sound();

      if(type==="feature"){
        f++;
        floatText("+1 FEATURE",e.offsetLeft,e.offsetTop,"#00ff9f");
      }else{
        b++;
        floatText("FIXED!",e.offsetLeft,e.offsetTop,"#ff4d4d");
      }

      if(Math.random()>0.6){
        floatText(memes[Math.floor(Math.random()*memes.length)],e.offsetLeft,e.offsetTop);
      }

      update();

      if(f>=levels[lvl].goal){
        lvl++;
        next();
      }

      e.remove();
    };

    setTimeout(()=>{
      if(!clicked && type==="rat"){
        b++;
        update();
        floatText("BUG ESCAPED!",e.offsetLeft,e.offsetTop,"#ff0000");
      }
      e.remove();
    },2000);

    document.body.appendChild(e);

  },600);
}

function update(){
  left.innerText="🐻 "+f;
  right.innerText="🐀 "+b;
}

/* ABILITIES */
document.addEventListener("keydown",(e)=>{
  if(!run) return;

  if(e.key==="f"){
    freeze=true;
    floatText("FREEZE!",innerWidth/2,100);
    setTimeout(()=>freeze=false,3000);
  }

  if(e.key==="d"){
    document.querySelectorAll(".rat").forEach(r=>r.remove());
    floatText("ALL BUGS DELETED",innerWidth/2,150);
  }

  if(e.key==="p"){
    f+=5;
    update();
    floatText("+5 FEATURES",innerWidth/2,200,"#00ff9f");
  }
});

/* BOSS */
function boss(){
  end();
}

/* END */
function end(){

  bossModal.style.display="block";

  bossModal.innerHTML=`
    <div style="
      position:fixed;
      inset:0;
      background:black;
      overflow:hidden;
    ">
      <div style="
        position:absolute;
        top:40%;
        left:50%;
        transform:translateX(-50%);
        font-size:40px;
        color:#ff4d4d;
        text-align:center;
      ">
        🎉 АРТЕМ ПОЧИНИЛ ПРОД 🎉<br>
        С ДНЁМ РОЖДЕНИЯ!!!
      </div>
    </div>
  `;

  for(let i=0;i<30;i++){
    let c=document.createElement("div");
    c.className="cake";
    c.innerText="🎂";
    c.style.left=Math.random()*100+"%";
    c.style.animationDuration=(Math.random()*3+2)+"s";
    bossModal.appendChild(c);
  }

  legendary();
}

const timerEl=document.getElementById("timer");

</script>
</body>
</html>
