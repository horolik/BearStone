<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM // PROD DEBUG GAME</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  overflow:hidden;
  color:#00ff9f;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:28px;
  z-index:9999;
  text-align:center;
}

/* MATRIX */
#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

/* TERMINAL */
#console{
  position:fixed;
  inset:0;
  background:black;
  padding:20px;
  display:flex;
  flex-direction:column;
  z-index:10;
}

#terminalHeader{opacity:0.8;margin-bottom:10px;}

#terminalLog{
  flex:1;
  overflow:auto;
  font-size:14px;
  line-height:1.4;
}

#terminalInputLine{
  display:flex;
  gap:10px;
  border-top:1px solid #00ff9f;
  padding-top:10px;
}

#cmd{
  flex:1;
  background:black;
  border:none;
  color:#00ff9f;
  outline:none;
  font-size:16px;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:20px;
  z-index:5;
}

/* LEVEL */
#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  z-index:5;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
}

.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}
.joker{color:gold;font-size:80px;}

/* LOVE */
#loveWrap{
  position:fixed;
  top:110px;
  left:50%;
  transform:translateX(-50%);
  width:300px;
  height:16px;
  border:2px solid #ff4d4d;
  z-index:5;
}

#loveBar{
  width:50%;
  height:100%;
  background:#ff4d4d;
  transition:.3s;
}

/* STATS */
#stats{
  position:fixed;
  top:150px;
  left:20px;
  color:white;
  font-size:14px;
  z-index:5;
}

/* HAND */
#hand{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  height:200px;
  z-index:1000;
}

.card{
  width:140px;
  height:120px;
  background:#111;
  border:2px solid #00ff9f;
  border-radius:10px;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  margin:5px;
}

/* OLGA */
#olgaEmotion{
  font-size:22px;
  margin-bottom:10px;
}

#bossModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

#bossBox{
  width:420px;
  background:#111;
  border:2px solid red;
  padding:20px;
  text-align:center;
  color:white;
}

</style>
</head>

<body>

<div id="intro">
🚨 PROD УПАЛ<br>
SUPER ARTEEM СПАСАЕТ<br><br>
нажми любую клавишу
</div>

<canvas id="matrix"></canvas>

<div id="console">
  <div id="terminalHeader">SYSTEM TERMINAL</div>
  <div id="terminalLog">> start</div>
  <div id="terminalInputLine">
    ><input id="cmd">
  </div>
</div>

<div id="hud">
  <div id="left">🐻 0</div>
  <div id="right">🐀 0</div>
</div>

<div id="level"></div>

<div id="loveWrap"><div id="loveBar"></div></div>

<div id="stats">
HP: <span id="hp">100</span> |
HAPPY: <span id="happy">0</span>
</div>

<div id="hand"></div>

<div id="bossModal">
  <div id="bossBox">
    <div id="olgaEmotion">😐 Ольга смотрит...</div>
    <div id="olgaQ"></div>
    <div id="answers"></div>
  </div>
</div>

<script>

/* INTRO */
document.addEventListener("keydown",()=>{
  document.getElementById("intro").style.display="none";
});

/* MATRIX */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";
  ctx.fillText(Math.random()>0.5?0:1,Math.random()*c.width,Math.random()*c.height);
},50);

/* STATE */
let f=0,b=0,lvl=0,run=false;
let hp=100;
let happy=0;
let bossHP=100;
let olgaMood="neutral";

/* LEVELS */
const levels=[
  {name:"JUNIOR",goal:4},
  {name:"MIDDLE",goal:6},
  {name:"SENIOR",goal:8}
];

/* CMD */
const cmd=document.getElementById("cmd");
const log=document.getElementById("terminalLog");

cmd.onkeydown=(e)=>{
if(e.key!=="Enter") return;

if(cmd.value==="start"){
  run=true;
  document.getElementById("console").style.display="none";
  document.getElementById("hud").style.display="flex";
  next();
}

cmd.value="";
};

/* GAME */
function next(){

if(lvl>=levels.length){
  boss();
  return;
}

document.getElementById("level").innerText="LEVEL: "+levels[lvl].name;

setInterval(()=>{

if(!run) return;

let e=document.createElement("div");
let r=Math.random();
let type="feature";

if(r<0.4) type="rat";
if(r>0.85) type="joker";

e.className="entity "+type;
e.innerText=type==="rat"?"🐀":type==="joker"?"🃏":"🐻";

e.style.left=Math.random()*innerWidth+"px";
e.style.top=Math.random()*innerHeight+"px";

e.onclick=()=>{

if(type==="rat") b++;
if(type==="feature") f++;

if(type==="joker"){
  hp+=100;
  happy+=100;
  updateStats();
}

update();
e.remove();

if(f>=levels[lvl].goal){
  lvl++;
  next();
}

};

document.body.appendChild(e);
setTimeout(()=>e.remove(),2000);

},600);
}

function update(){
document.getElementById("left").innerText="🐻 "+f;
document.getElementById("right").innerText="🐀 "+b;
}

function updateStats(){
document.getElementById("hp").innerText=hp;
document.getElementById("happy").innerText=happy;
}

/* ===== OLGA EMOTIONS ===== */
function setOlgaMood(){

let el=document.getElementById("olgaEmotion");

if(bossHP < 30){
  olgaMood="panic";
  el.innerText="😱 Ольга паникует!";
}
else if(hp < 40){
  olgaMood="angry";
  el.innerText="😡 Ольга злится!";
}
else if(bossHP > 80){
  olgaMood="happy";
  el.innerText="😊 Ольга довольна!";
}
else{
  olgaMood="neutral";
  el.innerText="😐 Ольга смотрит...";
}

}

/* ===== BOSS CARD DUEL ===== */
const questions=[
"Ты меня любишь?",
"Почему всё ломается?",
"Это баг или фича?"
];

const answers=[
{t:"Это фича",d:10},
{t:"Я проверил локально",d:7},
{t:"перезапусти прод",d:5}
];

function boss(){

document.getElementById("bossModal").style.display="flex";

nextRound();

}

function nextRound(){

if(hp<=0 || bossHP<=0){
  end();
  return;
}

setOlgaMood();

document.getElementById("olgaQ").innerText=
"🐀 Ольга: "+questions[Math.floor(Math.random()*questions.length)];

let box=document.getElementById("answers");
box.innerHTML="";

answers.forEach(a=>{

let c=document.createElement("div");
c.className="card";
c.innerText=a.t;

c.onclick=()=>{

bossHP -= a.d;
hp -= Math.floor(Math.random()*8);

updateStats();

nextRound();

};

box.appendChild(c);

});

}

/* END */
function end(){

document.getElementById("bossBox").innerHTML=
"🎉 БОСС ПОБЕЖДЁН 🎉";

for(let i=0;i<30;i++){
let c=document.createElement("div");
c.innerText="🍰";
c.style.position="absolute";
c.style.left=Math.random()*100+"%";
c.style.top=Math.random()*100+"%";
document.body.appendChild(c);
}

}

</script>
</body>
</html>
