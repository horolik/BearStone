<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🐻 BearStone</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #0b0f14, #000);
  color: #00ff9f;
  font-family: monospace;
  overflow: hidden;
}

/* ================= SCREENS ================= */
.screen {
  display: none;
  position: absolute;
  width: 100%;
  height: 100%;
}
.active { display: block; }

/* ================= TUTORIAL ================= */
#tutorial {
  padding: 30px;
}

/* ================= BUG HUNT ================= */
.bug {
  position: absolute;
  font-size: 28px;
  cursor: pointer;
  animation: float 1s infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

/* ================= GAME ================= */
#board {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

.hero {
  width: 200px;
  border: 2px solid #00ff9f;
  padding: 10px;
  border-radius: 10px;
}

/* ================= HAND (HEARTHSTONE STYLE) ================= */
#hand {
  position: fixed;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
}

.card {
  width: 120px;
  height: 160px;
  border: 1px solid #00ff9f;
  margin: 5px;
  padding: 10px;
  cursor: pointer;
  transition: 0.2s;
  background: rgba(0,255,159,0.05);
}

.card:hover {
  transform: translateY(-30px) scale(1.1);
  border-color: white;
}

/* ================= BOSS HIT ================= */
.hit {
  box-shadow: 0 0 20px red;
  transform: scale(1.05);
}
</style>
</head>

<body>

<!-- ================= 1. TUTORIAL ================= -->
<div id="tutorial" class="screen active">
  <h1>🐻 BearStone</h1>

  <h3>Инструкция:</h3>

  <ul>
    <li>🐻 Сначала ловишь баги (кликаешь)</li>
    <li>🎯 Нужно 5 очков debug points</li>
    <li>🃏 Потом открываются карты</li>
    <li>💀 Босс — Toxic PM</li>
    <li>🔥 Комбо: DEV + DEV + DEV</li>
  </ul>

  <button onclick="startBugHunt()">START DEBUG MODE</button>
</div>

<!-- ================= 2. BUG HUNT ================= -->
<div id="bugScreen" class="screen"></div>

<!-- ================= 3. GAME ================= -->
<div id="game" class="screen">

  <div id="board">
    <div class="hero">
      <h3>Artem</h3>
      HP: <span id="hp">20</span><br>
      Mana: <span id="mana">1</span>
    </div>

    <div class="hero" id="boss">
      <h3>Toxic PM</h3>
      HP: <span id="bhp">40</span>
    </div>
  </div>

  <div id="hand"></div>

  <button onclick="endTurn()">End Turn</button>
</div>

<script>
/* ================= STATE ================= */
const Game = {
  hp: 20,
  mana: 1,
  bossHp: 40,
  bugs: 0
};

/* ================= SCREENS ================= */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ================= 1. BUG HUNT ================= */
function startBugHunt(){
  show("bugScreen");

  const screen = document.getElementById("bugScreen");

  let interval = setInterval(()=>{

    const bug = document.createElement("div");
    bug.className = "bug";
    bug.innerText = "🐻";
    bug.style.left = Math.random()*window.innerWidth + "px";
    bug.style.top = Math.random()*window.innerHeight + "px";

    bug.onclick = ()=>{
      Game.bugs++;
      bug.remove();

      if(Game.bugs >= 5){
        clearInterval(interval);
        startGame();
      }
    };

    screen.appendChild(bug);

    setTimeout(()=>bug.remove(), 1500);

  }, 500);
}

/* ================= 2. CARDS ================= */
const Cards = [
  {
    name:"Bug Fix",
    cost:1,
    type:"DEV",
    play(){ Game.bossHp -= 2; }
  },
  {
    name:"Hotfix",
    cost:2,
    type:"DEV",
    play(){ Game.bossHp -= 4; }
  },
  {
    name:"Shield",
    cost:2,
    type:"INFRA",
    play(){ Game.hp += 3; }
  }
];

/* ================= COMBO ================= */
let history = [];

function combo(type){
  history.push(type);
  if(history.length > 3) history.shift();

  if(history.join("+") === "DEV+DEV+DEV"){
    Game.bossHp -= 5;
  }
}

/* ================= 3. GAME ================= */
function startGame(){
  show("game");
  render();
  update();
}

const hand = document.getElementById("hand");

function render(){
  hand.innerHTML = "";

  Cards.forEach((c,i)=>{
    const el = document.createElement("div");
    el.className = "card";
    el.innerHTML = `<b>${c.name}</b><br>cost:${c.cost}`;

    el.onclick = ()=>{
      if(Game.mana < c.cost) return;

      Game.mana -= c.cost;
      c.play();
      combo(c.type);
      update();
    };

    hand.appendChild(el);
  });
}

/* ================= TURN ================= */
function endTurn(){
  Game.mana++;
  Game.bossHp -= 2;

  update();

  if(Game.bossHp <= 0){
    document.body.innerHTML = "<h1>🐻 YOU WIN BEARSTONE</h1>";
  }
}

/* ================= UI ================= */
function update(){
  document.getElementById("hp").innerText = Game.hp;
  document.getElementById("mana").innerText = Game.mana;
  document.getElementById("bhp").innerText = Game.bossHp;
}
</script>

</body>
</html>
