<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEM</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  overflow:hidden;
  color:#00ff9f;
}

canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

#start{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:22px;
  background:black;
  z-index:1000;
}

#terminal{
  background:black;
  border:1px solid #00ff9f;
  padding:20px;
  width:300px;
}

#input{
  background:black;
  border:none;
  color:#00ff9f;
  outline:none;
  width:100%;
  font-family:monospace;
}

#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  z-index:2;
}

#level{
  position:fixed;
  top:40px;
  width:100%;
  text-align:center;
  z-index:2;
}

#stats{
  position:fixed;
  top:80px;
  left:20px;
  color:white;
  z-index:2;
}

/* BIG GUIDE BOTTOM LEFT */
#guide{
  position:fixed;
  bottom:20px;
  left:20px;
  max-width:420px;
  border:1px solid #00ff9f;
  padding:15px;
  background:rgba(0,0,0,0.6);
  z-index:2;
  font-size:16px;
  line-height:1.4;
}

.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
  z-index:2;
}

.rat{color:red;}
.feature{color:#00ff9f;}

.kalyan{
  width:120px;
  height:120px;
  object-fit:contain;
}

#boss{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:3;
  color:#00ff9f;
}

#boss-ui{
  margin-bottom:20px;
  text-align:center;
  min-height:40px;
}

#answers{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  max-width:600px;
}

.answer{
  border:1px solid #00ff9f;
  padding:10px 15px;
  cursor:pointer;
  background:rgba(0,0,0,0.4);
  color:#00ff9f;
  transition:0.2s;
}

.answer:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px #00ff9f;
}

/* LEVEL OVERLAY */
#levelTable{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:rgba(0,0,0,0.9);
  z-index:9998;
  color:#00ff9f;
  font-size:28px;
  text-align:center;
}

/* PRE SUPER MESSAGE */
#supermsg{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:black;
  z-index:9999;
  font-size:28px;
  text-align:center;
}

.flame{
  font-size:90px;
  animation:burn 0.3s infinite alternate;
}

@keyframes burn{
  from{transform:scale(1);filter:brightness(1)}
  to{transform:scale(1.2);filter:brightness(2)}
}

#final{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:black;
  z-index:10000;
  color:#ff4dff;
  font-size:30px;
  text-align:center;
}

.heart{
  font-size:120px;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.3)}
  100%{transform:scale(1)}
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="start">
  <div id="terminal">
    > 🐀 ALARM! PROD сломался<br><br>
    > <input id="input" placeholder="start">
  </div>
</div>

<div id="hud">
  <div id="f">🐻 0</div>
  <div id="r">🐀 0</div>
</div>

<div id="level"></div>
<div id="stats">FIX: <span id="fix">30</span>% | HAPPY: <span id="happy">0</span></div>

<div id="guide">
🐀 баги: +2 FIX, -1 HAPPY<br>
🐻 фичи: +3 FIX, +1 HAPPY<br>
💨 кальян: -3 FIX, +5 HAPPY<br>
🎯 50% → БОСС ОЛЬГА
</div>

<div id="boss">
  <img src="Olga.JPG" style="width:200px;border-radius:12px;box-shadow:0 0 20px #ff4dff;margin-bottom:10px;">
  <div id="boss-ui"></div>
  <div id="answers"></div>
</div>

<div id="levelTable"></div>

<div id="supermsg">
  <div>🔥 PROD ПОЧИНЕН</div>
  <div style="margin-top:10px">НО СНОВА ЧТО-ТО СЛОМАЛОСЬ...</div>
  <div class="flame">🔥🔥🔥🔥🔥</div>
</div>

<div id="final">
  <div class="heart">❤️</div>
  <div>С ДНЁМ РОЖДЕНИЯ!</div>
  <div style="margin-top:10px">PROD СТАБИЛЬНО РАБОТАЕТ 🎉</div>
</div>

<script>

let c=document.getElementById("matrix");
let ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let letters="01".split("");
let fontSize=14;
let columns=c.width/fontSize;
let drops=[];
for(let i=0;i<columns;i++) drops[i]=1;

function drawMatrix(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle="#00ff9f";
  ctx.font=fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){
    let text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize>c.height && Math.random()>0.975)
      drops[i]=0;

    drops[i]++;
  }
}
setInterval(drawMatrix,33);

let run=false;
let f=0,r=0;
let fix=30;
let happy=0;
let lvl=0;
let seniorMode=false;
let prevLvl=0;
let superShown=false;

const levels=["JUNIOR","MIDDLE","SENIOR"];

function showLevelTable(l){
  let t=document.getElementById("levelTable");
  t.innerHTML="LEVEL UP → "+levels[l];
  t.style.display="flex";
  setTimeout(()=>t.style.display="none",1500);
}

function update(){
  document.getElementById("f").innerText="🐻 "+f;
  document.getElementById("r").innerText="🐀 "+r;
  document.getElementById("fix").innerText=fix;
  document.getElementById("happy").innerText=happy;

  if(fix > 50) lvl = 2;
  else if(fix > 30) lvl = 1;
  else lvl = 0;

  if(lvl !== prevLvl){
    showLevelTable(lvl);
    prevLvl = lvl;
  }

  document.getElementById("level").innerText="LEVEL: "+levels[lvl];

  if(fix > 50 && !superShown){
    superShown = true;
    document.getElementById("supermsg").style.display="flex";

    setTimeout(()=>{
      document.getElementById("supermsg").style.display="none";
      startSeniorMode();
    },3000);
  }

}

function loop(){
  setInterval(()=>{

    if(fix<=0){
      document.body.innerHTML="<h1 style='color:red;text-align:center;margin-top:20%'>PROD УПАЛ</h1>";
      return;
    }

    let rand=Math.random();
    let type="feature";
    if(rand<0.4) type="rat";
    if(rand>0.75) type="fun";

    if(type!=="fun"){
      let e=document.createElement("div");
      e.className="entity "+type;
      e.innerText=type==="rat"?"🐀":"🐻";
      e.style.left=Math.random()*window.innerWidth+"px";
      e.style.top=Math.random()*window.innerHeight+"px";

      e.onclick=()=>{
        if(type==="rat"){r++;fix+=2;happy-=1;}
        if(type==="feature"){f++;fix+=3;happy+=1;}
        update();
      };

      document.body.appendChild(e);
      setTimeout(()=>e.remove(),1500);
    }

    if(type==="fun"){
      let img=document.createElement("img");
      img.src="Kalyan.PNG";
      img.className="entity kalyan";
      img.style.left=Math.random()*window.innerWidth+"px";
      img.style.top=Math.random()*window.innerHeight+"px";

      img.onclick=()=>{
        happy+=5;
        fix-=3;
        update();
        img.remove();
      };

      document.body.appendChild(img);
      setTimeout(()=>img.remove(),1500);
    }

    update();

  },500);
}

function startSeniorMode(){
  document.body.style.filter="hue-rotate(120deg) saturate(2)";

  let chaos=setInterval(()=>{
    let d=document.createElement("div");
    d.innerText=["💥 BUG","🔥 HOTFIX","💣 PROD"][Math.floor(Math.random()*3)];
    d.style.position="absolute";
    d.style.left=Math.random()*window.innerWidth+"px";
    d.style.top=Math.random()*window.innerHeight+"px";
    d.style.color="red";
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),1200);
  },300);

  setTimeout(()=>{
    clearInterval(chaos);
    document.body.style.filter="none";

    let pb=document.getElementById("preboss");
    if(pb){ pb.remove(); }

    showBoss();

  },8000);
}

function showBoss(){
  let b=document.getElementById("boss");
  let ui=document.getElementById("boss-ui");
  let answers=document.getElementById("answers");

  b.style.display="flex";

  let questions=[
    "Ты меня любишь?",
    "Ты будешь меня любить, если я буду червем?",
    "А если я баг?",
    "А если я удалю прод?",
    "Кто лучшая Мишка в мире?"
  ];

  let q=0;

  function next(){
    answers.innerHTML="";
    ui.innerText="😈 ОЛЬГА: "+questions[q];

    let opts=["ДА","ФИЧА","ЛЮБЛЮ","OK","Я АРТЕМ"];

    opts.forEach(t=>{
      let btn=document.createElement("div");
      btn.className="answer";
      btn.innerText=t;

      btn.onclick=()=>{
        q++;
        if(q>=questions.length){
          ui.innerText="🎉 ОЛЬГА ПОБЕЖДЕНА 🎉";
          answers.innerHTML="";

          setTimeout(()=>{
            document.getElementById("boss").style.display="none";
            document.getElementById("final").style.display="flex";
          },1500);

          return;
        }
        next();
      };

      answers.appendChild(btn);
    });
  }

  next();
}

update();

document.getElementById("input").addEventListener("keydown",(e)=>{
  if(e.key==="Enter" && e.target.value.toLowerCase()==="start"){
    document.getElementById("start").style.display="none";
    document.getElementById("hud").style.display="flex";
    run=true;
    loop();
  }
});

</script>

</body>
</html>
