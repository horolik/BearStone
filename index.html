```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Bear Debug x Hearthstone 🔥</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

/* CONSOLE */
#console{
  position:fixed;
  inset:0;
  padding:20px;
}

input{
  background:black;
  border:none;
  color:#00ff9f;
  font-family:monospace;
  font-size:18px;
  outline:none;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
}

/* GAME */
.entity{
  position:absolute;
  font-size:42px;
  cursor:pointer;
}

.feature{ color:#00ff9f; }
.rat{ color:#ff4d4d; }

/* COMBO */
#combo{
  position:fixed;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  color:yellow;
}

/* LEGEND */
#legend{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
  color:orange;
}

/* VICTORY */
#victory{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:40px;
}
</style>
</head>

<body>

<div id="console">
> Введите команду:<br><br>
<input id="cmd" autofocus>
<div id="out"></div>
</div>

<div id="hud">
  <div id="left"></div>
  <div id="timer"></div>
  <div id="right"></div>
</div>

<div id="combo"></div>
<div id="legend">💨 ЛЕГЕНДАРНЫЙ КАЛЬЯН</div>
<div id="victory"></div>

<script>

/* SOUND */
const clickSound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");

/* STATE */
let phase = "console";
let level = 0;
let time = 0;
let running = false;

let features=0, bugs=0;
let artem=0, olga=0;

let combo=0, lastClick=0;

const levels = [
  {name:"junior", goal:4, time:25},
  {name:"middle", goal:6, time:20},
  {name:"senior", goal:8, time:18}
];

const entities=[];

/* CONSOLE */
cmd.onkeydown = (e)=>{
  if(e.key==="Enter"){
    const val = cmd.value.trim().toLowerCase();
    out.innerHTML += "<br>> "+val;

    if(val==="старт"){
      startDebug();
      console.style.display="none";
      hud.style.display="flex";
    }else{
      out.innerHTML += "<br>неизвестная команда";
    }

    cmd.value="";
  }
};

/* DEBUG PHASE */
function startDebug(){
  phase="debug";
  level=0;
  nextLevel();
}

function nextLevel(){
  if(level>=levels.length){
    startBattle();
    return;
  }

  const l = levels[level];
  features=0;
  bugs=0;
  time=l.time;
  running=true;

  left.innerText="🐻 "+features+" / "+l.goal;
  right.innerText="🐀 "+bugs;
  timer.innerText="⏳ "+time;

  spawnLoop();
  timerLoop(l);
}

/* SPAWN DEBUG */
function spawnLoop(){
  const int = setInterval(()=>{
    if(!running) return clearInterval(int);

    if(entities.length>10) return;

    const el=document.createElement("div");
    const good = Math.random()>0.4;

    el.className="entity "+(good?"feature":"rat");
    el.innerText=good?"🐻":"🐀";

    el.style.left=Math.random()*innerWidth+"px";
    el.style.top=Math.random()*innerHeight+"px";

    el.onclick=()=>{
      clickSound.play();

      if(good) features++;
      else bugs++;

      left.innerText="🐻 "+features;
      right.innerText="🐀 "+bugs;

      el.remove();
    };

    document.body.appendChild(el);
    entities.push(el);

    setTimeout(()=>{
      el.remove();
    },2000);

  },600);
}

/* TIMER DEBUG */
function timerLoop(l){
  const t = setInterval(()=>{
    if(!running) return clearInterval(t);

    time--;
    timer.innerText="⏳ "+time;

    if(features>=l.goal){
      running=false;
      level++;
      nextLevel();
    }

    if(time<=0){
      running=false;
      gameOver("💀 BUGS WIN");
    }

  },1000);
}

/* BATTLE */
function startBattle(){
  phase="battle";
  artem=0;
  olga=0;
  time=30;
  running=true;

  spawnBattle();
  timerBattle();
}

/* SPAWN BATTLE */
function spawnBattle(){
  const int=setInterval(()=>{
    if(!running) return clearInterval(int);

    const el=document.createElement("div");
    const good=Math.random()>0.5;

    el.className="entity";
    el.innerText=good?"❓":"🥖";

    el.style.left=Math.random()*innerWidth+"px";
    el.style.top=Math.random()*innerHeight+"px";

    el.onclick=()=>{
      clickSound.play();

      const now=Date.now();
      combo = (now-lastClick<800)?combo+1:1;
      lastClick=now;

      comboEl.innerText=combo>1?"⚡ x"+combo:"";

      const dmg = combo>=3?2:1;

      if(good) artem+=dmg;
      else olga+=dmg;

      left.innerText="🧑 "+artem;
      right.innerText="👩 "+olga;

      el.remove();
    };

    document.body.appendChild(el);

  },500);
}

/* TIMER BATTLE */
function timerBattle(){
  const t=setInterval(()=>{
    if(!running) return clearInterval(t);

    time--;
    timer.innerText="⏳ "+time;

    if(time<=0){
      running=false;
      finish();
    }

  },1000);
}

/* FINISH */
function finish(){
  victory.style.display="flex";

  if(artem>olga){
    victory.innerHTML="🏆 АРТЕМ WIN<br>💨 Кальян решает";
  }else{
    victory.innerHTML="💀 ОЛЬГА WIN<br>🥖 Булка больно";
  }
}

/* GAME OVER */
function gameOver(msg){
  victory.style.display="flex";
  victory.innerText=msg;
}

</script>

</body>
</html>
