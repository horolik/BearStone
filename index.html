```html id="full_game_final"
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Artem Debug → Hearthstone Olga</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

/* MATRIX */
#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

/* CONSOLE */
#console{
  position:fixed;
  inset:0;
  padding:20px;
  z-index:2;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:20px;
  z-index:5;
}

/* LEVEL */
#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  z-index:5;
}

#info{
  position:fixed;
  bottom:10px;
  left:20px;
  z-index:5;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:64px;
  cursor:pointer;
  transition:.3s;
}

.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}
.super{filter:drop-shadow(0 0 10px red);}

/* ===== BOSS ===== */
#boss{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:240px;
  background:#111;
  border-top:2px solid #ff4d4d;
  display:none;
  align-items:center;
  padding:10px;
  z-index:10;
}

#boss img{
  width:120px;
  height:120px;
  border-radius:50%;
  margin-right:20px;
}

/* CARDS */
.card{
  position:absolute;
  width:200px;
  padding:10px;
  background:#111;
  border:2px solid gold;
  border-radius:12px;
  color:white;
  text-align:center;
  animation:fly .4s ease-out;
}

@keyframes fly{
  from{transform:translateY(200px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* LOVE */
#loveWrap{
  position:fixed;
  top:110px;
  left:50%;
  transform:translateX(-50%);
  width:300px;
  height:18px;
  border:2px solid #ff4d4d;
  z-index:6;
}

#loveBar{
  height:100%;
  width:50%;
  background:#ff4d4d;
  transition:.3s;
}

/* LEGEND */
#legend{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
  color:orange;
}

/* VICTORY */
#victory{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- CONSOLE -->
<div id="console">
> SYSTEM FAILURE 🐀<br>
> баг в проде обнаружен<br><br>

> 🐻 фичи → вправо<br>
> 🐀 баги → влево<br>
> 🔥 супер-крыса = -2<br><br>

> Введите: start / старт<br>
<input id="cmd" autofocus>
<div id="out"></div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="left">🐻 0</div>
  <div id="timer">⏳ 0</div>
  <div id="right">🐀 0</div>
</div>

<div id="level"></div>
<div id="info"></div>

<!-- LOVE -->
<div id="loveWrap">
  <div id="loveBar"></div>
</div>

<!-- BOSS -->
<div id="boss">
  <img src="https://i.imgur.com/8QfQ2dZ.png">
  <div id="bossText">👩 Ольга: вопросик...</div>
</div>

<div id="legend">💨 LEGENDARY!</div>
<div id="victory"></div>

<script>

/* ===== MATRIX ===== */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

const drops=Array(80).fill(1);

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";

  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?0:1,i*16,y*16);
    drops[i]=y*16>c.height?0:y+1;
  });
},50);

/* ===== STATE ===== */
let f=0,b=0,t=0;
let lvl=0;
let run=false;
let love=50;

/* ===== LEVELS ===== */
const levels=[
  {name:"JUNIOR",time:15,goal:4},
  {name:"MIDDLE",time:20,goal:6},
  {name:"SENIOR",time:25,goal:8}
];

/* ===== INPUT FIX ===== */
cmd.addEventListener("keydown",(e)=>{
  if(e.key!=="Enter") return;

  const v=cmd.value.trim().toLowerCase();

  out.innerHTML+="<br>> "+v;

  if(v==="start"||v==="старт"){
    start();
  }else{
    out.innerHTML+="<br>start / старт";
  }

  cmd.value="";
});

/* ===== START ===== */
function start(){
  console.style.display="none";
  hud.style.display="flex";
  nextLevel();
}

/* ===== LEVEL FLOW ===== */
function nextLevel(){

  if(lvl>=levels.length){
    startBoss();
    return;
  }

  let L=levels[lvl];

  f=0;b=0;t=L.time;
  run=true;

  level.innerText="LEVEL: "+L.name;
  info.innerText="🐻 вправо / 🐀 влево";

  spawn();
  timer(L);
}

/* ===== SPAWN ===== */
function spawn(){
  setInterval(()=>{
    if(!run) return;

    let el=document.createElement("div");
    let r=Math.random();

    let type =
      r<0.1?"super":
      r<0.5?"rat":"feature";

    el.className="entity "+type;

    el.innerText =
      type==="feature"?"🐻":
      type==="rat"?"🐀":"🐀🔥";

    el.style.left=Math.random()*innerWidth+"px";
    el.style.top=Math.random()*innerHeight+"px";

    el.onclick=()=>{

      if(type==="feature") f++;
      else if(type==="rat") b++;
      else b+=2;

      el.style.opacity=0;
      setTimeout(()=>el.remove(),300);

      update();
    };

    document.body.appendChild(el);

    setTimeout(()=>el.remove(),2000);

  },600);
}

/* ===== TIMER ===== */
function timer(L){
  let i=setInterval(()=>{

    if(!run) return clearInterval(i);

    t--;
    timer.innerText="⏳ "+t;

    if(f>=L.goal){
      run=false;
      lvl++;
      setTimeout(nextLevel,1000);
    }

    if(t<=0){
      run=false;
      startBoss();
    }

  },1000);
}

/* ===== UPDATE ===== */
function update(){
  left.innerText="🐻 "+f;
  right.innerText="🐀 "+b;
}

/* ===== LOVE METER ===== */
function updateLove(){
  document.getElementById("loveBar").style.width=love+"%";

  if(love<=0){
    win("💀 ОЛЬГА WIN");
  }

  if(love>=100){
    win("🏆 АРТЕМ WIN");
  }
}

/* ===== BOSS QUESTIONS ===== */
const q=[
  "А ты меня любишь?",
  "А если я толстая?",
  "Я красивая?",
  "Я тебе мешаю?"
];

const a=[
  "🍕 пицца в ответ",
  "💨 кальян передан",
  "❤️ конечно люблю",
  "😎 ты фича, не баг"
];

/* ===== BOSS ===== */
function startBoss(){

  document.getElementById("boss").style.display="flex";

  setInterval(()=>{

    let card=document.createElement("div");
    card.className="card";

    card.innerText="👩 Ольга: "+q[Math.floor(Math.random()*q.length)];

    card.style.left=Math.random()*innerWidth+"px";
    card.style.top=Math.random()*innerHeight*0.5+"px";

    card.onclick=()=>{

      love+=10;
      spawnAnswer();
      updateLove();
      legend();

      card.remove();
    };

    document.body.appendChild(card);

    setTimeout(()=>card.remove(),3000);

  },1200);
}

/* ===== ANSWERS ===== */
function spawnAnswer(){

  let c=document.createElement("div");
  c.className="card";

  c.innerText="🧑 Артем: "+a[Math.floor(Math.random()*a.length)];

  c.style.left=Math.random()*innerWidth+"px";
  c.style.bottom="260px";

  document.body.appendChild(c);

  setTimeout(()=>c.remove(),2000);
}

/* ===== LEGEND ===== */
function legend(){
  const el=document.getElementById("legend");
  el.style.display="flex";

  setTimeout(()=>el.style.display="none",800);
}

/* ===== WIN ===== */
function win(text){
  victory.style.display="flex";
  victory.innerText=text;
}

</script>

</body>
</html>
