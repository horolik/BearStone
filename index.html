<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM BOSS FIGHT</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

/* MATRIX */
#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  z-index:5;
}

/* TIMER */
#timerBox{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:24px;
  z-index:6;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
}
.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}

/* CARD (Hearthstone style flip) */
.option{
  margin-top:10px;
  padding:12px;
  border:1px solid #00ff9f;
  cursor:pointer;
  perspective:1000px;
  transition:0.6s;
  transform-style:preserve-3d;
}

.option:hover{
  background:#003322;
  transform:rotateY(180deg);
}

.flip{
  animation:flipCard 0.6s ease;
}

@keyframes flipCard{
  0%{transform:rotateY(0);}
  100%{transform:rotateY(180deg);}
}

/* QUESTION */
#questionCard{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:420px;
  background:#111;
  border:2px solid gold;
  border-radius:12px;
  padding:20px;
  text-align:center;
  display:none;
  z-index:20;
}

/* BOSS */
#boss{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  font-size:80px;
  text-align:center;
  z-index:15;
  display:none;
  filter:drop-shadow(0 0 20px red);
}

#bossHp{
  font-size:22px;
  color:red;
}

/* END SCREEN */
#end{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  color:#00ff9f;
  font-size:40px;
  z-index:999;
}

#heart{
  font-size:120px;
  animation:beat 1s infinite;
}

#infinity{
  font-size:140px;
  display:none;
  animation:spin 3s infinite linear;
}

@keyframes beat{
  0%{transform:scale(1);}
  50%{transform:scale(1.4);}
  100%{transform:scale(1);}
}

@keyframes spin{
  0%{transform:rotate(0);}
  100%{transform:rotate(360deg);}
}

/* TERMINAL */
#terminal{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  z-index:30;
  background:black;
  border-top:1px solid #00ff9f;
}

#cmd{
  flex:1;
  background:black;
  color:#00ff9f;
  border:none;
  padding:10px;
  outline:none;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="hud">
  <div id="left">ūüźĽ 0</div>
  <div id="right">ūüźÄ 0</div>
  <div id="level">junior</div>
</div>

<div id="timerBox">‚ŹĪ 7</div>

<div id="boss">
  ūüźÄ –ě–õ–¨–ď–ź –Ď–ě–°–°
  <div id="bossHp">‚Ě§ÔłŹ‚Ě§ÔłŹ‚Ě§ÔłŹ‚Ě§ÔłŹ‚Ě§ÔłŹ</div>
</div>

<div id="questionCard"></div>

<div id="terminal">
  <input id="cmd" placeholder="type start..." />
</div>

<script>

/* MATRIX */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;
const drops=Array(60).fill(1);

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";
  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?0:1,i*20,y*20);
    drops[i]=y*20>c.height?0:y+1;
  });
},50);

/* SOUNDS */
const sDraw = new Audio("draw.mp3"); // card draw
const sLegendary = new Audio("legendary.mp3"); // legendary hit

function draw(){try{sDraw.play()}catch(e){}}
function legendary(){try{sLegendary.play()}catch(e){}}

/* GAME STATE */
let run=false;
let f=0,b=0;

let levelIndex=0;
const levels=["junior","middle","senior"];
const speed=[900,600,350];

let t=7;
let bossHp=5;
let qIndex=0;

const questions=[
"–Ę—č –ľ–Ķ–Ĺ—Ź –Ľ—é–Ī–ł—ą—Ć?",
"–ź –Ķ—Ā–Ľ–ł —Ź –ł–∑–ľ–Ķ–Ĺ—é—Ā—Ć?",
"–Į –ł–ī–Ķ–į–Ľ—Ć–Ĺ–į—Ź?"
];

const options=[
["‚Ě§ÔłŹ –ī–į","ūüí® –Ĺ–Ķ—ā","ūüćē –Ņ–ł—Ü—Ü–į"],
["‚Ě§ÔłŹ –≤—Ā–Ķ–≥–ī–į","ūüėé –ī–į","ūüí® –Ĺ–Ķ –∑–Ĺ–į—é"],
["‚Ě§ÔłŹ —ā—č –Ī–ĺ–≥–ł–Ĺ—Ź","ūüćē –Ņ–ł—Ü—Ü–į","ūüėé –Ľ—é–Ī–Ľ—é"]
];

window.startGame=startGame;

/* START */
function startGame(){
  document.getElementById("hud").style.display="flex";
  run=true;
  spawn();
  timer();
}

/* SPAWN */
function spawn(){
  setInterval(()=>{
    if(!run) return;

    let e=document.createElement("div");
    let type=Math.random()<0.5?"feature":"rat";

    e.className="entity "+type;
    e.innerText=type==="feature"?"ūüźĽ":"ūüźÄ";
    e.style.left=Math.random()*innerWidth+"px";
    e.style.top=Math.random()*innerHeight+"px";

    e.onclick=()=>{
      draw();
      if(type==="feature") f++; else b++;
      update();
      e.remove();
    };

    document.body.appendChild(e);
    setTimeout(()=>e.remove(),2000);

  }, speed[levelIndex]);
}

/* TIMER LEVELS */
function timer(){
  setInterval(()=>{
    if(!run) return;

    t--;
    timerBox.innerText="‚ŹĪ "+t;

    if(t<=0){
      nextLevel();
    }
  },1000);
}

/* LEVEL SYSTEM */
function nextLevel(){
  levelIndex++;

  if(levelIndex>=levels.length){
    startBoss();
    return;
  }

  document.getElementById("level").innerText=levels[levelIndex];
  t=7;
}

/* HUD */
function update(){
  left.innerText="ūüźĽ "+f;
  right.innerText="ūüźÄ "+b;
}

/* BOSS */
function startBoss(){
  run=false;
  document.getElementById("boss").style.display="block";
  showQuestion();
}

function hitBoss(){
  bossHp--;
  legendary();

  document.getElementById("bossHp").innerText =
    "‚Ě§ÔłŹ".repeat(Math.max(0,bossHp));

  if(bossHp<=0){
    win();
  }
}

/* CARDS */
function showQuestion(){
  const card=document.getElementById("questionCard");
  card.style.display="block";

  card.innerHTML="ūüĎ© –ě–Ľ—Ć–≥–į:<br><br>"+questions[qIndex];

  options[qIndex].forEach(opt=>{
    let d=document.createElement("div");
    d.className="option flip";
    d.innerText=opt;

    d.onclick=()=>{
      hitBoss();
      qIndex++;

      if(qIndex>=questions.length){
        win();
        return;
      }

      card.innerHTML="";
      showQuestion();
    };

    card.appendChild(d);
  });
}

/* END GAME + INFINITY */
function win(){
  document.body.innerHTML+=`
    <div id="end">
      <div id="heart">‚Ě§ÔłŹ</div>
      <div id="infinity">‚ąě</div>
      <div style="margin-top:20px">LOVE MAX</div>
      <div style="font-size:28px;margin-top:20px">
        ūüéČ –° –Ē–Ě–ē–ú –†–ě–Ė–Ē–ē–Ě–ė–Į –ź–†–Ę–ē–ú ūüéČ
      </div>
    </div>
  `;

  setTimeout(()=>{
    document.getElementById("heart").style.display="none";
    document.getElementById("infinity").style.display="block";
  },2000);
}

/* TERMINAL */
const cmd=document.getElementById("cmd");
cmd.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    if(cmd.value.trim()==="start") startGame();
    cmd.value="";
  }
});

</script>

</body>
</html>
