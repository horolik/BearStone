<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🐻 BearStone</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #0b0f14, #000);
  color: #00ff9f;
  font-family: monospace;
  overflow: hidden;
}

/* ================= SCREEN ================= */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
}
.active { display: block; }

/* ================= BOARD ================= */
#board {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

.hero {
  width: 200px;
  border: 2px solid #00ff9f;
  padding: 10px;
  border-radius: 10px;
  transition: 0.2s;
}

/* 💥 HIT EFFECT */
.hit {
  transform: scale(1.05);
  box-shadow: 0 0 20px red;
}

/* ================= HAND (HS STYLE) ================= */
#hand {
  position: fixed;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
}

.card {
  width: 120px;
  height: 160px;
  border: 1px solid #00ff9f;
  background: rgba(0,255,159,0.05);
  margin: 5px;
  padding: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-30px) scale(1.1);
  border-color: white;
}

/* ✨ CARD PLAY ANIMATION */
.card.playing {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) scale(1.5);
  z-index: 999;
  transition: 0.3s;
}

/* 💥 SHAKE */
@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(-5px,5px); }
  50% { transform: translate(5px,-5px); }
  75% { transform: translate(-5px,-5px); }
  100% { transform: translate(0,0); }
}

.shake {
  animation: shake 0.3s;
}
</style>
</head>

<body>

<!-- ================= GAME ================= -->
<div id="game" class="screen active">

  <div id="board">
    <div class="hero" id="player">
      <h3>Artem</h3>
      HP: <span id="php">20</span><br>
      Mana: <span id="mana">1</span>
    </div>

    <div class="hero" id="boss">
      <h3>Toxic PM</h3>
      HP: <span id="bhp">40</span><br>
    </div>
  </div>

  <div id="hand"></div>

  <button onclick="endTurn()">End Turn</button>
</div>

<script>
/* ================= STATE ================= */
const Game = {
  hp: 20,
  mana: 1,
  bossHp: 40
};

/* ================= CARDS ================= */
const Cards = [
  { name:"Bug Fix", cost:1, dmg:2 },
  { name:"Hotfix", cost:2, dmg:4 },
  { name:"Shield", cost:2, heal:3 }
];

/* ================= UI ================= */
const hand = document.getElementById("hand");

function render(){
  hand.innerHTML = "";

  Cards.forEach((c,i)=>{
    const el = document.createElement("div");
    el.className = "card";
    el.innerHTML = `<b>${c.name}</b><br>cost:${c.cost}`;

    el.onclick = ()=>playCard(el,c);

    hand.appendChild(el);
  });

  update();
}

/* ================= CARD PLAY ANIMATION ================= */
function playCard(el, card){

  if(Game.mana < card.cost) return;

  Game.mana -= card.cost;

  // 💥 clone animation
  const clone = el.cloneNode(true);
  clone.classList.add("playing");
  document.body.appendChild(clone);

  setTimeout(()=>{
    clone.remove();

    // apply effect AFTER animation
    if(card.dmg){
      Game.bossHp -= card.dmg;
      bossHit();
    }

    if(card.heal){
      Game.hp += card.heal;
    }

    update();

  }, 300);
}

/* ================= BOSS HIT EFFECT ================= */
function bossHit(){

  const boss = document.getElementById("boss");

  boss.classList.add("hit");
  boss.classList.add("shake");

  setTimeout(()=>{
    boss.classList.remove("hit");
    boss.classList.remove("shake");
  }, 300);
}

/* ================= TURN ================= */
function endTurn(){

  Game.mana++;
  Game.bossHp -= 2;

  bossHit();

  update();

  if(Game.bossHp <= 0){
    document.body.innerHTML = "<h1>🐻 YOU WIN BEARSTONE</h1>";
  }
}

/* ================= UPDATE ================= */
function update(){
  document.getElementById("php").innerText = Game.hp;
  document.getElementById("mana").innerText = Game.mana;
  document.getElementById("bhp").innerText = Game.bossHp;
}

render();
update();
</script>

</body>
</html>
