<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM // OLGA BOSS MODE</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  overflow:hidden;
  color:#00ff9f;
}

#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

#console{
  position:fixed;
  inset:0;
  background:black;
  padding:20px;
  display:flex;
  flex-direction:column;
  z-index:10;
}

#terminalLog{flex:1;overflow:auto;font-size:14px;}

#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:20px;
  z-index:5;
}

#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
}

#loveWrap{
  position:fixed;
  top:110px;
  left:50%;
  transform:translateX(-50%);
  width:300px;
  height:16px;
  border:2px solid #ff4d4d;
}

#loveBar{
  width:50%;
  height:100%;
  background:#ff4d4d;
  transition:.3s;
}

/* ===== BOSS MODAL ===== */
#bossModal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.8);
  z-index:20;
}

#bossCard{
  width:420px;
  background:#111;
  border:2px solid #ff4d4d;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

#bossTitle{
  font-size:20px;
  margin-bottom:10px;
}

#answers button{
  display:block;
  width:100%;
  margin:6px 0;
  padding:10px;
  background:#00ff9f;
  border:none;
  cursor:pointer;
  font-family:monospace;
}

#hitFx{
  position:fixed;
  font-size:40px;
  display:none;
  z-index:30;
}

#win{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

/* HEART ENDLESS */
#heartScreen{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:black;
  z-index:50;
}

#heart{
  font-size:80px;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.3);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="console">
  <div id="terminalLog">
> PROD BROKEN DETECTED<br>
> type start
  </div>
</div>

<div id="hud"><div id="left">🐻 0</div><div id="right">🐀 0</div></div>
<div id="level"></div>
<div id="loveWrap"><div id="loveBar"></div></div>

<!-- BOSS MODAL -->
<div id="bossModal">
  <div id="bossCard">
    <div id="bossTitle">👩 Ольга-Босс 🐀</div>
    <div id="question">...</div>
    <div id="answers"></div>
  </div>
</div>

<div id="hitFx">💥</div>
<div id="win"></div>

<div id="heartScreen">
  <div id="heart">❤️</div>
  <div>LOVE INFINITY</div>
  <div>🎉 С ДНЁМ РОЖДЕНИЯ 🎉</div>
</div>

<script>

/* MATRIX */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;
const drops=Array(60).fill(1);
setInterval(()=>{
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#00ff9f";
drops.forEach((y,i)=>{
ctx.fillText(Math.random()>0.5?0:1,i*18,y*18);
drops[i]=y*18>c.height?0:y+1;
});
},50);

/* STATE */
let f=0,b=0,lvl=0,love=50,run=false;
const levels=[{goal:3},{goal:5},{goal:7}];

/* TERMINAL START */
console.onclick=()=>{
  document.getElementById("console").style.display="none";
  document.getElementById("hud").style.display="flex";
  run=true;
  nextLevel();
};

function nextLevel(){
  if(lvl>=levels.length){startBoss();return;}
  document.getElementById("level").innerText="LEVEL " + (lvl+1);
  spawn(levels[lvl]);
}

function spawn(L){
setInterval(()=>{
if(!run) return;
let e=document.createElement("div");
let type=Math.random()>0.5?"feature":"rat";
e.innerText=type==="feature"?"🐻":"🐀";
e.style.position="absolute";
e.style.left=Math.random()*innerWidth+"px";
e.style.top=Math.random()*innerHeight+"px";

e.onclick=()=>{
if(type==="feature")f++;else b++;
if(f>=L.goal){lvl++;nextLevel();}
update();e.remove();
};

document.body.appendChild(e);
setTimeout(()=>e.remove(),2000);
},700);
}

function update(){
left.innerText="🐻 "+f;
right.innerText="🐀 "+b;
}

function updateLove(){
  document.getElementById("loveBar").style.width=love+"%";
  if(love>=100) endGame();
}

/* ===== BOSS ===== */
const q=["Ты меня любишь?","Я красивая?","А если я крыса?"];
const a=["❤️ да","🍕 конечно","💥 хахах"];

function startBoss(){
  document.getElementById("bossModal").style.display="flex";
  showQuestion();
}

function showQuestion(){
  document.getElementById("question").innerText=
    "👩 Ольга: " + q[Math.floor(Math.random()*q.length)];

  let box=document.getElementById("answers");
  box.innerHTML="";

  a.forEach(txt=>{
    let b=document.createElement("button");
    b.innerText=txt;
    b.onclick=()=>hit();
    box.appendChild(b);
  });
}

function hit(){
  love+=10;
  updateLove();

  let fx=document.getElementById("hitFx");
  fx.style.display="block";
  fx.style.left=Math.random()*innerWidth+"px";
  fx.style.top=Math.random()*innerHeight+"px";
  setTimeout(()=>fx.style.display="none",300);

  showQuestion();
}

function endGame(){
  document.getElementById("bossModal").style.display="none";
  document.getElementById("heartScreen").style.display="flex";
}

</script>
</body>
</html>
