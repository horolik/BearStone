<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Bear Debug System 🐻</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: black;
  color: #00ff9f;
  overflow: hidden;
}

/* MATRIX */
#matrix {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* TERMINAL */
#terminal {
  position: fixed;
  inset: 0;
  background: black;
  color: #00ff9f;
  padding: 20px;
  z-index: 3;
  font-size: 14px;
}

#terminalText {
  white-space: pre-line;
}

#inputLine {
  margin-top: 10px;
}

#commandInput {
  background: black;
  border: none;
  color: #00ff9f;
  outline: none;
  font-family: monospace;
}

/* INTRO */
#intro {
  display: none;
  position: fixed;
  inset: 0;
  background: black;
  color: #00ff9f;
  z-index: 4;
  padding: 20px;
}

/* GAME */
#app {
  display: none;
  padding: 20px;
  position: relative;
  z-index: 2;
}

h1 {
  text-shadow: 0 0 10px #00ff9f;
}

/* ENTITIES */
.bug {
  position: absolute;
  font-size: 48px;
  cursor: pointer;
  z-index: 5;
  transition: transform 0.2s;
}

.bug:hover {
  transform: scale(1.2);
}

.feature {
  color: #00ff9f;
}

.rat {
  color: #ff4d4d;
}

.danger {
  filter: drop-shadow(0 0 10px red);
}

/* ANIMATIONS */
.fly-right {
  animation: flyRight 0.6s forwards;
}

.fly-left {
  animation: flyLeft 0.6s forwards;
}

@keyframes flyRight {
  to {
    transform: translateX(300px) scale(0.5);
    opacity: 0;
  }
}

@keyframes flyLeft {
  to {
    transform: translateX(-300px) scale(0.5);
    opacity: 0;
  }
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- TERMINAL -->
<div id="terminal">
  <div id="terminalText"></div>
  <div id="inputLine" style="display:none;">
    > <input id="commandInput" autofocus />
  </div>
</div>

<!-- INTRO -->
<div id="intro">
  <h2>📘 DEBUG TRAINING</h2>

  <pre>
🐻 Bear Debug System

ЭТАПЫ:
1. Лови:
   🐻 — фичи (в прод)
   🐀 — баги (фикс)
   ☠️🐀 — опасные (2 клика)

2. Сделай 5 фич
3. Зарелизь систему 🚀

Удачи, дев.
  </pre>

  <button id="startBtn">START DEBUG MODE</button>
</div>

<!-- GAME -->
<div id="app">
  <h1>🐻 Bear Debug System</h1>

  <p id="stats">
    🐻 Features: 0 | 🐀 Bugs fixed: 0
  </p>

  <button id="releaseBtn" style="display:none;">
    🚀 RELEASE TO PROD
  </button>

  <p id="log"></p>
</div>

<script>

/* STATE */
let started = false;
let features = 0;
let bugs = 0;

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array.from({ length: columns }).fill(1);

function matrix() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff9f";
  ctx.font = fontSize + "px monospace";

  drops.forEach((y,i)=>{
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, y*fontSize);

    if(y*fontSize > canvas.height && Math.random()>0.975){
      drops[i]=0;
    }
    drops[i]++;
  });
}

setInterval(matrix, 40);

/* TERMINAL */
const terminal = document.getElementById("terminal");
const terminalText = document.getElementById("terminalText");
const input = document.getElementById("commandInput");
const inputLine = document.getElementById("inputLine");

const lines = [
  "Booting Bear System...",
  "Loading modules...",
  "User detected: Артём",
  "Scanning environment...",
  "⚠️ Bugs detected",
  "",
  "Type 'start'"
];

let i = 0;

function typeLine(){
  if(i < lines.length){
    terminalText.innerText += lines[i] + "\n";
    i++;
    setTimeout(typeLine, 500);
  } else {
    inputLine.style.display = "block";
    input.focus();
  }
}
typeLine();

input.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    const cmd = input.value.trim().toLowerCase();
    terminalText.innerText += "> " + cmd + "\n";

    if(cmd === "start"){
      terminal.style.display = "none";
      document.getElementById("intro").style.display = "block";
    } else {
      terminalText.innerText += "command not found\n";
    }

    input.value = "";
  }
});

/* INTRO */
document.getElementById("startBtn").onclick = ()=>{
  document.getElementById("intro").style.display = "none";
  startBugMode();
};

/* STATS */
function updateStats(){
  document.getElementById("stats").innerText =
    `🐻 Features: ${features} | 🐀 Bugs fixed: ${bugs}`;

  if(features >= 5){
    document.getElementById("releaseBtn").style.display = "block";
  }
}

/* SPAWN */
function startBugMode(){
  interval = setInterval(spawnEntity, 700);
}

function spawnEntity(){
  const entity = document.createElement("div");

  const rand = Math.random();
  let type;

  if(rand > 0.6){
    type = "feature";
  } else if(rand > 0.2){
    type = "rat";
  } else {
    type = "danger";
  }

  entity.className = "bug " + type;

  if(type === "feature") entity.innerText = "🐻";
  if(type === "rat") entity.innerText = "🐀";
  if(type === "danger") entity.innerText = "☠️🐀";

  entity.style.left = Math.random()*window.innerWidth + "px";
  entity.style.top = Math.random()*window.innerHeight + "px";

  let clicks = 0;

  entity.onclick = ()=>{
    clicks++;

    if(type === "danger" && clicks < 2){
      entity.style.transform = "scale(1.4)";
      return;
    }

    if(type === "feature"){
      features++;
      entity.classList.add("fly-right");
    } else {
      bugs++;
      entity.classList.add("fly-left");
    }

    updateStats();

    setTimeout(()=>entity.remove(), 600);
  };

  document.body.appendChild(entity);

  setTimeout(()=>entity.remove(), 2500);
}

/* RELEASE */
document.getElementById("releaseBtn").onclick = ()=>{
  startGame();
};

/* FINAL */
function startGame(){
  started = true;

  document.getElementById("app").style.display = "block";

  document.getElementById("log").innerText =
`🚀 РЕЛИЗ УСПЕШЕН

🐻 Фичи: ${features}
🐀 Баги пофиксены: ${bugs}

Прод стабилен.`;
}

</script>

</body>
</html>
