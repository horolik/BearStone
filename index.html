<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEM: PROD EDITION</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  overflow:hidden;
  color:#00ff9f;
}

canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

/* START */
#start{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:black;
  z-index:1000;
}

#terminal{
  border:1px solid #00ff9f;
  padding:20px;
  width:320px;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  z-index:2;
}

#level{
  position:fixed;
  top:40px;
  width:100%;
  text-align:center;
}

#stats{
  position:fixed;
  top:80px;
  left:20px;
}

#guide{
  position:fixed;
  bottom:20px;
  left:20px;
  right:20px;
  border:1px solid #00ff9f;
  padding:10px;
  background:rgba(0,0,0,0.5);
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:50px;
  cursor:pointer;
  transition:0.2s;
  z-index:2;
}

.entity:hover{
  transform:scale(1.3);
  text-shadow:0 0 10px #00ff9f;
}

.kalyan{
  width:100px;
}

/* SHAKE */
.shake{
  animation:shake 0.2s;
}
@keyframes shake{
  0%{transform:translate(0)}
  25%{transform:translate(-5px)}
  50%{transform:translate(5px)}
  100%{transform:translate(0)}
}

/* BOSS */
#boss{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:3;
}

#boss img{
  width:180px;
  border-radius:10px;
  box-shadow:0 0 20px magenta;
}

.btn{
  border:1px solid white;
  padding:10px;
  margin:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="start">
<div id="terminal">
> PROD сломан. Введите start<br><br>
<input id="input">
</div>
</div>

<div id="hud">
<div id="f">🐻 0</div>
<div id="r">🐀 0</div>
</div>

<div id="level"></div>

<div id="stats">
FIX: <span id="fix">30</span>% |
HAPPY: <span id="happy">0</span>
</div>

<div id="guide"></div>

<div id="boss"></div>

<script>

/* MATRIX */
let c=document.getElementById("matrix");
let ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let drops=[];
for(let i=0;i<100;i++) drops[i]=1;

function matrix(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#00ff9f";

drops.forEach((d,i)=>{
ctx.fillText(Math.random()>0.5?"0":"1",i*15,d*15);
drops[i]++;
if(d*15>c.height) drops[i]=0;
});
}
setInterval(matrix,40);

/* STATE */
let run=false;
let f=0,r=0;
let fix=30;
let happy=0;
let lvl=0;
let bossHP=100;

let spawnRate=600;
let maxEntities=25;

const levels=["JUNIOR","MIDDLE","SENIOR"];

/* START */
input.onkeydown=(e)=>{
if(e.key==="Enter" && input.value==="start"){
document.getElementById("start").style.display="none";
hud.style.display="flex";
run=true;
game();
}
};

/* CLEANUP */
function cleanup(){
let all=document.querySelectorAll(".entity");
if(all.length>maxEntities) all[0].remove();
}

/* UI */
function update(){
document.getElementById("f").innerText="🐻 "+f;
document.getElementById("r").innerText="🐀 "+r;
document.getElementById("fix").innerText=fix;
document.getElementById("happy").innerText=happy;
document.getElementById("level").innerText=levels[lvl];
}

/* SHAKE */
function shake(){
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),200);
}

/* GAME LOOP */
function game(){

setInterval(()=>{

if(!run) return;

cleanup();

if(fix<=0){
document.body.innerHTML="<h1 style='color:red;text-align:center;margin-top:20%'>PROD УПАЛ</h1>";
return;
}

if(happy>=50){
boss();
return;
}

/* SPAWN */
let type=Math.random();

if(type<0.4) spawn("rat");
else if(type<0.7) spawn("feature");
else spawn("kalyan");

spawnRate=Math.max(200,spawnRate-1);

},spawnRate);
}

/* SPAWN */
function spawn(type){

let e=document.createElement("div");
e.className="entity";

e.style.left=Math.random()*innerWidth+"px";
e.style.top=Math.random()*innerHeight+"px";

if(type==="rat"){
e.innerText="🐀";
e.onclick=()=>{
r++;fix-=2;shake();update();
};
}

if(type==="feature"){
e.innerText="🐻";
e.onclick=()=>{
f++;fix+=3;
if(Math.random()<0.2) fix-=5;
if(f>=5) lvl=2;
update();
};
}

if(type==="kalyan"){
let img=document.createElement("img");
img.src="Kalyan.PNG";
img.className="entity kalyan";
img.style.left=Math.random()*innerWidth+"px";
img.style.top=Math.random()*innerHeight+"px";

img.onclick=()=>{
happy+=5;
fix-=3;
update();
img.remove();
};

document.body.appendChild(img);
setTimeout(()=>img.remove(),1500);
return;
}

document.body.appendChild(e);
setTimeout(()=>e.remove(),2000);
}

/* BOSS */
function boss(){

run=false;

let b=document.getElementById("boss");
b.style.display="flex";

function render(){
b.innerHTML=`
<h2>😈 ОЛЬГА БОСС</h2>
<img src="Olga.JPG">
<p>HP: ${bossHP}</p>
`;

["Я АРТЕМ","ФИЧА","БАГ","console.log","DELETE PROD"].forEach(t=>{
let d=document.createElement("div");
d.className="btn";
d.innerText=t;

d.onclick=()=>{

if(t==="Я АРТЕМ") bossHP-=20;
else bossHP+=10;

if(bossHP<=0){
b.innerHTML="🏆 PROD ПОЧИНЕН! GG";
return;
}

render();
};

b.appendChild(d);
});
}

render();
}

update();

</script>
</body>
</html>
