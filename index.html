```html id="full_terminal_game"
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM // PROD DEBUG GAME</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  overflow:hidden;
  color:#00ff9f;
}

/* MATRIX */
#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

/* TERMINAL */
#console{
  position:fixed;
  inset:0;
  background:black;
  padding:20px;
  display:flex;
  flex-direction:column;
  z-index:10;
}

#terminalHeader{
  opacity:0.8;
  margin-bottom:10px;
}

#terminalLog{
  flex:1;
  overflow:auto;
  font-size:14px;
  line-height:1.4;
}

#terminalInputLine{
  display:flex;
  gap:10px;
  border-top:1px solid #00ff9f;
  padding-top:10px;
}

#cmd{
  flex:1;
  background:black;
  border:none;
  color:#00ff9f;
  outline:none;
  font-size:16px;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:20px;
  z-index:5;
}

/* LEVEL */
#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
}

.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}

/* BOSS AREA */
#boss{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:220px;
  background:#111;
  border-top:2px solid #ff4d4d;
  display:none;
  align-items:center;
  padding:10px;
  z-index:10;
}

#boss img{
  width:100px;
  height:100px;
  border-radius:50%;
  margin-right:10px;
}

/* LOVE */
#loveWrap{
  position:fixed;
  top:110px;
  left:50%;
  transform:translateX(-50%);
  width:300px;
  height:16px;
  border:2px solid #ff4d4d;
}

#loveBar{
  width:50%;
  height:100%;
  background:#ff4d4d;
  transition:.3s;
}

/* CARD FLIP */
.card{
  position:absolute;
  width:220px;
  padding:10px;
  background:#111;
  border:2px solid gold;
  border-radius:10px;
  color:white;
  text-align:center;
  animation:pop .3s ease-out;
}

@keyframes pop{
  from{transform:translateY(120px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* LEGEND */
#legend{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
  color:orange;
}

/* WIN */
#win{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- TERMINAL -->
<div id="console">
  <div id="terminalHeader">SYSTEM TERMINAL // PROD CRASH</div>

  <div id="terminalLog">
    > PROD BROKEN DETECTED<br>
    > only SUPER ARTEEM can fix it<br><br>

    > type: start<br>
  </div>

  <div id="terminalInputLine">
    >
    <input id="cmd" autocomplete="off">
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="left">🐻 0</div>
  <div id="right">🐀 0</div>
</div>

<div id="level"></div>

<!-- LOVE -->
<div id="loveWrap">
  <div id="loveBar"></div>
</div>

<!-- BOSS -->
<div id="boss">
  <img src="https://i.imgur.com/8QfQ2dZ.png">
  <div>👩 Ольга: вопросик...</div>
</div>

<div id="legend">💨 LEGENDARY</div>
<div id="win"></div>

<script>

/* ===== MATRIX ===== */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

const drops=Array(60).fill(1);

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";

  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?0:1,i*18,y*18);
    drops[i]=y*18>c.height?0:y+1;
  });
},50);

/* ===== SOUND ===== */
function drawSound(){
  new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg").play();
}
function legendarySound(){
  new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

/* ===== STATE ===== */
let f=0,b=0;
let lvl=0;
let run=false;
let love=50;

/* ===== LEVELS ===== */
const levels=[
  {name:"JUNIOR",goal:4},
  {name:"MIDDLE",goal:6},
  {name:"SENIOR",goal:8}
];

/* ===== TERMINAL START ===== */
const cmd=document.getElementById("cmd");
const log=document.getElementById("terminalLog");

cmd.addEventListener("keydown",(e)=>{
  if(e.key!=="Enter") return;

  const v=cmd.value.trim().toLowerCase();

  log.innerHTML += "<br>> "+v;

  if(v==="start"){
    log.innerHTML += "<br>✔ unlocking system...";
    log.innerHTML += "<br>✔ SUPER ARTEEM detected";

    setTimeout(()=>{
      document.getElementById("console").style.display="none";
      document.getElementById("hud").style.display="flex";

      startGame();
    },800);
  }

  cmd.value="";
});

/* ===== START ===== */
function startGame(){
  run=true;
  nextLevel();
}

/* ===== LEVEL FLOW ===== */
function nextLevel(){

  if(lvl>=levels.length){
    boss();
    return;
  }

  document.getElementById("level").innerText=
    "LEVEL: "+levels[lvl].name;

  spawn(levels[lvl]);
}

/* ===== SPAWN ===== */
function spawn(L){

  setInterval(()=>{
    if(!run) return;

    let e=document.createElement("div");
    let type=Math.random()>0.5?"feature":"rat";

    e.className="entity "+type;
    e.innerText=type==="feature"?"🐻":"🐀";

    e.style.left=Math.random()*innerWidth+"px";
    e.style.top=Math.random()*innerHeight+"px";

    e.onclick=()=>{
      drawSound();

      if(type==="feature") f++;
      else b++;

      update();

      if(f>=L.goal){
        lvl++;
        nextLevel();
      }

      e.remove();
    };

    document.body.appendChild(e);

    setTimeout(()=>e.remove(),2000);

  },600);
}

/* ===== UPDATE ===== */
function update(){
  left.innerText="🐻 "+f;
  right.innerText="🐀 "+b;
}

/* ===== LOVE ===== */
function updateLove(){
  document.getElementById("loveBar").style.width=love+"%";

  if(love>=100) win("🏆 ARTEEM WIN");
}

/* ===== BOSS ===== */
const questions=[
  "А ты меня любишь?",
  "А если я толстая?",
  "Я красивая?"
];

const answers=[
  "❤️ да",
  "💨 кальян",
  "🍕 пицца"
];

function boss(){

  document.getElementById("boss").style.display="flex";

  setInterval(()=>{

    let card=document.createElement("div");
    card.className="card";

    card.innerText="👩 Ольга: "+questions[Math.floor(Math.random()*questions.length)];

    card.style.left=Math.random()*innerWidth+"px";
    card.style.top=Math.random()*innerHeight*0.4+"px";

    card.onclick=()=>{
      legendarySound();

      love+=10;
      updateLove();

      showAnswer();

      card.remove();
    };

    document.body.appendChild(card);

    setTimeout(()=>card.remove(),3000);

  },1200);
}

/* ===== ANSWER ===== */
function showAnswer(){

  let c=document.createElement("div");
  c.className="card";

  c.innerText="🧑 Артем: "+answers[Math.floor(Math.random()*answers.length)];

  c.style.left=Math.random()*innerWidth+"px";
  c.style.bottom="250px";

  document.body.appendChild(c);

  setTimeout(()=>c.remove(),2000);
}

/* ===== WIN ===== */
function win(t){
  winBox.style.display="flex";
  winBox.innerText=t;
}

const winBox=document.getElementById("win");

</script>

</body>
</html>
