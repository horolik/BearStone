<script>

/* STATE */
let started = false;
let debugPoints = 0;

/* GAME STATE (cards) */
const Game = {
  hp: 20,
  mana: 1,
  bossHp: 30
};

/* MATRIX — оставляем как есть */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array.from({ length: columns }).fill(1);

function matrix() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff9f";
  ctx.font = fontSize + "px monospace";

  drops.forEach((y,i)=>{
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, y*fontSize);

    if(y*fontSize > canvas.height && Math.random()>0.975){
      drops[i]=0;
    }
    drops[i]++;
  });
}
setInterval(matrix, 40);

/* TERMINAL — без изменений */
const terminal = document.getElementById("terminal");
const terminalText = document.getElementById("terminalText");
const input = document.getElementById("commandInput");
const inputLine = document.getElementById("inputLine");

const lines = [
  "Booting Bear System...",
  "Loading modules...",
  "User detected: Артём",
  "Scanning environment...",
  "⚠️ Bugs detected",
  "",
  "Type 'start'"
];

let i = 0;

function typeLine(){
  if(i < lines.length){
    terminalText.innerText += lines[i] + "\n";
    i++;
    setTimeout(typeLine, 500);
  } else {
    inputLine.style.display = "block";
    input.focus();
  }
}
typeLine();

input.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    const cmd = input.value.trim().toLowerCase();
    terminalText.innerText += "> " + cmd + "\n";

    if(cmd === "start"){
      terminal.style.display = "none";
      document.getElementById("intro").style.display = "block";
    } else {
      terminalText.innerText += "command not found\n";
    }

    input.value = "";
  }
});

/* INTRO */
document.getElementById("startBtn").onclick = ()=>{
  document.getElementById("intro").style.display = "none";
  startBugMode();
};

/* ================= BUG GAME ================= */
function startBugMode(){

  let interval = setInterval(spawn, 500);

  function spawn(){

    const isFeature = Math.random() > 0.5;

    const el = document.createElement("div");
    el.className = "bug";

    if(isFeature){
      el.innerText = "🐻";
      el.style.fontSize = "40px";
    } else {
      el.innerText = "🐀";
      el.style.fontSize = "34px";
    }

    const x = Math.random()*window.innerWidth;
    el.style.left = x + "px";
    el.style.top = Math.random()*window.innerHeight + "px";

    el.onclick = (e)=>{
      const clickedRightSide = e.clientX > window.innerWidth / 2;

      if(isFeature && clickedRightSide){
        debugPoints++;
      }

      if(!isFeature){
        debugPoints++;
      }

      el.remove();

      if(debugPoints >= 5){
        clearInterval(interval);
        startCardGame();
      }
    };

    document.body.appendChild(el);

    setTimeout(()=>el.remove(), 1500);
  }
}

/* ================= CARD GAME ================= */

const Cards = [
  { name:"🐛 Bug Fix", cost:1, dmg:2 },
  { name:"🔥 Hotfix", cost:2, dmg:4 },
  { name:"🛡 Shield", cost:2, heal:3 }
];

function startCardGame(){
  started = true;

  const app = document.getElementById("app");
  app.style.display = "block";

  app.innerHTML = `
    <h1>🐻 BearStone</h1>

    <div>
      Artem HP: <span id="hp">20</span> |
      Mana: <span id="mana">1</span>
    </div>

    <div>
      Boss HP: <span id="bossHp">30</span>
    </div>

    <hr>

    <div id="hand"></div>

    <button onclick="endTurn()">End Turn</button>
  `;

  renderCards();
  updateUI();
}

function renderCards(){
  const hand = document.getElementById("hand");
  hand.innerHTML = "";

  Cards.forEach(card=>{
    const el = document.createElement("div");
    el.className = "bug"; // reuse style
    el.style.position = "static";
    el.style.display = "inline-block";
    el.style.margin = "5px";
    el.style.fontSize = "14px";
    el.innerText = `${card.name} (${card.cost})`;

    el.onclick = ()=>playCard(card);

    hand.appendChild(el);
  });
}

function playCard(card){

  if(Game.mana < card.cost) return;

  Game.mana -= card.cost;

  if(card.dmg){
    Game.bossHp -= card.dmg;
  }

  if(card.heal){
    Game.hp += card.heal;
  }

  updateUI();
}

function endTurn(){
  Game.mana++;
  Game.bossHp -= 2;

  updateUI();

  if(Game.bossHp <= 0){
    document.body.innerHTML = "<h1>🐻 VICTORY</h1>";
  }
}

function updateUI(){
  document.getElementById("hp").innerText = Game.hp;
  document.getElementById("mana").innerText = Game.mana;
  document.getElementById("bossHp").innerText = Game.bossHp;
}

</script>
