```html id="clean_rewrite_game"
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Debug → Hearthstone Boss</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

/* MATRIX */
#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

/* CONSOLE */
#console{
  position:fixed;
  inset:0;
  padding:20px;
  z-index:2;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:20px;
  z-index:5;
}

/* LEVEL */
#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:64px;
  cursor:pointer;
  transition:.3s;
}

.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}
.super{filter:drop-shadow(0 0 10px red);}

/* BOSS */
#boss{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:240px;
  background:#111;
  border-top:2px solid #ff4d4d;
  display:none;
  align-items:center;
  padding:10px;
  z-index:10;
}

#boss img{
  width:120px;
  height:120px;
  border-radius:50%;
  margin-right:20px;
}

/* CARD */
.card{
  position:absolute;
  width:180px;
  padding:10px;
  background:#111;
  border:2px solid gold;
  border-radius:10px;
  color:white;
  text-align:center;
  animation:fly .3s ease-out;
}

@keyframes fly{
  from{transform:translateY(150px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* LOVE */
#loveWrap{
  position:fixed;
  top:110px;
  left:50%;
  transform:translateX(-50%);
  width:300px;
  height:16px;
  border:2px solid #ff4d4d;
}

#loveBar{
  width:50%;
  height:100%;
  background:#ff4d4d;
  transition:.3s;
}

/* LEGEND */
#legend{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
  color:orange;
}

/* WIN */
#win{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- CONSOLE -->
<div id="console">
> SYSTEM ERROR 🐀<br>
> баг в проде<br><br>

> 🐻 = фичи → вправо<br>
> 🐀 = баги → влево<br>
> 🔥 = супер-крыса<br><br>

> start / старт<br>
<input id="cmd" autofocus>
<div id="out"></div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="left">🐻 0</div>
  <div id="timer">⏳ 0</div>
  <div id="right">🐀 0</div>
</div>

<div id="level"></div>

<!-- LOVE -->
<div id="loveWrap">
  <div id="loveBar"></div>
</div>

<!-- BOSS -->
<div id="boss">
  <img src="https://i.imgur.com/8QfQ2dZ.png">
  <div>👩 Ольга: вопросик...</div>
</div>

<div id="legend">💨 LEGENDARY!</div>
<div id="win"></div>

<script>

/* ===== MATRIX ===== */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

const drops=Array(60).fill(1);

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";

  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?0:1,i*18,y*18);
    drops[i]=y*18>c.height?0:y+1;
  });
},50);

/* ===== STATE ===== */
let f=0,b=0,t=0;
let lvl=0;
let run=false;
let love=50;

/* ===== LEVELS ===== */
const levels=[
  {name:"JUNIOR",time:15,goal:4},
  {name:"MIDDLE",time:20,goal:6},
  {name:"SENIOR",time:25,goal:8}
];

/* ===== SAFE START (ГЛАВНЫЙ ФИКС) ===== */
document.getElementById("cmd").addEventListener("keydown",(e)=>{
  if(e.key!=="Enter") return;

  const v=e.target.value.trim().toLowerCase();

  out.innerHTML+="<br>> "+v;

  if(v==="start"||v==="старт"){
    start();
  }else{
    out.innerHTML+="<br>нужно: start";
  }

  e.target.value="";
});

/* ===== START ===== */
function start(){
  document.getElementById("console").style.display="none";
  document.getElementById("hud").style.display="flex";
  next();
}

/* ===== LEVEL FLOW ===== */
function next(){

  if(lvl>=levels.length){
    boss();
    return;
  }

  let L=levels[lvl];

  f=0;b=0;t=L.time;
  run=true;

  level.innerText=L.name;

  spawn();
  timer(L);
}

/* ===== SPAWN ===== */
function spawn(){
  setInterval(()=>{
    if(!run) return;

    let el=document.createElement("div");
    let r=Math.random();

    let type =
      r<0.1?"super":
      r<0.5?"rat":"feature";

    el.className="entity "+type;

    el.innerText =
      type==="feature"?"🐻":
      type==="rat"?"🐀":"🐀🔥";

    el.style.left=Math.random()*innerWidth+"px";
    el.style.top=Math.random()*innerHeight+"px";

    el.onclick=()=>{
      if(type==="feature") f++;
      else if(type==="rat") b++;
      else b+=2;

      el.remove();
      update();
    };

    document.body.appendChild(el);

    setTimeout(()=>el.remove(),2000);

  },600);
}

/* ===== TIMER ===== */
function timer(L){
  let i=setInterval(()=>{

    if(!run) return clearInterval(i);

    t--;
    timer.innerText="⏳ "+t;

    if(f>=L.goal){
      run=false;
      lvl++;
      setTimeout(next,1000);
    }

    if(t<=0){
      run=false;
      boss();
    }

  },1000);
}

/* ===== UPDATE ===== */
function update(){
  left.innerText="🐻 "+f;
  right.innerText="🐀 "+b;
}

/* ===== LOVE ===== */
function updateLove(){
  document.getElementById("loveBar").style.width=love+"%";

  if(love<=0) win("💀 ОЛЬГА WIN");
  if(love>=100) win("🏆 АРТЕМ WIN");
}

/* ===== BOSS ===== */
const q=[
  "А ты меня любишь?",
  "А если я потолстею?",
  "Я красивая?",
  "Я мешаю?"
];

const a=[
  "🍕 пицца",
  "💨 кальян",
  "❤️ люблю",
  "😎 ты фича"
];

function boss(){

  document.getElementById("boss").style.display="flex";

  setInterval(()=>{

    let c=document.createElement("div");
    c.className="card";

    c.innerText="👩 "+q[Math.floor(Math.random()*q.length)];

    c.style.left=Math.random()*innerWidth+"px";
    c.style.top=Math.random()*innerHeight*0.5+"px";

    c.onclick=()=>{

      love+=10;
      answer();
      updateLove();
      legend();

      c.remove();
    };

    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);

  },1200);
}

/* ANSWER */
function answer(){

  let c=document.createElement("div");
  c.className="card";

  c.innerText="🧑 "+a[Math.floor(Math.random()*a.length)];

  c.style.left=Math.random()*innerWidth+"px";
  c.style.bottom="260px";

  document.body.appendChild(c);

  setTimeout(()=>c.remove(),2000);
}

/* LEGEND */
function legend(){
  let el=document.getElementById("legend");
  el.style.display="flex";
  setTimeout(()=>el.style.display="none",800);
}

/* WIN */
function win(t){
  winBox.style.display="flex";
  winBox.innerText=t;
}

const winBox=document.getElementById("win");

</script>

</body>
</html>
```
