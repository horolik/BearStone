<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Bear Debug System 🐻</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: black;
  color: #00ff9f;
  overflow: hidden;
}

/* MATRIX */
#matrix {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* HUD */
#hud {
  position: fixed;
  top: 10px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
  font-size: 20px;
  z-index: 10;
}

/* LEAD */
#lead {
  position: fixed;
  bottom: 10px;
  left: 20px;
  z-index: 10;
  max-width: 60%;
}

/* TERMINAL */
#terminal {
  position: fixed;
  inset: 0;
  background: black;
  color: #00ff9f;
  padding: 20px;
  z-index: 3;
}

#terminalText { white-space: pre-line; }

/* INTRO */
#intro {
  display: none;
  position: fixed;
  inset: 0;
  background: black;
  padding: 20px;
  z-index: 4;
}

/* GAME */
#app {
  display: none;
  padding: 20px;
  z-index: 2;
}

/* ENTITIES */
.bug {
  position: absolute;
  font-size: 48px;
  cursor: pointer;
  z-index: 5;
}

.feature { color: #00ff9f; }
.rat { color: #ff4d4d; }
.danger { filter: drop-shadow(0 0 10px red); }

/* ANIM */
.fly-right { animation: right 0.6s forwards; }
.fly-left { animation: left 0.6s forwards; }

@keyframes right {
  to { transform: translateX(300px) scale(0.5); opacity: 0; }
}
@keyframes left {
  to { transform: translateX(-300px) scale(0.5); opacity: 0; }
}

/* SHAKE */
@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(5px,-5px); }
  50% { transform: translate(-5px,5px); }
  75% { transform: translate(5px,5px); }
  100% { transform: translate(0,0); }
}
.shake { animation: shake 0.2s infinite; }

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="hud">
  <div id="features">🐻 0</div>
  <div id="bugs">🐀 0</div>
  <div id="timer">⏳ 0</div>
</div>

<div id="terminal">
  <div id="terminalText"></div>
  <input id="cmd">
</div>

<div id="intro">
  <h2>DEBUG SYSTEM</h2>

  <select id="diff">
    <option value="junior">Junior</option>
    <option value="middle" selected>Middle</option>
    <option value="senior">Senior</option>
  </select>

  <button id="start">START</button>
</div>

<div id="app">
  <div id="lead"></div>
  <button id="release" style="display:none;">🚀 RELEASE</button>
  <div id="log"></div>
</div>

<script>

/* STATE */
let features=0, bugs=0, missed=0;
let time=0;
let settings={};
let evo=1;
let loop, timer;

/* CONFIG */
const cfg={
 junior:{spawn:850,danger:0.08,goal:4,time:40,miss:5},
 middle:{spawn:600,danger:0.18,goal:6,time:30,miss:4},
 senior:{spawn:380,danger:0.3,goal:9,time:22,miss:3}
};

const phrases=[
"Где фичи?",
"Мы горим 🔥",
"Клиент пишет..."
];

const code=[
"if(bugs>features){deploy();}",
"console.log('works')",
"try{release()}catch(e){}"
];

/* MATRIX */
const c=document.getElementById("matrix");
const x=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;
const d=Array(100).fill(1);

setInterval(()=>{
x.fillStyle="rgba(0,0,0,0.05)";
x.fillRect(0,0,c.width,c.height);
x.fillStyle="#00ff9f";
d.forEach((y,i)=>{
x.fillText(Math.random()>0.5?0:1,i*14,y*14);
d[i]=y*14>c.height?0:y+1;
});
},40);

/* TERMINAL */
const t=document.getElementById("terminalText");
const cmd=document.getElementById("cmd");

t.innerText="Boot...\nType start";

cmd.onkeydown=e=>{
if(e.key=="Enter"){
if(cmd.value=="start"){
document.getElementById("terminal").style.display="none";
document.getElementById("intro").style.display="block";
}
cmd.value="";
}
};

/* START */
document.getElementById("start").onclick=()=>{
settings=cfg[document.getElementById("diff").value];
time=settings.time;
document.getElementById("intro").style.display="none";
run();
};

/* LOOP */
function run(){
spawn();
tick();
lead();
}

/* SPAWN */
function spawn(){
loop=setTimeout(()=>{
if(time<=0)return;

const e=document.createElement("div");
const r=Math.random();

let type;
if(r>0.6)type="feature";
else if(r>settings.danger)type="rat";
else type="danger";

e.className="bug "+type;
e.innerText=type=="feature"?"🐻":"🐀";

e.style.left=Math.random()*innerWidth+"px";
e.style.top=Math.random()*innerHeight+"px";

let c=0;

e.onclick=()=>{
c++;
if(type=="danger"&&c<2){
e.style.transform="scale(1.4)";
return;
}

if(type=="feature"){
features++;
e.classList.add("fly-right");
}else{
bugs++;
e.classList.add("fly-left");
}

hud();
setTimeout(()=>e.remove(),500);
};

document.body.appendChild(e);

setTimeout(()=>{
if(document.body.contains(e)){
if(type!="feature"){
missed++;
if(missed>=settings.miss)gameOver("💣 PROD DOWN");
shake();
}
e.remove();
}
},2000);

spawn();
},settings.spawn/(1+(1-time/settings.time)));
}

/* TIMER */
function tick(){
timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏳ "+time;

if(time%10==0)evo+=0.2;

if(time<=0)finish();

},1000);
}

/* LEAD */
function lead(){
setInterval(()=>{
let m;

if(bugs>features)m="❌ BUGS>FEATURES";
else if(time<10)m="⏳ DEADLINE";
else if(Math.random()<0.3)m=code[Math.random()*code.length|0];
else m=phrases[Math.random()*phrases.length|0];

document.getElementById("lead").innerText="🧑‍💼 "+m;
},2500);
}

/* HUD */
function hud(){
document.getElementById("features").innerText="🐻 "+features;
document.getElementById("bugs").innerText="🐀 "+bugs;

if(features>=settings.goal)
document.getElementById("release").style.display="block";
}

/* SHAKE */
function shake(){
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),500);
}

/* GAME OVER */
function gameOver(r){
clearInterval(timer);
clearTimeout(loop);
document.body.classList.add("shake");

document.getElementById("app").style.display="block";
document.getElementById("log").innerText=r+"\n💀 FAIL";
}

/* FINISH */
function finish(){
clearInterval(timer);
clearTimeout(loop);

let r=bugs>features?"📉 FAIL":"🚀 OK";

document.getElementById("app").style.display="block";
document.getElementById("log").innerText=
r+"\n🐻 "+features+"\n🐀 "+bugs;
}

/* RELEASE */
document.getElementById("release").onclick=finish;

</script>

</body>
</html>
