<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM // PROD DEBUG GAME</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  overflow:hidden;
  color:#00ff9f;
}

#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:20px;
  z-index:9999;
  text-align:center;
  padding:20px;
}

#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

#console{
  position:fixed;
  inset:0;
  background:black;
  padding:20px;
  display:flex;
  flex-direction:column;
  z-index:10;
}

#terminalHeader{opacity:0.8;margin-bottom:10px;}

#terminalLog{
  flex:1;
  overflow:auto;
  font-size:14px;
}

#terminalInputLine{
  display:flex;
  gap:10px;
  border-top:1px solid #00ff9f;
  padding-top:10px;
}

#cmd{
  flex:1;
  background:black;
  border:none;
  color:#00ff9f;
  outline:none;
  font-size:16px;
}

#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:18px;
  z-index:5;
}

#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  z-index:5;
}

.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
}

.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}
.anime{color:#ff4dff;font-size:70px;text-shadow:0 0 10px #ff4dff;}
.kalyan{color:#00ffaa;font-size:75px;text-shadow:0 0 10px #00ffaa;}

#stats{
  position:fixed;
  top:140px;
  left:20px;
  color:white;
  font-size:14px;
}

#tip{
  position:fixed;
  bottom:210px;
  left:20px;
  color:#00ff9f;
  font-size:14px;
  opacity:0.9;
}

#bossModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

#bossBox{
  width:420px;
  background:#111;
  border:2px solid red;
  padding:20px;
  text-align:center;
  color:white;
}

#olgaEmotion{
  font-size:20px;
  margin-bottom:10px;
}

.card{
  width:140px;
  height:120px;
  background:#111;
  border:2px solid #00ff9f;
  border-radius:10px;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  margin:5px;
}
</style>
</head>

<body>

<div id="intro">
🚨 PROD УПАЛ 🚨<br><br>
🐀 БАГИ — кликай<br>
🐻 ФИЧИ — кликай<br><br>
🎯 JUNIOR → MIDDLE → SENIOR<br><br>
👉 нажми любую клавишу
</div>

<canvas id="matrix"></canvas>

<div id="console">
  <div id="terminalHeader">SYSTEM TERMINAL</div>
  <div id="terminalLog">> start</div>
  <div id="terminalInputLine">
    ><input id="cmd">
  </div>
</div>

<div id="hud">
  <div id="left">🐻 0</div>
  <div id="right">🐀 0</div>
</div>

<div id="level"></div>

<div id="stats">
HP: <span id="hp">100</span> |
HAPPY: <span id="happy">0</span>
</div>

<div id="tip"></div>

<div id="bossModal">
  <div id="bossBox">
    <div id="olgaEmotion">😐 Ольга смотрит...</div>
    <div id="olgaQ"></div>
    <div id="answers"></div>
  </div>
</div>

<script>

/* INTRO */
document.addEventListener("keydown",()=>{
  document.getElementById("intro").style.display="none";
});

/* MATRIX */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";
  ctx.fillText(Math.random()>0.5?0:1,Math.random()*c.width,Math.random()*c.height);
},50);

/* STATE */
let f=0,b=0,lvl=0,run=false;
let hp=100;
let happy=0;
let bossHP=100;

let fix=30;
let bears=0;
let ratsMissed=0;
let spawnTimer=null;

/* LEVELS */
const levels=[
  {name:"JUNIOR",goal:4},
  {name:"MIDDLE",goal:6},
  {name:"SENIOR",goal:8}
];

const happyGate=[0,20,35];

/* CMD */
const cmd=document.getElementById("cmd");

cmd.onkeydown=(e)=>{
if(e.key!=="Enter") return;

if(cmd.value==="start"){
  run=true;
  document.getElementById("console").style.display="none";
  document.getElementById("hud").style.display="flex";
  next();
}
cmd.value="";
};

/* TIP */
function tip(t){
  let el=document.getElementById("tip");
  el.innerText=t;
  setTimeout(()=>el.innerText="",2000);
}

/* GAME LOOP */
function next(){

if(fix<=15){
  gameover("PROD УПАЛ");
  return;
}

/* 🔥 БОСС ГАРАНТИРОВАННО */
if(lvl>=levels.length){
  if(happy>=50){
    boss();
  } else {
    tip("Нужно 50% happiness для босса");
  }
  return;
}

document.getElementById("level").innerText=
"LEVEL "+levels[lvl].name+" | FIX "+fix+"%";

/* один единственный loop */
if(spawnTimer) clearInterval(spawnTimer);

spawnTimer=setInterval(()=>{

if(!run) return;

let e=document.createElement("div");
let r=Math.random();
let type="feature";

if(r<0.4) type="rat";
if(r>0.75) type="anime";
if(r>0.88) type="kalyan";

e.className="entity "+type;

e.innerText=
type==="rat"?"🐀":
type==="feature"?"🐻":
type==="anime"?"🌸":"💨";

e.style.left=Math.random()*innerWidth+"px";
e.style.top=Math.random()*innerHeight+"px";

e.clicked=false;

e.onclick=()=>{

e.clicked=true;

if(type==="rat") b++;
if(type==="feature"){ f++; bears++; }

if(bears>=3){
  fix+=10;
  bears=0;
  tip("+10% FIX");
}

if(type==="anime"||type==="kalyan"){
  happy+=5;
  fix-=1;
}

update();

if(f>=levels[lvl].goal && happy>=happyGate[lvl]){
  lvl++;
  next();
}

};

document.body.appendChild(e);

setTimeout(()=>{

if(!e.clicked && type==="rat"){
  ratsMissed++;
  if(ratsMissed>=3){
    fix-=5;
    ratsMissed=0;
  }
}

e.remove();

},2000);

},600);
}

function update(){
document.getElementById("left").innerText="🐻 "+f;
document.getElementById("right").innerText="🐀 "+b;
document.getElementById("hp").innerText=hp;
document.getElementById("happy").innerText=happy;
}

/* BOSS */
const questions=[
"Ты меня любишь?",
"Почему всё ломается?",
"Это баг или фича?"
];

const answers=[
{t:"Это фича",d:10,h:0},
{t:"Я проверил",d:7,h:5},
{t:"перезапусти",d:5,h:0},
{t:"кальян",d:0,h:20},
{t:"аниме",d:5,h:25}
];

function boss(){
document.getElementById("bossModal").style.display="flex";
qIndex=0;
nextRound();
}

function nextRound(){

if(hp<=0 || bossHP<=0 || qIndex>=questions.length){
  end();
  return;
}

document.getElementById("olgaQ").innerText="Ольга: "+questions[qIndex];

let box=document.getElementById("answers");
box.innerHTML="";

answers.forEach(a=>{

let c=document.createElement("div");
c.className="card";
c.innerText=a.t;

c.onclick=()=>{

bossHP-=a.d;
hp-=Math.floor(Math.random()*8);
happy+=a.h;

update();

qIndex++;
nextRound();

};

box.appendChild(c);

});

}

function end(){
document.getElementById("bossBox").innerHTML="🎉 ПОБЕДА 🎉";
}

function gameover(t){
run=false;
document.body.innerHTML=
"<div style='color:red;font-size:40px;text-align:center;margin-top:20%'>"+t+"</div>";
}

</script>
</body>
</html>
