<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM // PROD DEBUG GAME</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  overflow:hidden;
  color:#00ff9f;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:20px;
  z-index:9999;
  text-align:center;
  padding:20px;
}

/* MATRIX */
canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

/* CONSOLE */
#console{
  position:fixed;
  inset:0;
  background:black;
  padding:20px;
  display:flex;
  flex-direction:column;
  z-index:10;
}

#terminalInputLine{
  display:flex;
  gap:10px;
  border-top:1px solid #00ff9f;
  padding-top:10px;
}

#cmd{
  flex:1;
  background:black;
  border:none;
  color:#00ff9f;
  outline:none;
  font-size:16px;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  z-index:5;
}

/* LEVEL */
#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:20px;
}

/* STATS */
#stats{
  position:fixed;
  top:140px;
  left:20px;
  color:white;
  font-size:14px;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
}

.rat{color:#ff4d4d;}
.feature{color:#00ff9f;}
.anime{color:#ff4dff;}
.kalyan{color:#00ffaa;}

/* FLASH */
#flash{
  position:fixed;
  inset:0;
  background:red;
  opacity:0;
  z-index:9999;
  pointer-events:none;
  transition:0.2s;
}

/* SHAKE */
.shake{
  animation:shake 0.2s;
}

@keyframes shake{
  0%{transform:translate(0,0);}
  25%{transform:translate(5px,-5px);}
  50%{transform:translate(-5px,5px);}
  75%{transform:translate(5px,5px);}
  100%{transform:translate(0,0);}
}

/* CARDS */
#hand{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  z-index:1000;
}

.card{
  width:140px;
  height:90px;
  background:#111;
  border:2px solid #00ff9f;
  margin:5px;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* BOSS */
#boss{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.9);
  z-index:999;
}

#box{
  width:420px;
  background:#111;
  border:2px solid red;
  padding:20px;
  text-align:center;
  color:white;
}

#emo{
  font-size:20px;
  margin-bottom:10px;
}

</style>
</head>

<body>

<div id="intro">
🚨 PROD УПАЛ 🚨<br><br>

🐀 баги = плохо<br>
🐻 фичи = хорошо<br><br>

🃏 карты: DEV / BUG / ANIME / KALYAN<br>
❌ негатив: ВОПРОСЫ С РАБОТКИ / ОЛЬГА<br><br>

👉 нажми любую клавишу
</div>

<div id="flash"></div>

<canvas id="matrix"></canvas>

<div id="console">
  <div>> SYSTEM READY</div>
  <div id="terminalInputLine">
    ><input id="cmd">
  </div>
</div>

<div id="hud">
  <div>🐻 <span id="f">0</span></div>
  <div>🐀 <span id="b">0</span></div>
</div>

<div id="level"></div>

<div id="stats">
HP: <span id="hp">100</span> |
HAPPY: <span id="happy">0</span>
</div>

<div id="hand"></div>

<div id="boss">
  <div id="box">
    <div id="emo">😐 Ольга</div>
    <div id="q"></div>
    <div id="cards"></div>
  </div>
</div>

<script>

/* STATE */
let f=0,b=0,hp=100,happy=0,bossHP=100;
let lvl=0,run=false;

/* START */
document.addEventListener("keydown",()=>{
  document.getElementById("intro").style.display="none";
});

/* MATRIX */
const c=document.querySelector("canvas");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
},50);

/* CMD */
document.getElementById("cmd").onkeydown=(e)=>{
if(e.key==="Enter" && e.target.value==="start"){
  run=true;
  document.getElementById("console").style.display="none";
  document.getElementById("hud").style.display="flex";
  next();
}
};

/* FX */
function shake(){
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),200);
}

function flash(){
let f=document.getElementById("flash");
f.style.opacity="0.4";
setTimeout(()=>f.style.opacity=0,150);
}

/* GAME LOOP */
function next(){

document.getElementById("level").innerText="LEVEL "+lvl;

setInterval(()=>{

if(!run) return;

let e=document.createElement("div");
let r=Math.random();
let type="feature";

if(r<0.4) type="rat";
if(r>0.75) type="anime";
if(r>0.88) type="kalyan";

e.className="entity "+type;
e.innerText="●";

e.onclick=()=>{

if(type==="rat") b++;
if(type==="feature") f++;
if(type==="anime") happy+=25;
if(type==="kalyan") happy+=40;

update();

};

e.style.left=Math.random()*innerWidth+"px";
e.style.top=Math.random()*innerHeight+"px";

document.body.appendChild(e);
setTimeout(()=>e.remove(),2000);

},600);
}

/* UPDATE */
function update(){
f_el.innerText=f;
b_el.innerText=b;
hp_el.innerText=hp;
happy_el.innerText=happy;
}

/* CARDS */
const cards=[
{t:"DEV FIX",d:10,h:0},
{t:"BUG LOOP",d:-5,h:0},
{t:"ANIME",d:0,h:25},
{t:"KALYAN",d:0,h:40},
{t:"ВОПРОСЫ С РАБОТКИ",d:-20,h:0},
{t:"ВОПРОСИКИ ОЛЬГИ",d:0,h:-25}
];

/* BOSS */
const qs=["Ты меня любишь?","Почему баги?","Это прод?"];

function boss(){
document.getElementById("boss").style.display="flex";
round();
}

function round(){

setMood();

document.getElementById("q").innerText=
"🐀 "+qs[Math.floor(Math.random()*qs.length)];

let c=document.getElementById("cards");
c.innerHTML="";

cards.forEach(a=>{

let el=document.createElement("div");
el.className="card";
el.innerText=a.t;

el.onclick=()=>{

if(a.d<0){hp+=a.d;shake();}
if(a.d>0){bossHP-=a.d;}
if(a.h<0){happy+=a.h;flash();}
if(a.h>0){happy+=a.h;}

update();

if(hp<=0||bossHP<=0){
end();
return;
}

round();

};

c.appendChild(el);

});

}

/* EMO */
function setMood(){
let e=document.getElementById("emo");

if(bossHP<30){e.innerText="😱 паника";flash();}
else if(hp<40){e.innerText="😡 злость";flash();}
else{e.innerText="😐 Ольга";}
}

/* END */
function end(){
document.getElementById("box").innerHTML="🎉 WIN 🎉";

for(let i=0;i<30;i++){
let d=document.createElement("div");
d.innerText="🍰";
d.style.position="absolute";
d.style.left=Math.random()*100+"%";
d.style.top=Math.random()*100+"%";
document.body.appendChild(d);
}
}

</script>

</body>
</html>
