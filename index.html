<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM // PROD DEBUG GAME</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  overflow:hidden;
  color:#00ff9f;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:28px;
  z-index:9999;
  text-align:center;
}

/* MATRIX */
#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

/* TERMINAL */
#console{
  position:fixed;
  inset:0;
  background:black;
  padding:20px;
  display:flex;
  flex-direction:column;
  z-index:10;
}

#terminalHeader{opacity:0.8;margin-bottom:10px;}

#terminalLog{
  flex:1;
  overflow:auto;
  font-size:14px;
  line-height:1.4;
}

#terminalInputLine{
  display:flex;
  gap:10px;
  border-top:1px solid #00ff9f;
  padding-top:10px;
}

#cmd{
  flex:1;
  background:black;
  border:none;
  color:#00ff9f;
  outline:none;
  font-size:16px;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:20px;
  z-index:5;
}

/* LEVEL */
#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  z-index:5;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
  text-align:center;
}

.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}
.joker{color:gold;font-size:80px;}

/* LOVE */
#loveWrap{
  position:fixed;
  top:110px;
  left:50%;
  transform:translateX(-50%);
  width:300px;
  height:16px;
  border:2px solid #ff4d4d;
  z-index:5;
}

#loveBar{
  width:50%;
  height:100%;
  background:#ff4d4d;
  transition:.3s;
}

/* STATS */
#stats{
  position:fixed;
  top:150px;
  left:20px;
  color:white;
  font-size:14px;
  z-index:5;
}

/* ===== HEARTHSTONE HAND ===== */
#hand{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  height:220px;
  z-index:1000;
}

.card{
  width:120px;
  height:160px;
  background:#111;
  border:2px solid #00ff9f;
  border-radius:12px;
  position:absolute;
  bottom:0;
  cursor:grab;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:12px;
  color:white;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-60px) scale(1.1)!important;
}

/* BOSS */
#bossModal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.9);
  z-index:999;
  flex-direction:column;
}

#bossCard{
  width:420px;
  background:#111;
  border:2px solid #ff4d4d;
  border-radius:14px;
  padding:20px;
  text-align:center;
  color:#fff;
}

.optionBtn{
  padding:10px;
  background:black;
  border:1px solid #00ff9f;
  color:#00ff9f;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
🚨 PROD УПАЛ<br>
SUPER ARTEEM СПАСАЕТ<br><br>
нажми любую клавишу
</div>

<canvas id="matrix"></canvas>

<div id="console">
  <div id="terminalHeader">SYSTEM TERMINAL</div>
  <div id="terminalLog">> start</div>
  <div id="terminalInputLine">
    ><input id="cmd">
  </div>
</div>

<div id="hud">
  <div id="left">🐻 0</div>
  <div id="right">🐀 0</div>
</div>

<div id="level"></div>

<div id="loveWrap"><div id="loveBar"></div></div>

<div id="stats">
HP: <span id="hp">100</span> |
HAPPY: <span id="happy">0</span>
</div>

<div id="hand"></div>

<div id="bossModal">
  <div id="bossCard">
    <div style="color:#ff4d4d;font-size:20px;">🐀 ОЛЬГА КРЫСА</div>
    <div id="bossQ">...</div>
    <div id="bossOptions"></div>
  </div>
</div>

<script>

/* ===== INTRO ===== */
document.addEventListener("keydown",()=>{
  document.getElementById("intro").style.display="none";
});

/* ===== MATRIX ===== */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";
  ctx.fillText(Math.random()>0.5?0:1,Math.random()*c.width,Math.random()*c.height);
},50);

/* ===== STATE ===== */
let f=0,b=0,lvl=0,run=false;
let hp=100,happy=0;

const levels=[
  {name:"JUNIOR",goal:4},
  {name:"MIDDLE",goal:6},
  {name:"SENIOR",goal:8}
];

/* ===== CMD ===== */
const cmd=document.getElementById("cmd");
const log=document.getElementById("terminalLog");

cmd.onkeydown=(e)=>{
if(e.key!=="Enter") return;

let v=cmd.value;
log.innerHTML+="<br>> "+v;

if(v==="start"){
  run=true;
  document.getElementById("console").style.display="none";
  document.getElementById("hud").style.display="flex";
  next();
}

cmd.value="";
};

/* ===== GAME ===== */
function next(){

if(lvl>=levels.length){
  boss();
  return;
}

document.getElementById("level").innerText="LEVEL: "+levels[lvl].name;

setInterval(()=>{

if(!run) return;

let e=document.createElement("div");

let r=Math.random();
let type="feature";
if(r<0.4) type="rat";
if(r>0.85) type="joker";

e.className="entity "+type;

if(type==="rat") e.innerHTML="🐀";
if(type==="feature") e.innerHTML="🐻";
if(type==="joker") e.innerHTML="🃏";

e.style.left=Math.random()*innerWidth+"px";
e.style.top=Math.random()*innerHeight+"px";

e.onclick=()=>{

if(type==="rat") b++;
if(type==="feature") f++;

if(type==="joker"){
  hp+=100;
  happy+=100;
  updateStats();
}

update();
e.remove();

if(f>=levels[lvl].goal){
  lvl++;
  next();
}

};

document.body.appendChild(e);
setTimeout(()=>e.remove(),2000);

},600);
}

/* ===== UPDATE ===== */
function update(){
left.innerText="🐻 "+f;
right.innerText="🐀 "+b;
}

/* ===== STATS ===== */
function updateStats(){
document.getElementById("hp").innerText=hp;
document.getElementById("happy").innerText=happy;
}

/* ===== HEARTHSTONE HAND ===== */

let hand=[];
const cards=[
  {name:"🧙 DEV FIX",type:"DEV"},
  {name:"🐀 BUG LOOP",type:"BUG"},
  {name:"🌸 ANIME BOOST",type:"ANIME"},
  {name:"👑 LEGENDARY",type:"LEG"}
];

function drawCard(){

let c=cards[Math.floor(Math.random()*cards.length)];

let el=document.createElement("div");
el.className="card";
el.innerHTML=c.name;

document.getElementById("hand").appendChild(el);

el.onmousedown=(e)=>{

document.onmousemove=(ev)=>{
el.style.position="fixed";
el.style.left=ev.clientX+"px";
el.style.top=ev.clientY+"px";
};

document.onmouseup=()=>{

document.onmousemove=null;

/* EFFECTS */
if(c.type==="BUG") b++;
if(c.type==="DEV") f++;
if(c.type==="ANIME") hp+=20;
if(c.type==="LEG") happy+=50;

update();
updateStats();

el.remove();
};

};

}

/* AUTO DRAW */
setInterval(()=>{
if(run && Math.random()<0.15){
drawCard();
}
},1200);

/* ===== OLGA BOSS (RESTORED FULL) ===== */
function boss(){

const modal=document.getElementById("bossModal");
modal.style.display="flex";

const q=document.getElementById("bossQ");
const opt=document.getElementById("bossOptions");

let questions=[
"Ты меня любишь?",
"А если я баг?",
"Я фикс или нет?"
];

let answers=["❤️ да","💨 кальян","🍕 пицца", "БААААААААААААААО", "ты БАГ", "Я АРТЕЕЕЕЕЕЕЕЕЕЕЕЕЕЕЕЕЕЕЕЕЕМ"];

let i=0;

function render(){

if(i>=questions.length){
  end();
  return;
}

q.innerText=questions[i];
opt.innerHTML="";

answers.forEach(a=>{
let b=document.createElement("div");
b.className="optionBtn";
b.innerText=a;

b.onclick=()=>{
hp+=10;
happy+=10;
updateStats();
i++;
render();
};

opt.appendChild(b);
});

}

render();
}

/* ===== END (CAKES RESTORED) ===== */
function end(){

let win=document.createElement("div");
win.style.position="fixed";
win.style.inset="0";
win.style.background="black";
win.style.color="#ff4d4d";
win.style.display="flex";
win.style.alignItems="center";
win.style.justifyContent="center";
win.innerHTML="🎉 ARTEM WIN 🎉";
document.body.appendChild(win);

for(let i=0;i<40;i++){
let c=document.createElement("div");
c.innerText="🍰";
c.style.position="absolute";
c.style.left=Math.random()*100+"%";
c.style.top=Math.random()*100+"%";
document.body.appendChild(c);
}

}

</script>
</body>
</html>
