<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM // PROD DEBUG GAME</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  overflow:hidden;
  color:#00ff9f;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:20px;
  z-index:9999;
  text-align:center;
  padding:20px;
}

/* MATRIX */
#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

/* TERMINAL */
#console{
  position:fixed;
  inset:0;
  background:black;
  padding:20px;
  display:flex;
  flex-direction:column;
  z-index:10;
}

#terminalHeader{opacity:0.8;margin-bottom:10px;}

#terminalLog{
  flex:1;
  overflow:auto;
  font-size:14px;
}

#terminalInputLine{
  display:flex;
  gap:10px;
  border-top:1px solid #00ff9f;
  padding-top:10px;
}

#cmd{
  flex:1;
  background:black;
  border:none;
  color:#00ff9f;
  outline:none;
  font-size:16px;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:18px;
  z-index:5;
}

/* LEVEL */
#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  z-index:5;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
}

.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}
.anime{color:#ff4dff;font-size:70px;}
.kalyan{color:#00ffaa;font-size:75px;}

/* STATS */
#stats{
  position:fixed;
  top:140px;
  left:20px;
  color:white;
  font-size:14px;
}

/* FLASH */
#flash{
  position:fixed;
  inset:0;
  background:red;
  opacity:0;
  pointer-events:none;
  z-index:9999;
  transition:0.2s;
}

/* SHAKE */
@keyframes shake{
  0%{transform:translate(0,0);}
  25%{transform:translate(5px,-5px);}
  50%{transform:translate(-5px,5px);}
  75%{transform:translate(5px,5px);}
  100%{transform:translate(0,0);}
}

.shake{
  animation:shake 0.2s;
}

/* CARDS */
.card{
  width:140px;
  height:100px;
  background:#111;
  border:2px solid #00ff9f;
  border-radius:10px;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  margin:5px;
}

#hand{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  z-index:1000;
}

/* BOSS */
#bossModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

#bossBox{
  width:420px;
  background:#111;
  border:2px solid red;
  padding:20px;
  text-align:center;
  color:white;
}

#olgaEmotion{
  font-size:20px;
  margin-bottom:10px;
}

</style>
</head>

<body>

<div id="intro">
СМОЖЕТ ПОМОЧЬ ТОЛЬКО SUPER ARTEM ALARM🚨 PROD УПАЛ 🚨<br><br>

🐀 баги — кликай (плохо)<br>
🐻 фичи — кликай (хорошо)<br><br>

🃏 карты:<br>
DEV / BUG / ANIME / KALYAN<br><br>

❌ негативные:<br>
ВОПРОСЫ С РАБОТКИ / ВОПРОСИКИ ОЛЬГИ<br><br>

👉 нажми любую клавишу
</div>

<div id="flash"></div>

<canvas id="matrix"></canvas>

<div id="console">
  <div id="terminalHeader">SYSTEM</div>
  <div id="terminalLog">> start</div>
  <div id="terminalInputLine">
    ><input id="cmd">
  </div>
</div>

<div id="hud">
  <div>🐻 <span id="f">0</span></div>
  <div>🐀 <span id="b">0</span></div>
</div>

<div id="level"></div>

<div id="stats">
HP: <span id="hp">100</span> |
HAPPY: <span id="happy">0</span>
</div>

<div id="hand"></div>

<div id="bossModal">
  <div id="bossBox">
    <div id="olgaEmotion">😐 Ольга...</div>
    <div id="q"></div>
    <div id="cards"></div>
  </div>
</div>

<script>

/* INTRO */
document.addEventListener("keydown",()=>{
  document.getElementById("intro").style.display="none";
});

/* MATRIX */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
},50);

/* STATE */
let f=0,b=0,hp=100,happy=0,bossHP=100;

/* SHAKE */
function shake(){
  document.body.classList.add("shake");
  setTimeout(()=>document.body.classList.remove("shake"),200);
}

/* FLASH */
function flash(){
  let f=document.getElementById("flash");
  f.style.opacity="0.4";
  setTimeout(()=>f.style.opacity=0,150);
}

/* LEVEL LOOP */
setInterval(()=>{
if(!game) return;

let e=document.createElement("div");
let r=Math.random();
let type="feature";

if(r<0.4) type="rat";
if(r>0.75) type="anime";
if(r>0.88) type="kalyan";

e.className="entity "+type;
e.innerText=type==="rat"?"🐀":"🐻";

e.onclick=()=>{

if(type==="rat") b++;
if(type==="feature") f++;
if(type==="anime") happy+=25;
if(type==="kalyan") happy+=40;

update();

};

document.body.appendChild(e);
setTimeout(()=>e.remove(),2000);

},600);

/* UPDATE */
function update(){
f_el.innerText=f;
b_el.innerText=b;
hp_el.innerText=hp;
happy_el.innerText=happy;
}

/* CARDS */
const cards=[
{t:"DEV FIX",d:10,h:0},
{t:"BUG LOOP",d:-5,h:0},
{t:"ANIME",d:0,h:25},
{t:"KALYAN",d:0,h:40},
{t:"ВОПРОСЫ С РАБОТКИ",d:-20,h:0},
{t:"ВОПРОСИКИ ОЛЬГИ",d:0,h:-25}
];

/* BOSS */
const qs=["Ты меня любишь?","Почему баги?","Это точно прод?"];

function boss(){
document.getElementById("bossModal").style.display="flex";
next();
}

function next(){

setMood();

document.getElementById("q").innerText=
"🐀 Ольга: "+qs[Math.floor(Math.random()*qs.length)];

let box=document.getElementById("cards");
box.innerHTML="";

cards.forEach(c=>{

let el=document.createElement("div");
el.className="card";
el.innerText=c.t;

el.onclick=()=>{

if(c.d<0){hp+=c.d;shake();}
if(c.d>0){bossHP-=c.d;}
if(c.h<0){happy+=c.h;flash();}
if(c.h>0){happy+=c.h;}

update();

if(hp<=0||bossHP<=0){
end();
return;
}

next();

};

box.appendChild(el);

});

}

/* EMOTION */
function setMood(){
let e=document.getElementById("olgaEmotion");

if(bossHP<30){e.innerText="😱 паника";flash();}
else if(hp<40){e.innerText="😡 злость";flash();}
else{e.innerText="😐 смотрит";}
}

/* END */
function end(){
document.getElementById("bossBox").innerHTML="🎉 WIN 🎉";

for(let i=0;i<30;i++){
let d=document.createElement("div");
d.innerText="🍰";
d.style.position="absolute";
d.style.left=Math.random()*100+"%";
d.style.top=Math.random()*100+"%";
document.body.appendChild(d);
}
}

</script>

</body>
</html>
