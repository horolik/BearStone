<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEM</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  overflow:hidden;
  color:#00ff9f;
}

/* MATRIX CANVAS */
canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

/* START SCREEN */
#start{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:22px;
  background:black;
  z-index:1000;
}

/* TERMINAL */
#terminal{
  background:black;
  border:1px solid #00ff9f;
  padding:20px;
  width:300px;
}

#input{
  background:black;
  border:none;
  color:#00ff9f;
  outline:none;
  width:100%;
  font-family:monospace;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  z-index:2;
}

#level{
  position:fixed;
  top:40px;
  width:100%;
  text-align:center;
  z-index:2;
}

#stats{
  position:fixed;
  top:80px;
  left:20px;
  color:white;
  z-index:2;
}

#guide{
  position:fixed;
  bottom:20px;
  left:20px;
  right:20px;
  border:1px solid #00ff9f;
  padding:10px;
  background:rgba(0,0,0,0.5);
  z-index:2;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
  z-index:2;
}

.rat{color:red;}
.feature{color:#00ff9f;}
.fun{color:#ff4dff;}

#boss{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:white;
  font-size:20px;
  z-index:3;
}

/* OLGA IMAGE STYLE */
#boss img{
  width:200px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 0 20px #ff4dff;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="start">
<div id="terminal">
> Введите команду для запуска:<br><br>
> <input id="input" autofocus placeholder="start">
</div>
</div>

<div id="hud">
<div id="f">🐻 0</div>
<div id="r">🐀 0</div>
</div>

<div id="level"></div>

<div id="stats">
FIX: <span id="fix">30</span>% |
HAPPY: <span id="happy">0</span>
</div>

<div id="guide"></div>

<div id="boss"></div>

<script>

/* MATRIX BACKGROUND */
let c = document.getElementById("matrix");
let ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

let letters = "01";
letters = letters.split("");

let fontSize = 14;
let columns = c.width / fontSize;

let drops = [];
for(let i=0;i<columns;i++) drops[i]=1;

function drawMatrix(){
ctx.fillStyle = "rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle = "#00ff9f";
ctx.font = fontSize + "px monospace";

for(let i=0;i<drops.length;i++){
let text = letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize > c.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}

setInterval(drawMatrix,33);

/* STATE */
let run=false;
let f=0, r=0;
let fix=30;
let happy=0;
let lvl=0;
let bossStarted=false;
let timer;

/* LEVELS */
const levels=["JUNIOR","MIDDLE","SENIOR"];

/* TERMINAL START */
document.getElementById("input").addEventListener("keydown", (e)=>{
if(e.key==="Enter"){
if(e.target.value.toLowerCase()==="start"){
document.getElementById("start").style.display="none";
document.getElementById("hud").style.display="flex";
run=true;
loop();
}
}
});

/* UPDATE UI */
function update(){

document.getElementById("f").innerText="🐻 "+f;
document.getElementById("r").innerText="🐀 "+r;
document.getElementById("fix").innerText=fix;
document.getElementById("happy").innerText=happy;

document.getElementById("level").innerText=
"LEVEL: "+levels[lvl];

document.getElementById("guide").innerHTML=
"🐀 Лови баги (иначе -FIX)<br>"+
"🐻 Фичи дают +FIX<br>"+
"🌸 Дают happiness<br>"+
"🎯 50% happiness → БОСС";
}

/* GAME LOOP */
function loop(){

timer=setInterval(()=>{

if(!run) return;

/* BOSS */
if(!bossStarted && happy>=50){
bossStarted=true;
clearInterval(timer);
showBoss();
return;
}

/* GAME OVER */
if(fix<=0){
document.body.innerHTML="<h1 style='color:red;text-align:center;margin-top:20%'>PROD УПАЛ</h1>";
return;
}

/* SPAWN */
let e=document.createElement("div");
let rand=Math.random();
let type="feature";

if(rand<0.4) type="rat";
if(rand>0.75) type="fun";

e.className="entity "+type;

e.innerText=
type==="rat"?"🐀":
type==="feature"?"🐻":"🌸";

e.style.left=Math.random()*window.innerWidth+"px";
e.style.top=Math.random()*window.innerHeight+"px";

e.onclick=()=>{

if(type==="rat"){
r++;
fix+=2;
}

if(type==="feature"){
f++;
fix+=3;
}

if(type==="fun"){
happy+=5;
fix-=3;
}

/* LEVEL UP */
if(f>=5 && lvl<2){
lvl++;
f=0;
}

update();
};

document.body.appendChild(e);

/* REMOVE */
setTimeout(()=>{
if(e.parentNode) e.remove();
},1500);

},500);
}

/* BOSS */
function showBoss(){

let b=document.getElementById("boss");
b.style.display="flex";

/* ВОПРОСЫ */
let questions = [
"Ты меня любишь?",
"Ты будешь меня любить, если я буду рыбой?",
"А если я превращусь в баг?",
"А если я удалю прод?",
"А если я буду просто console.log?",
"А если я никогда не закрою тикет?"
];

let qIndex = 0;

function renderQuestion(){

b.innerHTML =
"😈 ОЛЬГА БОСС<br><br>" +
"<img src='Olga.JPG'><br>" +
questions[qIndex] + "<br><br>";

["БАО","На кальян","ЭТО ФИЧА", "Лови пиццу", "Я АРТЕМ", "ТЫ БААААААГ"].forEach(t=>{
let btn=document.createElement("div");

btn.innerText=t;
btn.style.border="1px solid white";
btn.style.padding="10px";
btn.style.margin="5px";
btn.style.cursor="pointer";

btn.onclick=()=>{

qIndex++;

/* ЕСЛИ ВОПРОСЫ ЗАКОНЧИЛИСЬ */
if(qIndex >= questions.length){
b.innerHTML="🎉 ПОБЕДА! PROD ПОЧИНЕН 🎉 Артем, с Днем рождения!";
return;
}

renderQuestion();
};

b.appendChild(btn);
});

}

renderQuestion();
}

update();

</script>
</body>
</html>
