<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEM ULTRA HC</title>

<style>
body{margin:0;background:black;font-family:monospace;overflow:hidden;color:#00ff9f;}
canvas{position:fixed;inset:0;z-index:0;}
#start{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:22px;background:black;z-index:1000;}
#terminal{background:black;border:1px solid #00ff9f;padding:20px;width:300px;}
#input{background:black;border:none;color:#00ff9f;outline:none;width:100%;font-family:monospace;}
#hud{position:fixed;top:10px;left:20px;right:20px;display:none;justify-content:space-between;z-index:2;}
#level{position:fixed;top:40px;width:100%;text-align:center;z-index:2;}
#stats{position:fixed;top:80px;left:20px;color:white;z-index:2;}
#guide{position:fixed;bottom:20px;left:20px;right:20px;border:1px solid #00ff9f;padding:10px;background:rgba(0,0,0,0.5);z-index:2;}
.entity{position:absolute;font-size:60px;cursor:pointer;z-index:2;transition:.2s;}
.rat{color:red;} .feature{color:#00ff9f;}
.kalyan{width:120px;height:120px;object-fit:contain;}
#boss{position:fixed;inset:0;background:black;display:none;align-items:center;justify-content:center;flex-direction:column;color:white;z-index:3;}
#boss img{width:200px;border-radius:12px;margin-bottom:15px;box-shadow:0 0 20px #ff4dff;}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="start">
<div id="terminal">
> 🐀🐀🐀ALARM! PROD сломался. Его сможет починить только SUPER ARTEM!<br><br>
> команды: start / help / deploy<br>
> <input id="input" autofocus placeholder="start">
</div>
</div>

<div id="hud"><div id="f">🐻 0</div><div id="r">🐀 0</div></div>
<div id="level"></div>
<div id="stats">FIX: <span id="fix">30</span>% | HAPPY: <span id="happy">0</span></div>
<div id="guide"></div>
<div id="boss"></div>

<!-- SOUND -->
<audio id="sRat" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="sFeat" src="https://assets.mixkit.co/active_storage/sfx/1114/1114-preview.mp3"></audio>
<audio id="sFun" src="https://assets.mixkit.co/active_storage/sfx/1559/1559-preview.mp3"></audio>

<script>
/* MATRIX */
let c=document.getElementById("matrix");let ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;
let letters="01".split("");let fontSize=14;let columns=c.width/fontSize;let drops=[];
for(let i=0;i<columns;i++) drops[i]=1;
setInterval(()=>{
ctx.fillStyle="rgba(0,0,0,0.05)";ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#00ff9f";ctx.font=fontSize+"px monospace";
for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
if(drops[i]*fontSize>c.height && Math.random()>0.975)drops[i]=0;
drops[i]++;}
},33);

/* STATE */
let run=false,f=0,r=0,fix=30,happy=0,lvl=0,bossStarted=false,timer,combo=0;
const levels=["JUNIOR","MIDDLE","SENIOR"];

/* TERMINAL */
document.getElementById("input").addEventListener("keydown",(e)=>{
if(e.key!=="Enter")return;
let v=e.target.value.toLowerCase();
if(v==="start"){start();}
if(v==="help"){alert("start / deploy / fix / artem");}
if(v==="deploy"){alert("deploying Artem...");}
if(v==="artem"){fix=999;happy=999;}
});

function start(){
document.getElementById("start").style.display="none";
document.getElementById("hud").style.display="flex";
run=true;loop();}

/* UI */
function update(){
document.getElementById("f").innerText="🐻 "+f;
document.getElementById("r").innerText="🐀 "+r;
document.getElementById("fix").innerText=fix;
document.getElementById("happy").innerText=happy;
document.getElementById("level").innerText="LEVEL: "+levels[lvl];
document.getElementById("guide").innerHTML="🐀 Лови баги<br>🐻 Фичи ↑ FIX<br>💨 кальян ↑happy ↓FIX<br>⚡ Shift +FIX | Ctrl очистка<br>🎯 99% → БОСС";
}

/* SKILLS */
document.addEventListener("keydown",(e)=>{
if(e.key==="Shift")fix+=10;
if(e.key==="Control"){
document.querySelectorAll(".rat").forEach(x=>x.remove());
r+=5;fix+=10;}
});

/* LOOP */
function loop(){
timer=setInterval(()=>{
if(!run)return;

if(!bossStarted && happy>=99){bossStarted=true;clearInterval(timer);showBoss();return;}
if(fix<=0){document.body.innerHTML="<h1 style='color:red;text-align:center;margin-top:20%'>PROD УПАЛ</h1>";return;}

let rand=Math.random();let type="feature";
if(rand<0.5) type="rat";
if(rand>0.8) type="fun";

let e=document.createElement(type==="fun"?"img":"div");
e.className="entity "+type;
if(type==="rat") e.innerText="🐀";
if(type==="feature") e.innerText="🐻";
if(type==="fun"){e.src="Kalyan.PNG";e.classList.add("kalyan");}

let x=Math.random()*innerWidth;let y=Math.random()*innerHeight;
e.style.left=x+"px";e.style.top=y+"px";

let dx=(Math.random()-0.5)*4,dy=(Math.random()-0.5)*4;
let move=setInterval(()=>{
e.style.left=e.offsetLeft+dx+"px";
e.style.top=e.offsetTop+dy+"px";
},30);

 e.onclick=()=>{
combo++;
e.style.transform="scale(1.4)";
e.style.opacity=0;

if(type==="rat"){r++;fix+=2+combo;document.getElementById("sRat").play();}
if(type==="feature"){f++;fix+=3+combo;document.getElementById("sFeat").play();}
if(type==="fun"){happy+=5;fix-=3;document.getElementById("sFun").play();}

if(f>=5 && lvl<2){lvl++;f=0;}
update();
setTimeout(()=>e.remove(),200);
 };

 document.body.appendChild(e);
 setTimeout(()=>{clearInterval(move);e.remove();combo=0;},1500);

},Math.max(200,500-lvl*100));
}

/* BOSS */
function showBoss(){
let b=document.getElementById("boss");b.style.display="flex";
let questions=[
"Ты меня любишь?",
"Ты будешь любить если я баг?",
"А если удалю прод?",
"А если я console.log?",
"А если не закрою тикет?"
];
let i=0;
function render(){
b.innerHTML="😈 ОЛЬГА БОСС<br><img src='Olga.JPG'><br>"+questions[i];
["ДА","КОНЕЧНО","ЭТО ФИЧА","Я АРТЕМ"].forEach(t=>{
let btn=document.createElement("div");
btn.innerText=t;
btn.style.border="1px solid white";
btn.style.padding="10px";
btn.style.margin="5px";
btn.style.cursor="pointer";
btn.onclick=()=>{
i++;
if(i>=questions.length){b.innerHTML="🎉 ПОБЕДА! PROD ПОЧИНЕН 🎉";return;}
render();
};
b.appendChild(btn);
});}
render();}

update();
</script>
</body>
</html>
