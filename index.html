<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Bear Debug System 🐻</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: black;
  color: #00ff9f;
  overflow: hidden;
}

/* MATRIX */
#matrix {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* HUD */
#hud {
  position: fixed;
  top: 10px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
  font-size: 20px;
  z-index: 10;
}

/* TERMINAL */
#terminal {
  position: fixed;
  inset: 0;
  background: black;
  color: #00ff9f;
  padding: 20px;
  z-index: 3;
}

#terminalText { white-space: pre-line; }

#commandInput {
  background: black;
  border: none;
  color: #00ff9f;
  outline: none;
}

/* INTRO */
#intro {
  display: none;
  position: fixed;
  inset: 0;
  background: black;
  z-index: 4;
  padding: 20px;
}

/* GAME */
#app {
  display: none;
  padding: 20px;
  z-index: 2;
}

/* ENTITIES */
.bug {
  position: absolute;
  font-size: 48px;
  cursor: pointer;
  z-index: 5;
}

.feature { color: #00ff9f; }
.rat { color: #ff4d4d; }
.danger { filter: drop-shadow(0 0 10px red); }

/* ANIM */
.fly-right { animation: flyRight 0.6s forwards; }
.fly-left { animation: flyLeft 0.6s forwards; }

@keyframes flyRight {
  to { transform: translateX(300px) scale(0.5); opacity: 0; }
}
@keyframes flyLeft {
  to { transform: translateX(-300px) scale(0.5); opacity: 0; }
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="hud">
  <span id="featuresCount">🐻 0</span>
  <span id="bugsCount">🐀 0</span>
  <span id="timer">⏳ 0</span>
</div>

<!-- TERMINAL -->
<div id="terminal">
  <div id="terminalText"></div>
  <div>> <input id="commandInput"></div>
</div>

<!-- INTRO -->
<div id="intro">
  <h2>DEBUG TRAINING</h2>

  <select id="difficulty">
    <option value="junior">Junior</option>
    <option value="middle" selected>Middle</option>
    <option value="senior">Senior</option>
  </select>

  <button id="startBtn">START</button>
</div>

<!-- GAME -->
<div id="app">
  <p id="lead"></p>
  <button id="releaseBtn" style="display:none;">🚀 RELEASE</button>
  <p id="log"></p>
</div>

<script>

/* STATE */
let features = 0;
let bugs = 0;
let missedRats = 0;

let timeLeft;
let settings = {};
let interval;
let timerInterval;

/* BALANCE */
const difficultyConfig = {
  junior: { spawnRate: 850, dangerChance: 0.08, featureGoal: 4, time: 40, maxMissed: 5 },
  middle: { spawnRate: 600, dangerChance: 0.18, featureGoal: 6, time: 30, maxMissed: 4 },
  senior: { spawnRate: 380, dangerChance: 0.30, featureGoal: 9, time: 22, maxMissed: 3 }
};

const leadPhrases = [
  "Где фичи?",
  "Почему столько багов?",
  "Мы горим 🔥",
  "Клиент пишет..."
];

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

const drops = Array.from({length: canvas.width/14}).fill(1);

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#00ff9f";

  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?"0":"1", i*14, y*14);
    if(y*14>canvas.height) drops[i]=0;
    drops[i]++;
  });
},40);

/* TERMINAL */
const termText = document.getElementById("terminalText");
const input = document.getElementById("commandInput");

termText.innerText = "Booting...\nType 'start'";

input.addEventListener("keydown", e=>{
  if(e.key==="Enter"){
    if(input.value==="start"){
      document.getElementById("terminal").style.display="none";
      document.getElementById("intro").style.display="block";
    }
    input.value="";
  }
});

/* START */
document.getElementById("startBtn").onclick=()=>{
  settings = difficultyConfig[document.getElementById("difficulty").value];
  timeLeft = settings.time;

  document.getElementById("intro").style.display="none";
  startGameLoop();
};

/* GAME LOOP */
function startGameLoop(){
  spawnLoop();
  startTimer();
  startLead();
}

function spawnLoop(){
  spawnEntity();

  const speed = 1 + (1 - timeLeft/settings.time);
  const delay = settings.spawnRate / speed;

  interval = setTimeout(spawnLoop, delay);
}

/* ENTITY */
function spawnEntity(){
  const el = document.createElement("div");

  const r = Math.random();
  let type;

  if(r>0.6) type="feature";
  else if(r>settings.dangerChance) type="rat";
  else type="danger";

  el.className="bug "+type;
  el.innerText = type==="feature"?"🐻":type==="rat"?"🐀":"☠️🐀";

  el.style.left=Math.random()*innerWidth+"px";
  el.style.top=Math.random()*innerHeight+"px";

  let clicks=0;

  el.onclick=()=>{
    clicks++;

    if(type==="danger" && clicks<2){
      el.style.transform="scale(1.4)";
      return;
    }

    if(type==="feature"){
      features++;
      el.classList.add("fly-right");
    } else {
      bugs++;
      el.classList.add("fly-left");
    }

    updateHUD();
    setTimeout(()=>el.remove(),600);
  };

  document.body.appendChild(el);

  setTimeout(()=>{
    if(document.body.contains(el)){
      if(type!=="feature"){
        missedRats++;
        punish();

        if(missedRats>=settings.maxMissed){
          gameOver("💣 Прод упал");
        }
      }
      el.remove();
    }
  },2000);
}

/* HUD */
function updateHUD(){
  document.getElementById("featuresCount").innerText = `🐻 ${features}/${settings.featureGoal}`;
  document.getElementById("bugsCount").innerText = `🐀 ${bugs}`;

  if(features>=settings.featureGoal){
    document.getElementById("releaseBtn").style.display="block";
  }
}

/* TIMER */
function startTimer(){
  timerInterval = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText=`⏳ ${timeLeft}`;

    if(timeLeft<=0){
      gameOver("⏳ Время вышло");
    }
  },1000);
}

/* LEAD */
function startLead(){
  setInterval(()=>{
    let msg;

    if(bugs>features) msg="Почему багов больше?!";
    else if(timeLeft<10) msg="ДЕДЛАЙН!";
    else msg=leadPhrases[Math.random()*leadPhrases.length|0];

    document.getElementById("lead").innerText="🧑‍💼 "+msg;
  },3000);
}

/* PUNISH */
function punish(){
  document.body.style.background="#220000";
  setTimeout(()=>document.body.style.background="black",150);
}

/* RELEASE */
document.getElementById("releaseBtn").onclick=finish;

/* END */
function finish(){
  clearAll();

  const result = bugs>features ? "📉 ПРОВАЛ" : "🚀 УСПЕХ";

  document.getElementById("app").style.display="block";
  document.getElementById("log").innerText=
`${result}

🐻 ${features}
🐀 ${bugs}`;
}

function gameOver(reason){
  clearAll();

  document.getElementById("app").style.display="block";
  document.getElementById("log").innerText=
`${reason}

🐻 ${features}
🐀 ${bugs}

💀 Game Over`;
}

function clearAll(){
  clearTimeout(interval);
  clearInterval(timerInterval);
}

</script>

</body>
</html>
