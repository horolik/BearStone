<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM DEBUG MODE</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

#intro{
  position:fixed;
  inset:0;
  padding:30px;
  z-index:10;
  background:black;
}

#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:20px;
  z-index:5;
}

#timerBox{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:24px;
  z-index:6;
}

.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
}

.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}

#questionCard{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:420px;
  background:#111;
  border:2px solid gold;
  border-radius:12px;
  padding:20px;
  text-align:center;
  display:none;
  z-index:20;
  perspective:1000px;
}

.option{
  margin-top:10px;
  padding:10px;
  border:1px solid #00ff9f;
  cursor:pointer;
  transition:transform 0.4s;
}

.option:hover{
  transform:scale(1.05);
}

.heart{
  position:fixed;
  font-size:20px;
  animation:floatUp 1s linear forwards;
}

@keyframes floatUp{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-100px);opacity:0;}
}

/* ===== CARDS (HEARTHSTONE STYLE) ===== */
#hand{
  position:fixed;
  bottom:60px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:25;
}

.card{
  width:90px;
  height:120px;
  background:#1a1a1a;
  border:2px solid #00ff9f;
  border-radius:10px;
  color:#00ff9f;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transform:translateY(200px);
  animation:draw 0.6s forwards;
}

@keyframes draw{
  to{transform:translateY(0);}
}

.legendary{
  border-color:gold;
  color:gold;
  box-shadow:0 0 10px gold;
}

.epic{
  border-color:violet;
  color:violet;
}

.common{
  border-color:#00ff9f;
}

#winScreen{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:100;
  text-align:center;
}

h1{color:#00ff9f;}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="intro">
<h1>💥 PROD CRASH</h1>
<p>Введи: start</p>
</div>

<div id="hud">
  <div id="left">🐻 0</div>
  <div id="right">🐀 0</div>
  <div id="level">junior</div>
</div>

<div id="timerBox">⏱ 0</div>

<div id="questionCard"></div>

<div id="hand"></div>

<div id="winScreen">
  <h1>🎉 ПОЗДРАВЛЯЕМ!</h1>
  <p>SUPER ARTEEM ПОЧИНИЛ PROD</p>
  <p>Ты прошёл все уровни и победил босса ❤️</p>
</div>

<script>

const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;
const drops=Array(70).fill(1);
setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";
  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?0:1,i*18,y*18);
    drops[i]=y*18>c.height?0:y+1;
  });
},50);

let run=false;
let level=0;
let t=7;
const levels=["junior","middle","senior"];
const speed=[700,500,300];

window.start=start;

function start(){
  document.getElementById("intro").style.display="none";
  document.getElementById("hud").style.display="flex";
  run=true;
  spawnCards();
  timer();
}

function spawnCards(){
  const hand=document.getElementById("hand");

  setInterval(()=>{
    if(!run) return;

    let card=document.createElement("div");
    card.className="card";

    let r=Math.random();
    if(r<0.1){card.classList.add("legendary");card.innerText="LEGENDARY\n🔥";}
    else if(r<0.3){card.classList.add("epic");card.innerText="EPIC\n⚡";}
    else{card.classList.add("common");card.innerText="COMMON\n🧩";}

    card.onclick=()=>{
      card.style.transform="scale(1.2) rotateY(180deg)";
      setTimeout(()=>card.remove(),300);
    };

    hand.appendChild(card);

    if(hand.children.length>5){hand.removeChild(hand.firstChild);}

  },1200);
}

function timer(){
  setInterval(()=>{
    if(!run) return;
    t--;
    timerBox.innerText="⏱ "+t;

    if(t<=0){
      level++;
      if(level>=levels.length){
        win();
        return;
      }
      document.getElementById("level").innerText=levels[level];
      t=7;
    }

  },1000);
}

function win(){
  run=false;
  document.getElementById("winScreen").style.display="flex";
}

</script>

</body>
</html>
