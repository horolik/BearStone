<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEM</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  overflow:hidden;
  color:#00ff9f;
}

/* START SCREEN */
#start{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:22px;
  background:black;
  z-index:1000;
  cursor:pointer;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
}

#level{
  position:fixed;
  top:40px;
  width:100%;
  text-align:center;
}

#stats{
  position:fixed;
  top:80px;
  left:20px;
  color:white;
}

#guide{
  position:fixed;
  bottom:20px;
  left:20px;
  right:20px;
  border:1px solid #00ff9f;
  padding:10px;
  background:rgba(0,0,0,0.5);
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
}

.rat{color:red;}
.feature{color:#00ff9f;}
.fun{color:#ff4dff;}

#boss{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:white;
  font-size:20px;
}
</style>
</head>

<body>

<div id="start">
ALARMMMMMMMM 🚨 PROD УПАЛ 🚨 ТОЛЬКО SUPER ARTEM может починить<<br><br>
КЛИКНИ ЧТОБЫ НАЧАТЬ
</div>

<div id="hud">
<div id="f">🐻 0</div>
<div id="r">🐀 0</div>
</div>

<div id="level"></div>

<div id="stats">
FIX: <span id="fix">30</span>% |
HAPPY: <span id="happy">0</span>
</div>

<div id="guide"></div>

<div id="boss"></div>

<script>

/* STATE */
let run=false;
let f=0, r=0;
let fix=30;
let happy=0;
let lvl=0;
let bossStarted=false;
let timer;

/* LEVELS */
const levels=["JUNIOR","MIDDLE","SENIOR"];

/* START */
document.getElementById("start").onclick=()=>{
document.getElementById("start").style.display="none";
document.getElementById("hud").style.display="flex";
run=true;
loop();
};

/* UPDATE UI */
function update(){

document.getElementById("f").innerText="🐻 "+f;
document.getElementById("r").innerText="🐀 "+r;
document.getElementById("fix").innerText=fix;
document.getElementById("happy").innerText=happy;

document.getElementById("level").innerText=
"LEVEL: "+levels[lvl];

document.getElementById("guide").innerHTML=
"🐀 Лови баги (иначе -FIX)<br>"+
"🐻 Фичи дают +FIX<br>"+
"🌸 Дают happiness<br>"+
"🎯 50% happiness → БОСС";
}

/* GAME LOOP */
function loop(){

timer=setInterval(()=>{

if(!run) return;

/* BOSS */
if(!bossStarted && happy>=50){
bossStarted=true;
clearInterval(timer);
showBoss();
return;
}

/* GAME OVER */
if(fix<=0){
document.body.innerHTML="<h1 style='color:red;text-align:center;margin-top:20%'>PROD УПАЛ</h1>";
return;
}

/* SPAWN */
let e=document.createElement("div");
let rand=Math.random();
let type="feature";

if(rand<0.4) type="rat";
if(rand>0.75) type="fun";

e.className="entity "+type;

e.innerText=
type==="rat"?"🐀":
type==="feature"?"🐻":"🌸";

e.style.left=Math.random()*window.innerWidth+"px";
e.style.top=Math.random()*window.innerHeight+"px";

e.onclick=()=>{

if(type==="rat"){
r++;
fix+=2;
}

if(type==="feature"){
f++;
fix+=3;
}

if(type==="fun"){
happy+=5;
fix-=3;
}

/* LEVEL UP */
if(f>=5 && lvl<2){
lvl++;
f=0;
}

update();
};

document.body.appendChild(e);

/* REMOVE */
setTimeout(()=>{
if(e.parentNode) e.remove();
},1500);

},500);
}

/* BOSS */
function showBoss(){

let b=document.getElementById("boss");
b.style.display="flex";

/* ВОПРОСЫ */
let questions = [
"Ты меня любишь?",
"Ты будешь меня любить, если я буду рыбой?",
"А если я превращусь в баг?",
"А если я удалю прод?",
"А если я буду просто console.log?",
"А если я никогда не закрою тикет?"
];

let qIndex = 0;

function renderQuestion(){

b.innerHTML = "😈 ОЛЬГА БОСС<br><br>" + questions[qIndex] + "<br><br>";

["БАО","На кальян","ЭТО ФИЧА", "Лови пиццу", "Я АРТЕМ", "ТЫ БААААААГ"].forEach(t=>{
let btn=document.createElement("div");

btn.innerText=t;
btn.style.border="1px solid white";
btn.style.padding="10px";
btn.style.margin="5px";
btn.style.cursor="pointer";

btn.onclick=()=>{

qIndex++;

/* ЕСЛИ ВОПРОСЫ ЗАКОНЧИЛИСЬ */
if(qIndex >= questions.length){
b.innerHTML="🎉 ПОБЕДА! PROD ПОЧИНЕН 🎉 Артем, с Днем рождения!";
return;
}

renderQuestion();
};

b.appendChild(btn);
});

}

renderQuestion();
}

update();

</script>
</body>
</html>
