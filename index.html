<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Артем vs Ольга 🔥 FINAL</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

/* MATRIX */
#matrix{position:fixed;inset:0;z-index:0;}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:20px;
  z-index:5;
}

/* AVATARS */
.player{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:60px;
  height:60px;
  border-radius:50%;
  background:#111;
  border:2px solid #00ff9f;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:64px;
  cursor:pointer;
  transition:.4s;
}

/* CARDS */
.card{
  position:absolute;
  width:120px;
  height:160px;
  border:2px solid gold;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  background:#111;
  color:white;
  cursor:pointer;
}

/* LEGEND */
#legend{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
  color:orange;
}

/* VICTORY */
#victory{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="hud">
  <div class="player">
    <div class="avatar">🧑</div>
    <div id="hpA">Артем ❤️ 10</div>
  </div>

  <div id="timer">⏳ 0</div>

  <div class="player">
    <div class="avatar">👩</div>
    <div id="hpO">Ольга ❤️ 12</div>
  </div>
</div>

<div id="legend">💨 LEGENDARY КАЛЬЯН</div>
<div id="victory"></div>

<script>

/* SOUND */
const legendary = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

/* MATRIX */
const c=matrix;
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;
const drops=Array(80).fill(1);

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";
  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?0:1,i*16,y*16);
    drops[i]=y*16>c.height?0:y+1;
  });
},50);

/* STATE */
let hpA=10;
let hpO=12;
let running=true;
let time=30;

/* START BATTLE */
hud.style.display="flex";
startBattle();

/* SPAWN CARDS */
function startBattle(){

  const spawn=setInterval(()=>{
    if(!running) return clearInterval(spawn);

    const el=document.createElement("div");
    const type=Math.random();

    if(type<0.6){
      el.className="card";
      el.innerText="❓";

      el.onclick=()=>{
        hpO--;
        update();
        el.remove();
      };
    }else{
      el.className="card";
      el.innerText="💬";

      el.onclick=()=>{
        hpO-=2;
        update();
        el.remove();
      };
    }

    el.style.left=Math.random()*innerWidth+"px";
    el.style.top=Math.random()*innerHeight+"px";

    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3000);

  },800);

  /* TIMER */
  const t=setInterval(()=>{
    if(!running) return clearInterval(t);

    time--;
    timer.innerText="⏳ "+time;

    if(time<=0) finish();

  },1000);

  /* BOSS DAMAGE */
  setInterval(()=>{
    if(!running) return;

    hpA--;
    update();
  },2500);

  /* ULT */
  setInterval(()=>{
    if(!running) return;

    if(Math.random()<0.2){
      legendary.play();

      legend.style.display="flex";

      setTimeout(()=>{
        legend.style.display="none";
        hpO-=5;
        update();
      },1500);
    }

  },5000);
}

/* UPDATE */
function update(){
  hpAEl.innerText="Артем ❤️ "+hpA;
  hpOEl.innerText="Ольга ❤️ "+hpO;

  if(hpA<=0 || hpO<=0){
    finish();
  }
}

/* FINISH */
function finish(){
  running=false;

  victory.style.display="flex";

  if(hpO<=0){
    victory.innerText="🏆 АРТЕМ ПОБЕДИЛ\n💨 Кальян имба";
  }else{
    victory.innerText="💀 ОЛЬГА ПОБЕДИЛА";
  }
}

</script>

</body>
</html>
