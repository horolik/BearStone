```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Bear Debug x Cards 🔥</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

/* MATRIX */
#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

/* CONSOLE */
#console{
  position:fixed;
  inset:0;
  padding:20px;
  z-index:2;
}

input{
  background:black;
  border:none;
  color:#00ff9f;
  font-family:monospace;
  font-size:18px;
  outline:none;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  z-index:3;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:48px;
  cursor:pointer;
  z-index:3;
  transition: transform 0.4s linear, opacity 0.4s;
}

.feature{ color:#00ff9f; }
.rat{ color:#ff4d4d; }

/* CARDS PHASE */
#cards{
  position:fixed;
  inset:0;
  display:none;
  z-index:4;
}

.card{
  position:absolute;
  font-size:42px;
  cursor:pointer;
}

/* VICTORY */
#victory{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
  z-index:5;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="console">
> SYSTEM ERROR...<br>
> CRITICAL BUG DETECTED 🐀<br>
> Требуется разработчик<br><br>
> Введите команду (start / старт):<br>
<input id="cmd" autofocus>
<div id="out"></div>
</div>

<div id="hud">
  <div id="left">🐻 0</div>
  <div id="timer">⏳ 30</div>
  <div id="right">🐀 0</div>
</div>

<div id="cards"></div>
<div id="victory"></div>

<script>

/* MATRIX */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

const drops=Array(80).fill(1);

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.06)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";

  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?0:1,i*16,y*16);
    drops[i]=y*16>c.height?0:y+1;
  });
},50);

/* STATE */
let features=0, bugs=0;
let time=30;
let running=false;

/* CONSOLE */
cmd.onkeydown=(e)=>{
  if(e.key==="Enter"){
    const val=cmd.value.trim().toLowerCase();

    out.innerHTML+="<br>> "+val;

    if(["start","старт"].includes(val)){
      startDebug();
      console.style.display="none";
      hud.style.display="flex";
    }else{
      out.innerHTML+="<br>доступно: start / старт";
    }

    cmd.value="";
  }
};

/* DEBUG PHASE */
function startDebug(){
  features=0;
  bugs=0;
  time=30;
  running=true;

  spawnLoop();
  timerLoop();
}

/* SPAWN */
function spawnLoop(){
  const int=setInterval(()=>{
    if(!running) return clearInterval(int);

    if(document.querySelectorAll(".entity").length>15) return;

    const el=document.createElement("div");
    const good=Math.random()>0.5;

    el.className="entity "+(good?"feature":"rat");
    el.innerText=good?"🐻":"🐀";

    el.style.left=Math.random()*innerWidth+"px";
    el.style.top=Math.random()*innerHeight+"px";

    el.onclick=()=>{
      if(good){
        features++;
        el.style.transform="translateX(-200px)";
      }else{
        bugs++;
        el.style.transform="translateX(200px)";
      }

      el.style.opacity="0";

      setTimeout(()=>el.remove(),400);

      update();
    };

    document.body.appendChild(el);

    setTimeout(()=>{
      el.remove();
    },2200);

  },600);
}

/* TIMER */
function timerLoop(){
  const t=setInterval(()=>{
    if(!running) return clearInterval(t);

    time--;
    timer.innerText="⏳ "+time;

    if(time<=0){
      running=false;
      startCards();
    }

  },1000);
}

/* UPDATE */
function update(){
  left.innerText="🐻 "+features;
  right.innerText="🐀 "+bugs;
}

/* CARDS PHASE */
function startCards(){
  document.querySelectorAll(".entity").forEach(e=>e.remove());

  cards.style.display="block";

  let a=0,o=0;
  let t=30;

  const spawn=setInterval(()=>{
    if(t<=0) return clearInterval(spawn);

    const el=document.createElement("div");
    const good=Math.random()>0.5;

    el.className="card";
    el.innerText=good?"❓":"🥖";

    el.style.left=Math.random()*innerWidth+"px";
    el.style.top=Math.random()*innerHeight+"px";

    el.onclick=()=>{
      if(good) a++;
      else o++;

      left.innerText="🧑 "+a;
      right.innerText="👩 "+o;

      el.remove();
    };

    cards.appendChild(el);

    setTimeout(()=>el.remove(),2000);

  },500);

  const timer2=setInterval(()=>{
    t--;
    timer.innerText="⏳ "+t;

    if(t<=0){
      clearInterval(timer2);
      finish(a,o);
    }
  },1000);
}

/* FINISH */
function finish(a,o){
  victory.style.display="flex";

  if(a>o){
    victory.innerText="🏆 АРТЕМ ПОБЕДИЛ";
  }else{
    victory.innerText="💀 ОЛЬГА ПОБЕДИЛА";
  }
}

</script>

</body>
</html>
