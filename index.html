<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEM</title>
<style>
body{
margin:0;
background:black;
font-family:monospace;
overflow:hidden;
color:#00ff9f;
}
canvas{
position:fixed;
inset:0;
z-index:0;
}
#start{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:22px;
background:black;
z-index:1000;
}
#terminal{
background:black;
border:1px solid #00ff9f;
padding:20px;
width:300px;
}
#input{
background:black;
border:none;
color:#00ff9f;
outline:none;
width:100%;
font-family:monospace;
}
#hud{
position:fixed;
top:10px;
left:20px;
right:20px;
display:none;
justify-content:space-between;
z-index:2;
}
#level{
position:fixed;
top:40px;
width:100%;
text-align:center;
z-index:2;
}
#stats{
position:fixed;
top:80px;
left:20px;
color:white;
z-index:2;
}
#guide{
position:fixed;
bottom:20px;
left:20px;
right:20px;
border:1px solid #00ff9f;
padding:10px;
background:rgba(0,0,0,0.5);
z-index:2;
}
.entity{
position:absolute;
font-size:60px;
cursor:pointer;
z-index:2;
}
.rat{color:red;}
.feature{color:#00ff9f;}
.kalyan{
width:120px;
height:120px;
object-fit:contain;
}
.kalyan:hover{transform:scale(1.2);}
#boss{
position:fixed;
inset:0;
background:black;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
font-size:20px;
z-index:3;
}
#boss img{
width:200px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 0 20px #ff4dff;
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="start">
<div id="terminal">
> 🐀 PROD сломался. Введите: start<br><br>
> <input id="input" autofocus placeholder="start">
</div>
</div>

<div id="hud">
<div id="f">🐻 0</div>
<div id="r">🐀 0</div>
</div>

<div id="level"></div>

<div id="stats">
FIX: <span id="fix">30</span>% | HAPPY: <span id="happy">0</span>
</div>

<div id="guide"></div>

<div id="boss"></div>

<script>

/* MATRIX */
let c=document.getElementById("matrix");
let ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let letters="01".split("");
let fontSize=14;
let columns=c.width/fontSize;
let drops=[];
for(let i=0;i<columns;i++) drops[i]=1;

let matrixSpeed=33;
let matrixInterval=setInterval(drawMatrix,matrixSpeed);

function drawMatrix(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#00ff9f";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
if(drops[i]*fontSize>c.height && Math.random()>0.975) drops[i]=0;
drops[i]++;
}
}

/* STATE */
let run=false;
let f=0,r=0;
let fix=30;
let happy=0;
let lvl=0;
let bossStarted=false;
let timer;
const levels=["JUNIOR","MIDDLE","SENIOR"];

/* START */
document.getElementById("input").addEventListener("keydown",(e)=>{
if(e.key==="Enter" && e.target.value.toLowerCase()==="start"){
document.getElementById("start").style.display="none";
document.getElementById("hud").style.display="flex";
run=true;
loop();
startIncidents();
startAutoFix();
}
});

/* UI */
function update(){
document.getElementById("f").innerText="🐻 "+f;
document.getElementById("r").innerText="🐀 "+r;
document.getElementById("fix").innerText=fix;
document.getElementById("happy").innerText=happy;
document.getElementById("level").innerText="LEVEL: "+levels[lvl];

document.getElementById("guide").innerHTML=
"🐛 баги дают FIX<br>"+
"🐻 фичи дают FIX<br>"+
"💨 кальяны дают happiness<br>"+
"🎯 100% FIX → WIN";
}

/* INCIDENTS */
function startIncidents(){
setInterval(()=>{
let event=Math.random();
if(event>0.7){
happy+=10;
document.getElementById("guide").innerHTML+="<br>😴 ПЕРЕРЫВ НА СОН +HAPPINESS";
}
update();
},12000);
}

/* AUTO FIX SENIOR */
function startAutoFix(){
setInterval(()=>{
if(lvl===2) fix++;
update();
},1000);
}

/* BOSS OLGA */
function showBoss(){
let b=document.getElementById("boss");
b.style.display="flex";

let q=[
"Ты меня любишь?",
"А если я баг?",
"А если я удалю прод?",
"А если я просто console.log?",
"А если я никогда не закрою тикет?"
];

let i=0;

function render(){
b.innerHTML=
"😈 ОЛЬГА БОСС<br><br>"+
"<img src='Olga.JPG'><br>"+
q[i]+"<br><br>";

["ДА","НЕТ","ЭТО ФИЧА","Я АРТЕМ","ЛОГИКА","ПЕРЕЗАГРУЗКА"].forEach(t=>{
let btn=document.createElement("div");
btn.innerText=t;
btn.style.border="1px solid white";
btn.style.padding="10px";
btn.style.margin="5px";
btn.style.cursor="pointer";

btn.onclick=()=>{
i++;
if(i>=q.length){
b.innerHTML="💜 ОЛЬГА УСПОКОИЛАСЬ → DEPLOY ДОПУЩЕН";
setTimeout(()=>win(),1500);
return;
}
render();
};

b.appendChild(btn);
});
}

render();
}

/* WIN */
function win(){
clearInterval(timer);
clearInterval(matrixInterval);
matrixInterval=setInterval(drawMatrix,10);

document.querySelectorAll(".entity").forEach(e=>e.remove());

document.body.innerHTML=
"<h1 style='color:#00ff9f;text-align:center;margin-top:20%'>🎉 PROD STABLE - ARTEM WIN 🎉</h1>";
}

/* LOOP */
function loop(){
timer=setInterval(()=>{

if(!run) return;

/* TRIGGER BOSS BEFORE WIN */
if(fix>=100 && !bossStarted){
bossStarted=true;
clearInterval(timer);
showBoss();
return;
}

/* SPAWN */
let rand=Math.random();

/* BUGS */
if(rand< (lvl===0?0.5:0.4)){
let e=document.createElement("div");
e.className="entity rat";
e.innerText="🐛";
e.style.left=Math.random()*window.innerWidth+"px";
e.style.top=Math.random()*window.innerHeight+"px";

e.onclick=()=>{
fix+=2;
r++;
update();
e.remove();
};

document.body.appendChild(e);
setTimeout(()=>e.remove(),1500);
}

/* FEATURES */
else if(rand<0.75){
let e=document.createElement("div");
e.className="entity feature";
e.innerText="🐻";
e.style.left=Math.random()*window.innerWidth+"px";
e.style.top=Math.random()*window.innerHeight+"px";

e.onclick=()=>{
f++;
fix+=3;
if(f>=5 && lvl<2){lvl++;f=0;}
update();
e.remove();
};

document.body.appendChild(e);
setTimeout(()=>e.remove(),1500);
}

/* KALYAN */
else{
let img=document.createElement("img");
img.src="Kalyan.PNG";
img.className="entity kalyan";
img.style.left=Math.random()*window.innerWidth+"px";
img.style.top=Math.random()*window.innerHeight+"px";

img.onclick=()=>{
happy+= (lvl===0?5:lvl===1?10:15);
fix-=3;
update();
img.remove();
};

document.body.appendChild(img);
setTimeout(()=>img.remove(),1500);
}

},500);
}

update();

</script>
</body>
</html>
