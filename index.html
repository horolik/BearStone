<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM REBUILD</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

/* MATRIX */
canvas{position:fixed;inset:0;z-index:0}

/* UI */
#intro{
  position:fixed;inset:0;
  background:black;
  padding:40px;
  z-index:10;
}

#hud{
  position:fixed;
  top:10px;left:20px;right:20px;
  display:none;
  justify-content:space-between;
  z-index:5;
}

#timer{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:50px;
  cursor:pointer;
  animation:pop .2s ease;
}

@keyframes pop{
  from{transform:scale(0.3);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* RARITY */
.common{filter:none}
.rare{filter:drop-shadow(0 0 10px cyan)}
.legendary{filter:drop-shadow(0 0 15px gold)}

/* CARD */
.card{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:420px;
  background:#111;
  border:2px solid gold;
  padding:20px;
  text-align:center;
  display:none;
  z-index:20;
}

.flip{
  animation:flip .6s ease;
}

@keyframes flip{
  0%{transform:translate(-50%,-50%) rotateY(0)}
  50%{transform:translate(-50%,-50%) rotateY(90deg)}
  100%{transform:translate(-50%,-50%) rotateY(0)}
}

/* CARD DROP */
.drop{
  position:absolute;
  font-size:40px;
  animation:fly .8s ease forwards;
}

@keyframes fly{
  0%{transform:translateY(200px);opacity:0}
  50%{opacity:1}
  100%{transform:translateY(-100px);opacity:0}
}

/* TERMINAL */
#cmd{
  position:fixed;
  bottom:0;
  width:100%;
  background:black;
  color:#00ff9f;
  border:none;
  padding:10px;
}

/* END */
#end{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:999;
}

#inf{
  font-size:120px;
  animation:spin 3s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="intro">
<h1>💥 PROD CRASH</h1>
<p>Введите: <b>start</b></p>
</div>

<div id="hud">
  <div id="good">🐻 0</div>
  <div id="bad">🐀 0</div>
  <div id="lvl">junior</div>
</div>

<div id="timer">⏱ 7</div>

<div id="card" class="card"></div>

<input id="cmd" placeholder="command..." />

<!-- SOUNDS -->
<audio id="sndDraw" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>
<audio id="sndLegendary" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<script>

/* MATRIX */
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;
let d=Array(60).fill(1);

setInterval(()=>{
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#00ff9f";
d.forEach((y,i)=>{
ctx.fillText(Math.random()>0.5?0:1,i*20,y*20);
d[i]=y*20>c.height?0:y+1;
});
},50);

/* STATE */
let g=0,b=0,run=false;
let level=0;
let time=7;

/* DATA */
const levels=["junior","middle","senior"];
const speed=[900,500,250];

const q=[
"А ты меня любишь?",
"А если я баг?",
"Я красивая?"
];

const ans=[
["да ❤️","нет 💀","пицца 🍕"],
["конечно","ты фича","краш"],
["лучше всех","ошибка","люблю"]
];

/* START */
cmd.onkeydown=e=>{
if(e.key==="Enter"&&cmd.value==="start") start();
cmd.value="";
};

function start(){
intro.style.display="none";
hud.style.display="flex";
run=true;
spawn();
lvlLoop();
timer();
}

/* LEVELS */
function lvlLoop(){
setInterval(()=>{
if(!run) return;
level++;
if(level>2) return;

lvl.innerText=levels[level];
sndLegendary.play();

time=7;
},7000);
}

/* SPAWN */
function spawn(){
setInterval(()=>{
if(!run) return;

let e=document.createElement("div");
let type=Math.random()>0.5?"🐻":"🐀";

e.className="entity "+rarity();
e.innerText=type;

e.style.left=Math.random()*innerWidth+"px";
e.style.top=Math.random()*innerHeight+"px";

e.onclick=()=>{
sndDraw.play();
dropCard();
if(type==="🐻") g++; else b++;
update();
e.remove();
};

document.body.appendChild(e);
setTimeout(()=>e.remove(),2000);

},speed[level]);
}

/* RARITY */
function rarity(){
let r=Math.random();
if(r<0.6) return "common";
if(r<0.9) return "rare";
return "legendary";
}

/* DROP CARD */
function dropCard(){
let d=document.createElement("div");
d.className="drop";
d.innerText=["COMMON","RARE","LEGENDARY"][Math.floor(Math.random()*3)];
d.style.left=Math.random()*innerWidth+"px";
d.style.bottom="0px";
document.body.appendChild(d);
setTimeout(()=>d.remove(),800);
}

/* TIMER */
function timer(){
setInterval(()=>{
if(!run) return;
time--;
timer.innerText="⏱ "+time;
if(time<=0) boss();
},1000);
}

/* UI */
function update(){
good.innerText="🐻 "+g;
bad.innerText="🐀 "+b;
}

/* BOSS */
let i=0;
function boss(){
run=false;
card.style.display="block";
showQ();
}

/* CARD */
function showQ(){
card.classList.add("flip");

setTimeout(()=>{
card.classList.remove("flip");

card.innerHTML=
"👩 Ольга<br><br>"+
q[i]+
"<br><br>😂 "+randomFunny();

ans[i].forEach(a=>{
let b=document.createElement("div");
b.innerText=a;
b.onclick=()=>{
sndDraw.play();
i++;
if(i>=q.length) win();
else showQ();
};
card.appendChild(b);
});

},300);
}

function randomFunny(){
return [
"я багнулся от любви",
"сервер сказал: ОНА ТОП",
"404: нормальный ответ"
][Math.floor(Math.random()*3)];
}

/* WIN */
function win(){
document.body.innerHTML+=`
<div id="end">
<div id="inf">∞</div>
<div>LOVE INFINITY</div>
</div>`;
}

</script>

</body>
</html>
