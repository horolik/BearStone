```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Artem vs Olga — Debug Hearthstone</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

/* MATRIX */
#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

/* CONSOLE */
#console{
  position:fixed;
  inset:0;
  padding:20px;
  z-index:2;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:20px;
  z-index:5;
}

/* LEVEL INFO */
#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  z-index:5;
}

#info{
  position:fixed;
  bottom:10px;
  left:20px;
  max-width:60%;
  z-index:5;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:64px;
  cursor:pointer;
  transition:.4s;
}

.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}
.super{filter:drop-shadow(0 0 10px red);}

/* ===== BOSS AREA ===== */
#boss{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:220px;
  background:#111;
  border-top:2px solid #ff4d4d;
  display:none;
  align-items:center;
  padding:10px;
  z-index:6;
}

#boss img{
  width:140px;
  height:140px;
  border-radius:50%;
  margin-right:20px;
}

#bossText{
  font-size:18px;
}

/* CARDS */
.card{
  position:absolute;
  width:160px;
  height:110px;
  background:#222;
  border:2px solid gold;
  border-radius:10px;
  color:white;
  padding:10px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* LEGEND */
#legend{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
  color:orange;
}

/* VICTORY */
#victory{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="console">
> SYSTEM ERROR 🐀<br>
> Прод атакован багами<br><br>

> 🐻 = фичи → вправо<br>
> 🐀 = баги → влево<br>
> 🔥 = супер-крыса (−2)<br><br>

> Введи: start / старт<br>
<input id="cmd" autofocus>
<div id="out"></div>
</div>

<div id="hud">
  <div id="left">🐻 0</div>
  <div id="timer">⏳ 0</div>
  <div id="right">🐀 0</div>
</div>

<div id="level"></div>
<div id="info"></div>

<div id="legend">💨 LEGENDARY КАЛЬЯН</div>

<!-- BOSS PANEL -->
<div id="boss">
  <img src="https://i.imgur.com/8QfQ2dZ.png" alt="Olga Rat Boss">
  <div id="bossText">👩 Ольга: Я задаю вопросы... ты справишься?</div>
</div>

<div id="victory"></div>

<script>

/* MATRIX */
const c=matrix;
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

const drops=Array(80).fill(1);

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";

  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?0:1,i*16,y*16);
    drops[i]=y*16>c.height?0:y+1;
  });
},50);

/* STATE */
let features=0, bugs=0;
let time=0;
let levelIndex=0;
let running=false;

const levels=[
  {name:"JUNIOR",time:15,goal:4},
  {name:"MIDDLE",time:20,goal:6},
  {name:"SENIOR",time:25,goal:8}
];

/* START */
cmd.onkeydown=(e)=>{
  if(e.key==="Enter"){
    const val=cmd.value.trim().toLowerCase();

    if(val==="start"||val==="старт"){
      console.style.display="none";
      hud.style.display="flex";
      startLevel();
    }else{
      out.innerHTML+="<br>start / старт";
    }

    cmd.value="";
  }
};

/* LEVELS */
function startLevel(){
  if(levelIndex>=levels.length){
    showLead();
    return;
  }

  const l=levels[levelIndex];

  features=0;
  bugs=0;
  time=l.time;
  running=true;

  level.innerText="LEVEL: "+l.name;
  info.innerText="Чини систему";

  spawn();
  timer(l);
}

/* SPAWN */
function spawn(){
  const int=setInterval(()=>{
    if(!running) return clearInterval(int);

    const el=document.createElement("div");

    let type=Math.random();

    if(type<0.1) type="super";
    else if(type<0.5) type="rat";
    else type="feature";

    el.className="entity "+type;

    el.innerText=
      type==="feature"?"🐻":
      type==="rat"?"🐀":"🐀🔥";

    el.style.left=Math.random()*innerWidth+"px";
    el.style.top=Math.random()*innerHeight+"px";

    el.onclick=()=>{
      if(type==="feature"){
        features++;
        el.style.transform="translateX(250px)";
      }else if(type==="rat"){
        bugs++;
        el.style.transform="translateX(-250px)";
      }else{
        bugs+=2;
      }

      el.style.opacity="0";
      setTimeout(()=>el.remove(),300);

      update();
    };

    document.body.appendChild(el);

    setTimeout(()=>el.remove(),2000);

  },600);
}

/* TIMER */
function timer(l){
  const t=setInterval(()=>{
    if(!running) return clearInterval(t);

    time--;
    timer.innerText="⏳ "+time;

    if(features>=l.goal){
      running=false;
      levelIndex++;
      setTimeout(startLevel,1000);
    }

    if(time<=0){
      running=false;
      startBoss();
    }

  },1000);
}

/* UPDATE */
function update(){
  left.innerText="🐻 "+features;
  right.innerText="🐀 "+bugs;
}

/* ===== TEAM LEAD ===== */
function showLead(){
  level.innerText="🏆 Артем — Team Lead";
  info.innerText="Теперь начинается бой с боссом...";

  setTimeout(startBoss,3000);
}

/* ===== BOSS FIGHT ===== */
let hpA=10;
let hpO=12;

const questions=[
  "Почему прод не работает?",
  "Что такое null pointer?",
  "Почему всё сломалось после фикса?",
  "Где тесты?",
  "Кто это задеплоил?"
];

const answers=[
  "Кальян всё исправит 💨",
  "Это не баг, это фича 😎",
  "Я проверил у себя — работает",
  "Добавим тесты потом",
  "Это legacy код"
];

function startBoss(){

  boss.style.display="flex";

  const spawn=setInterval(()=>{
    if(hpO<=0||hpA<=0) return clearInterval(spawn);

    const q=document.createElement("div");
    q.className="card";

    q.innerText="❓ "+questions[Math.floor(Math.random()*questions.length)];

    q.style.left=Math.random()*innerWidth+"px";
    q.style.top=Math.random()*innerHeight+"px";

    q.onclick=()=>{
      hpO--;

      spawnAnswer();
      updateBoss();

      q.remove();
    };

    document.body.appendChild(q);

    setTimeout(()=>q.remove(),3000);

  },1200);

  setInterval(()=>{
    hpA--;
    updateBoss();
  },3000);

  setInterval(()=>{
    legend.style.display="flex";

    setTimeout(()=>{
      legend.style.display="none";
      hpO-=4;
      updateBoss();
    },1000);

  },7000);
}

/* ANSWERS */
function spawnAnswer(){
  const a=document.createElement("div");
  a.className="card";
  a.innerText="💬 "+answers[Math.floor(Math.random()*answers.length)];

  a.style.left=Math.random()*innerWidth+"px";
  a.style.top=Math.random()*innerHeight+"px";

  document.body.appendChild(a);
  setTimeout(()=>a.remove(),2000);
}

/* UPDATE BOSS */
function updateBoss(){
  left.innerText="🧑 "+hpA;
  right.innerText="👩 "+hpO;

  if(hpO<=0){
    victory.style.display="flex";
    victory.innerText="🏆 АРТЕМ ПОБЕДИЛ (Team Lead)";
  }

  if(hpA<=0){
    victory.style.display="flex";
    victory.innerText="💀 ОЛЬГА ПОБЕДИЛА";
  }
}

</script>

</body>
</html>
```
