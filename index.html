<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🐻 Artem vs Production Server</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff9f;
  font-family: monospace;
}

/* ================= TERMINAL ================= */
#terminal {
  position: fixed;
  inset: 0;
  background: black;
  padding: 20px;
}

#log {
  white-space: pre-line;
}

#inputLine {
  margin-top: 10px;
}

input {
  background: black;
  border: none;
  color: #00ff9f;
  outline: none;
  font-family: monospace;
  width: 300px;
}

/* ================= GAME ================= */
#game {
  display: none;
}

#board {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

.hero {
  width: 220px;
  border: 2px solid #00ff9f;
  padding: 10px;
  border-radius: 10px;
}

/* ================= HAND ================= */
#hand {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
}

.card {
  width: 120px;
  height: 150px;
  border: 1px solid #00ff9f;
  margin: 5px;
  padding: 10px;
  cursor: pointer;
  background: rgba(0,255,159,0.05);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-20px) scale(1.05);
}
</style>
</head>

<body>

<!-- ================= TERMINAL ================= -->
<div id="terminal">
  <div id="log"></div>

  <div id="inputLine">
    > <input id="cmd" autofocus />
  </div>
</div>

<!-- ================= GAME ================= -->
<div id="game">

  <div id="board">

    <div class="hero">
      <h3>Artem</h3>
      HP: <span id="hp">20</span><br>
      Mana: <span id="mana">1</span>
    </div>

    <div class="hero">
      <h3 id="bossName">Toxic PM</h3>
      HP: <span id="bossHp">40</span>
    </div>

  </div>

  <div id="hand"></div>

  <button onclick="endTurn()">End Turn</button>

</div>

<script>

/* ================= TERMINAL ================= */
const log = document.getElementById("log");
const input = document.getElementById("cmd");

const lines = [
  "Booting Production Interface...",
  "Loading Dev Profile: Artem",
  "Connecting to Production Server...",
  "⚠ Critical bugs detected",
  "",
  "Type: start"
];

let i = 0;

function boot(){
  if(i < lines.length){
    log.innerText += lines[i] + "\n";
    i++;
    setTimeout(boot, 500);
  }
}

boot();

input.addEventListener("keydown", e=>{
  if(e.key === "Enter"){

    const cmd = input.value.trim().toLowerCase();

    log.innerText += "> " + cmd + "\n";

    if(cmd === "start"){
      document.getElementById("terminal").style.display = "none";
      document.getElementById("game").style.display = "block";
      initGame();
    }

    input.value = "";
  }
});

/* ================= GAME ================= */
const Game = {
  hp: 20,
  mana: 1,
  bossHp: 40
};

const Deck = [
  { name:"Bug Fix", cost:1, dmg:2 },
  { name:"Hotfix Friday", cost:2, dmg:4 },
  { name:"Rollback Prayer", cost:2, heal:3 },
  { name:"It worked on my machine", cost:1, dmg:1 }
];

const hand = document.getElementById("hand");

function initGame(){
  render();
  update();
}

function render(){
  hand.innerHTML = "";

  Deck.forEach(card=>{

    const el = document.createElement("div");
    el.className = "card";
    el.innerHTML = `<b>${card.name}</b><br>cost ${card.cost}`;

    el.onclick = ()=>play(card);

    hand.appendChild(el);
  });
}

function play(card){

  if(Game.mana < card.cost) return;

  Game.mana -= card.cost;

  Game.bossHp -= card.dmg || 0;
  Game.hp += card.heal || 0;

  update();

  if(Game.bossHp <= 0){
    document.body.innerHTML = "<h1>🐻 PRODUCTION DOWN</h1>";
  }
}

function endTurn(){
  Game.mana++;
  Game.bossHp -= 2;

  update();
}

function update(){
  document.getElementById("hp").innerText = Game.hp;
  document.getElementById("mana").innerText = Game.mana;
  document.getElementById("bossHp").innerText = Game.bossHp;
}

</script>

</body>
</html>
