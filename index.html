<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM DEBUG MODE</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

#intro{
  position:fixed;
  inset:0;
  padding:30px;
  z-index:10;
  background:black;
}

#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:20px;
  z-index:5;
}

#timerBox{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:24px;
  z-index:6;
}

.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
}

.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}
.super{filter:drop-shadow(0 0 10px red);}

#questionCard{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:420px;
  background:#111;
  border:2px solid gold;
  border-radius:12px;
  padding:20px;
  text-align:center;
  display:none;
  z-index:20;
  perspective:1000px;
}

.option{
  margin-top:10px;
  padding:10px;
  border:1px solid #00ff9f;
  cursor:pointer;
  transform-style:preserve-3d;
  transition:transform 0.6s;
}

.option:hover{
  background:#003322;
  transform:rotateY(180deg);
}

.flip{
  animation:flipCard 0.6s ease;
}

@keyframes flipCard{
  0%{transform:rotateY(0deg);}
  100%{transform:rotateY(180deg);}
}

.heart{
  position:fixed;
  font-size:20px;
  animation:floatUp 1s linear forwards;
}

@keyframes floatUp{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-100px);opacity:0;}
}

h1{color:#00ff9f;}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="intro">
<h1>💥 PROD CRASH</h1>

<p>
О нет… прод сломался.<br><br>
🧠 Только SUPER ARTEEM может его починить.
</p>

<p>
📘 Задача:
<br>
1. Лови баги 🐀
2. Собирай фичи 🐻
3. 3 уровня: junior → middle → senior
4. Победи босса Ольгу ❤️
</p>

<p>👉 Открой консоль и введи: <b>start()</b></p>
</div>

<div id="hud">
  <div id="left">🐻 0</div>
  <div id="right">🐀 0</div>
  <div id="level">junior</div>
</div>

<div id="timerBox">⏱ 0</div>

<div id="questionCard"></div>

<script>

/* ===== MATRIX ===== */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;
const drops=Array(70).fill(1);
setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";
  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?0:1,i*18,y*18);
    drops[i]=y*18>c.height?0:y+1;
  });
},50);

/* ===== SOUND (PLACEHOLDERS) ===== */
const sDraw = new Audio("draw.mp3");
const sLegendary = new Audio("legendary.mp3");

function playDraw(){ try{ sDraw.play(); }catch(e){} }
function playLegendary(){ try{ sLegendary.play(); }catch(e){} }

/* ===== STATE ===== */
let f=0,b=0;
let run=false;
let love=50;

let levelIndex=0;
const levels=["junior","middle","senior"];
const levelSpeed=[700,500,300];
let t=7;

/* ===== START FROM CONSOLE ===== */
window.start = startGame;

function startGame(){
  document.getElementById("intro").style.display="none";
  document.getElementById("hud").style.display="flex";
  run=true;
  spawn();
  timer();
  boss();
}

/* ===== LEVEL PROGRESSION ===== */
function nextLevel(){
  levelIndex++;
  if(levelIndex>=levels.length){
    startBoss();
    return;
  }
  document.getElementById("level").innerText=levels[levelIndex];
  t=7;
}

/* ===== SPAWN ===== */
function spawn(){
  setInterval(()=>{
    if(!run) return;

    let e=document.createElement("div");
    let r=Math.random();
    let type=r<0.5?"feature":"rat";

    e.className="entity "+type;
    e.innerText=type==="feature"?"🐻":"🐀";

    e.style.left=Math.random()*innerWidth+"px";
    e.style.top=Math.random()*innerHeight+"px";

    e.onclick=()=>{
      playDraw();
      if(type==="feature") f++; else b++;
      update();
      e.remove();
    };

    document.body.appendChild(e);
    setTimeout(()=>e.remove(),2000);

  }, levelSpeed[levelIndex]);
}

/* ===== TIMER ===== */
function timer(){
  setInterval(()=>{
    if(!run) return;

    t--;
    document.getElementById("timerBox").innerText="⏱ "+t;

    if(t<=0){
      nextLevel();
    }
  },1000);
}

function update(){
  left.innerText="🐻 "+f;
  right.innerText="🐀 "+b;
}

/* ===== BOSS ===== */
function startBoss(){
  run=false;
  showQuestion();
}

const questions=[
"А ты меня любишь?",
"А если я потолстею?",
"Я красивая?"
];

const options=[
["❤️ да","💨 кальян","🍕 пицца"],
["❤️ конечно","😎 ты фича","💨 кальян"],
["❤️ ты лучшая","🍕 пицца","😎 люблю"]
];

let qIndex=0;

function showQuestion(){
  const card=document.getElementById("questionCard");
  card.style.display="block";
  card.innerHTML="👩 Ольга:<br><br>"+questions[qIndex];

  options[qIndex].forEach(opt=>{
    let div=document.createElement("div");
    div.className="option flip";
    div.innerText=opt;

    div.onclick=()=>onAnswer();
    card.appendChild(div);
  });
}

function onAnswer(){
  playLegendary();
  love+=10;
  showHearts();
  qIndex++;

  if(qIndex>=questions.length){
    win();
    return;
  }

  document.getElementById("questionCard").innerHTML="";
  showQuestion();
}

function showHearts(){
  for(let i=0;i<6;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="❤️";
    h.style.left=Math.random()*innerWidth+"px";
    h.style.top=(innerHeight/2)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1000);
  }
}

function win(){
  document.getElementById("questionCard").innerHTML=
  "🏆 ARTEEM WIN<br>LOVE MAX ❤️";
}

</script>

</body>
</html>
