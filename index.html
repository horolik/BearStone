<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM BOSS GAME</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  z-index:5;
}

#timerBox{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:24px;
  z-index:6;
}

.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
}
.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}

.option{
  margin-top:10px;
  padding:12px;
  border:1px solid #00ff9f;
  cursor:pointer;
  transition:0.6s;
}

.option:hover{
  background:#003322;
  transform:rotateY(180deg);
}

.flip{
  animation:flip 0.6s ease;
}

@keyframes flip{
  0%{transform:rotateY(0);}
  100%{transform:rotateY(180deg);}
}

#questionCard{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:420px;
  background:#111;
  border:2px solid gold;
  border-radius:12px;
  padding:20px;
  text-align:center;
  display:none;
  z-index:20;
}

#boss{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  font-size:80px;
  text-align:center;
  z-index:15;
  display:none;
  filter:drop-shadow(0 0 20px red);
}

#bossHp{
  font-size:22px;
  color:red;
}

#end{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  color:#00ff9f;
  font-size:40px;
  z-index:999;
}

#heart{
  font-size:120px;
  animation:beat 1s infinite;
}

#infinity{
  font-size:140px;
  display:none;
  animation:spin 3s linear infinite;
}

@keyframes beat{
  0%{transform:scale(1);}
  50%{transform:scale(1.4);}
  100%{transform:scale(1);}
}

@keyframes spin{
  0%{transform:rotate(0);}
  100%{transform:rotate(360deg);}
}

#terminal{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  z-index:30;
  background:black;
  border-top:1px solid #00ff9f;
}

#cmd{
  flex:1;
  background:black;
  color:#00ff9f;
  border:none;
  padding:10px;
  outline:none;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="hud">
  <div id="left">🐻 0</div>
  <div id="right">🐀 0</div>
  <div id="level">junior</div>
</div>

<div id="timerBox">⏱ 7</div>

<div id="boss">
  🐀 ОЛЬГА БОСС
  <div id="bossHp">❤️❤️❤️❤️❤️</div>
</div>

<div id="questionCard"></div>

<div id="terminal">
  <input id="cmd" placeholder="type start..." />
</div>

<script>

/* MATRIX */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

const drops=Array(60).fill(1);
setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";
  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?0:1,i*20,y*20);
    drops[i]=y*20>c.height?0:y+1;
  });
},50);

/* =========================
   🔊 SOUND ENGINE (NO FILES)
   ========================= */

const AudioCtx = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioCtx();

/* 🃏 draw sound (card flip / hearthstone feel) */
function drawSound(){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  o.type = "triangle";
  o.frequency.setValueAtTime(600, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.15);

  g.gain.setValueAtTime(0.2, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);

  o.connect(g);
  g.connect(audioCtx.destination);

  o.start();
  o.stop(audioCtx.currentTime + 0.2);
}

/* ✨ legendary sound (epic bass hit) */
function legendarySound(){

  const now = audioCtx.currentTime;

  // low bass hit
  const o1 = audioCtx.createOscillator();
  const g1 = audioCtx.createGain();

  o1.type = "sawtooth";
  o1.frequency.setValueAtTime(90, now);
  o1.frequency.exponentialRampToValueAtTime(40, now + 0.5);

  g1.gain.setValueAtTime(0.3, now);
  g1.gain.exponentialRampToValueAtTime(0.001, now + 0.6);

  o1.connect(g1);
  g1.connect(audioCtx.destination);

  o1.start();
  o1.stop(now + 0.6);

  // high shimmer
  const o2 = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();

  o2.type = "sine";
  o2.frequency.setValueAtTime(1200, now);
  o2.frequency.exponentialRampToValueAtTime(600, now + 0.4);

  g2.gain.setValueAtTime(0.15, now);
  g2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);

  o2.connect(g2);
  g2.connect(audioCtx.destination);

  o2.start();
  o2.stop(now + 0.5);
}

/* GAME STATE */
let run=false;
let f=0,b=0;

let levelIndex=0;
const levels=["junior","middle","senior"];
const speed=[900,600,350];

let t=7;
let bossHp=5;
let qIndex=0;

let spawnTimer;

/* QUESTIONS */
const questions=[
"Ты меня любишь?",
"А если я изменюсь?",
"Я идеальная?"
];

const options=[
["❤️ да","💨 нет","🍕 пицца"],
["❤️ всегда","😎 да","💨 не знаю"],
["❤️ богиня","🍕 пицца","😎 люблю"]
];

window.startGame=startGame;

/* START */
function startGame(){
  audioCtx.resume(); // важно для браузера
  document.getElementById("hud").style.display="flex";
  run=true;
  spawn();
  timer();
}

/* SPAWN */
function spawn(){
  spawnTimer=setInterval(()=>{
    if(!run) return;

    let e=document.createElement("div");
    let type=Math.random()<0.5?"feature":"rat";

    e.className="entity "+type;
    e.innerText=type==="feature"?"🐻":"🐀";
    e.style.left=Math.random()*innerWidth+"px";
    e.style.top=Math.random()*innerHeight+"px";

    e.onclick=()=>{
      drawSound(); // 🔊
      if(type==="feature") f++; else b++;
      update();
      e.remove();
    };

    document.body.appendChild(e);
    setTimeout(()=>e.remove(),2000);

  }, speed[levelIndex]);
}

/* TIMER */
function timer(){
  setInterval(()=>{
    if(!run) return;

    t--;
    timerBox.innerText="⏱ "+t;

    if(t<=0){
      nextLevel();
    }
  },1000);
}

/* LEVELS */
function nextLevel(){

  levelIndex++;

  if(levelIndex>=levels.length){
    startBoss();
    return;
  }

  document.getElementById("level").innerText=levels[levelIndex];
  t=7;

  clearInterval(spawnTimer);
  spawn();
}

/* HUD */
function update(){
  left.innerText="🐻 "+f;
  right.innerText="🐀 "+b;
}

/* BOSS */
function startBoss(){
  run=false;
  document.getElementById("boss").style.display="block";
  showQuestion();
}

function hitBoss(){
  bossHp--;
  legendarySound(); // 🔊

  document.getElementById("bossHp").innerText =
    "❤️".repeat(Math.max(0,bossHp));

  if(bossHp<=0){
    win();
  }
}

/* CARDS */
function showQuestion(){
  const card=document.getElementById("questionCard");
  card.style.display="block";

  card.innerHTML="👩 Ольга:<br><br>"+questions[qIndex];

  options[qIndex].forEach(opt=>{
    let d=document.createElement("div");
    d.className="option flip";
    d.innerText=opt;

    d.onclick=()=>{
      hitBoss();
      qIndex++;

      if(qIndex>=questions.length){
        win();
        return;
      }

      card.innerHTML="";
      showQuestion();
    };

    card.appendChild(d);
  });
}

/* END */
function win(){

  document.body.innerHTML+=`
    <div id="end">
      <div id="heart">❤️</div>
      <div id="infinity">∞</div>
      <div style="margin-top:20px">LOVE MAX</div>
      <div style="font-size:28px;margin-top:20px">
        🎉 С ДНЕМ РОЖДЕНИЯ АРТЕМ 🎉
      </div>
    </div>
  `;

  setTimeout(()=>{
    document.getElementById("heart").style.display="none";
    document.getElementById("infinity").style.display="block";
  },2000);
}

/* TERMINAL */
const cmd=document.getElementById("cmd");
cmd.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    if(cmd.value.trim()==="start") startGame();
    cmd.value="";
  }
});

</script>

</body>
</html>
