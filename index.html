<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM // PROD DEBUG GAME</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  overflow:hidden;
  color:#00ff9f;
}

#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:20px;
  z-index:9999;
  text-align:center;
  padding:20px;
}

#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

#console{
  position:fixed;
  inset:0;
  background:black;
  padding:20px;
  display:flex;
  flex-direction:column;
  z-index:10;
}

#terminalHeader{opacity:0.8;margin-bottom:10px;}

#terminalLog{
  flex:1;
  overflow:auto;
  font-size:14px;
}

#terminalInputLine{
  display:flex;
  gap:10px;
  border-top:1px solid #00ff9f;
  padding-top:10px;
}

#cmd{
  flex:1;
  background:black;
  border:none;
  color:#00ff9f;
  outline:none;
  font-size:16px;
}

#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:18px;
  z-index:5;
}

#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  z-index:5;
}

#hint{
  position:fixed;
  bottom:220px;
  left:20px;
  color:#fff;
  font-size:13px;
  z-index:6;
  opacity:0.8;
  max-width:300px;
}

.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
}

.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}
.anime{color:#ff4dff;font-size:70px;text-shadow:0 0 10px #ff4dff;}
.kalyan{color:#00ffaa;font-size:75px;text-shadow:0 0 10px #00ffaa;}

#stats{
  position:fixed;
  top:140px;
  left:20px;
  color:white;
  font-size:14px;
}

#bossModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

#bossBox{
  width:420px;
  background:#111;
  border:2px solid red;
  padding:20px;
  text-align:center;
  color:white;
}

#olgaEmotion{
  font-size:20px;
  margin-bottom:10px;
}

.card{
  width:140px;
  height:120px;
  background:#111;
  border:2px solid #00ff9f;
  border-radius:10px;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  margin:5px;
}
</style>
</head>

<body>

<div id="intro">
🚨 PROD УПАЛ 🚨<br><br>
🐀 БАГИ — кликай<br>
🐻 ФИЧИ — кликай<br><br>
👉 нажми любую клавишу
</div>

<canvas id="matrix"></canvas>

<div id="console">
  <div id="terminalHeader">SYSTEM TERMINAL</div>
  <div id="terminalLog">> start</div>
  <div id="terminalInputLine">
    ><input id="cmd">
  </div>
</div>

<div id="hud">
  <div id="left">🐻 0</div>
  <div id="right">🐀 0</div>
</div>

<div id="level"></div>

<div id="stats">
HP: <span id="hp">100</span> |
HAPPY: <span id="happy">0</span> |
REPAIR: <span id="repair">30</span>
</div>

<div id="hint">
🐻 x3 = +10% repair<br>
🐀 x3 = -5% repair<br>
🌸💨 = +5% happy / -1% repair<br>
<15% = GAME OVER
</div>

<div id="bossModal">
  <div id="bossBox">
    <div id="olgaEmotion">😐 Ольга смотрит...</div>
    <div id="olgaQ"></div>
    <div id="answers"></div>
  </div>
</div>

<script>

/* INTRO */
document.addEventListener("keydown",()=>{
  document.getElementById("intro").style.display="none";
});

/* MATRIX */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";
  ctx.fillText(Math.random()>0.5?0:1,Math.random()*c.width,Math.random()*c.height);
},50);

/* STATE */
let f=0,b=0,lvl=0,run=false;
let hp=100;
let happy=0;
let bossHP=100;
let repair=30;
let missedRats=0;

const levels=[
  {name:"JUNIOR"},
  {name:"MIDDLE"},
  {name:"SENIOR"}
];

/* CMD */
const cmd=document.getElementById("cmd");

cmd.onkeydown=(e)=>{
if(e.key!=="Enter") return;

if(cmd.value==="start"){
  run=true;
  document.getElementById("console").style.display="none";
  document.getElementById("hud").style.display="flex";
  next();
}

cmd.value="";
};

/* GAME */
function next(){

document.getElementById("level").innerText="LEVEL: "+levels[lvl].name;

setInterval(()=>{

if(!run) return;

let e=document.createElement("div");
let r=Math.random();
let type="feature";

if(r<0.4) type="rat";
if(r>0.75) type="anime";
if(r>0.88) type="kalyan";

e.className="entity "+type;
e.innerText=type==="rat"?"🐀":type==="feature"?"🐻":type==="anime"?"🌸":"💨";

e.style.left=Math.random()*innerWidth+"px";
e.style.top=Math.random()*innerHeight+"px";

let clicked=false;

e.onclick=()=>{

clicked=true;

if(type==="rat") b++;
if(type==="feature"){
  f++;
  if(f%3===0) repair+=10;
}

if(type==="anime"||type==="kalyan"){
  happy+=5;
  repair-=1;
}

update();
e.remove();
check();
};

setTimeout(()=>{

if(!clicked && type==="rat"){
  missedRats++;
}

if(missedRats>=3){
  repair-=5;
  missedRats=0;
}

e.remove();
update();
check();

},2000);

document.body.appendChild(e);

},600);
}

/* LEVEL CHECK */
function check(){

if(repair<15){
  document.body.innerHTML="<h1 style='color:red;text-align:center;margin-top:20%'>GAME OVER</h1>";
  return;
}

if(happy>=70) lvl=2;
else if(happy>=40) lvl=1;
else lvl=0;

document.getElementById("level").innerText="LEVEL: "+levels[lvl].name;

if(happy>=100){
  boss();
}

}

/* UPDATE */
function update(){
document.getElementById("left").innerText="🐻 "+f;
document.getElementById("right").innerText="🐀 "+b;
document.getElementById("hp").innerText=hp;
document.getElementById("happy").innerText=happy;
document.getElementById("repair").innerText=repair;
}

/* BOSS FIXED */
function boss(){

document.getElementById("bossModal").style.display="flex";

bossHP = 100;
window.bossActive = true;
window.bossLocked = false;

window.round = 0;
window.maxRounds = 5;
window.nextLocked = false;

nextRound();
}

/* QUESTIONS FIXED FINAL */
function nextRound(){

if(!window.bossActive || window.bossLocked) return;

const box=document.getElementById("answers");
if(!box) return;

/* стоп */
if(bossHP <= 0 || window.round >= window.maxRounds){
  window.bossActive = false;
  window.bossLocked = true;
  endGame();
  return;
}

window.round++;

if(window.nextLocked) return;
window.nextLocked = true;

const questions=[
  "а ты меня любишь?",
  "а ты любил бы меня, если бы я была червем?",
  "будешь меня любить, если я буду толстая?",
  "кто самая сладкая Мишка?"
];

document.getElementById("olgaQ").innerText =
"🐀 Ольга: " + questions[Math.floor(Math.random()*questions.length)];

box.innerHTML="";

const answers=[
  {t:"кальян",d:5,h:10},
  {t:"пицца",d:5,h:10},
  {t:"Я АРТЕЕЕЕЕМ",d:10,h:15}
];

let autoNext=setTimeout(()=>{
  if(window.bossActive && !window.bossLocked){
    window.nextLocked=false;
    nextRound();
  }
},3500);

answers.forEach(a=>{

let c=document.createElement("div");
c.className="card";
c.innerText=a.t;

c.onclick=()=>{

if(!window.bossActive || window.bossLocked) return;

clearTimeout(autoNext);

bossHP-=a.d;
hp-=3;
happy+=a.h;

update();

if(bossHP <= 0){
  window.bossActive=false;
  window.bossLocked=true;
  endGame();
  return;
}

window.nextLocked=false;
nextRound();

};

box.appendChild(c);

});

}

/* END GAME */
function endGame(){

window.bossActive=false;
window.bossLocked=true;

document.getElementById("bossBox").innerHTML=`
<h1>🎉 ИГРА ПРОЙДЕНА 🎉</h1>
<br>
<p>Артему приз:</p>
<h2>🍰 30 кусочков тортика 🍰</h2>
<br>
<p>Ольга довольна 😌</p>
`;

for(let i=0;i<30;i++){
let cake=document.createElement("div");
cake.innerText="🍰";
cake.style.position="absolute";
cake.style.left=Math.random()*100+"%";
cake.style.top=Math.random()*100+"%";
cake.style.fontSize="22px";
document.body.appendChild(cake);
}

}

</script>
</body>
</html>
