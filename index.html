<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM // PROD DEBUG GAME</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  overflow:hidden;
  color:#00ff9f;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:28px;
  z-index:9999;
  text-align:center;
}

/* MATRIX */
#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

/* TERMINAL */
#console{
  position:fixed;
  inset:0;
  background:black;
  padding:20px;
  display:flex;
  flex-direction:column;
  z-index:10;
}

#terminalHeader{opacity:0.8;margin-bottom:10px;}

#terminalLog{
  flex:1;
  overflow:auto;
  font-size:14px;
  line-height:1.4;
}

#terminalInputLine{
  display:flex;
  gap:10px;
  border-top:1px solid #00ff9f;
  padding-top:10px;
}

#cmd{
  flex:1;
  background:black;
  border:none;
  color:#00ff9f;
  outline:none;
  font-size:16px;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:20px;
  z-index:5;
}

/* INSTRUCTION */
#instruction{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:14px;
  opacity:0.7;
  z-index:5;
}

/* LEVEL */
#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
}

.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}

/* LOVE */
#loveWrap{
  position:fixed;
  top:110px;
  left:50%;
  transform:translateX(-50%);
  width:300px;
  height:16px;
  border:2px solid #ff4d4d;
  z-index:5;
}

#loveBar{
  width:50%;
  height:100%;
  background:#ff4d4d;
  transition:.3s;
}

/* BOSS */
#bossModal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.9);
  z-index:999;
  flex-direction:column;
}

#bossCard{
  width:420px;
  background:#111;
  border:2px solid #ff4d4d;
  border-radius:14px;
  padding:20px;
  text-align:center;
  color:#fff;
}

#bossTitle{
  font-size:20px;
  margin-bottom:10px;
  color:#ff4d4d;
}

#options{
  margin-top:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.optionBtn{
  padding:10px;
  background:black;
  border:1px solid #00ff9f;
  color:#00ff9f;
  cursor:pointer;
}

.optionBtn:hover{
  background:#00ff9f;
  color:black;
}

/* WIN */
#win{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:40px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  🚨 ОООО НЕТ<br>
  ПРОД УПАЛ<br><br>
  только <b>SUPER ARTEEM</b> может его спасти<br><br>
  <span style="font-size:16px;opacity:0.6;">нажми любую клавишу</span>
</div>

<canvas id="matrix"></canvas>

<div id="console">
  <div id="terminalHeader">SYSTEM TERMINAL // PROD CRASH</div>

  <div id="terminalLog">
    > PROD BROKEN DETECTED<br>
    > баги = 🐀<br>
    > фичи = 🐻<br><br>
    > type: start<br>
  </div>

  <div id="terminalInputLine">
    >
    <input id="cmd" autocomplete="off">
  </div>
</div>

<div id="hud">
  <div id="left">🐻 0</div>
  <div id="right">🐀 0</div>
</div>

<div id="instruction">
  🐀 — кликай чтобы фиксить баги | 🐻 — собирай фичи
</div>

<div id="level"></div>

<div id="loveWrap"><div id="loveBar"></div></div>

<div id="bossModal">
  <div id="bossCard">
    <div id="bossTitle">🐀 ОЛЬГА КРЫСА</div>
    <div id="bossQuestion">...</div>
    <div id="options"></div>
  </div>
</div>

<div id="win"></div>

<!-- 🃏 HEARTHSTONE ADDONS UI -->
<div id="mana" style="position:fixed;top:90px;right:20px;font-size:18px;color:#00ffff;z-index:5;">
⚡ MANA: 0
</div>

<div id="deck" style="position:fixed;bottom:10px;right:10px;font-size:14px;color:#00ffff;z-index:10;">
🃏 DECK: 0
</div>

<script>

/* INTRO */
document.addEventListener("keydown",()=>{
  document.getElementById("intro").style.display="none";
});

/* MATRIX */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

const drops=Array(60).fill(1);

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";

  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?0:1,i*18,y*18);
    drops[i]=y*18>c.height?0:y+1;
  });
},50);

/* SOUND */
function sound(){
  new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg").play();
}
function legendary(){
  new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

/* STATE */
let f=0,b=0;
let lvl=0;
let run=false;
let love=50;

/* LEVELS */
const levels=[
  {name:"JUNIOR",goal:4},
  {name:"MIDDLE",goal:6},
  {name:"SENIOR",goal:8}
];

/* START */
const cmd=document.getElementById("cmd");
const log=document.getElementById("terminalLog");

cmd.onkeydown=(e)=>{
  if(e.key!=="Enter") return;

  const v=cmd.value.trim();
  log.innerHTML+="<br>> "+v;

  if(v==="start"){
    setTimeout(()=>{
      document.getElementById("console").style.display="none";
      document.getElementById("hud").style.display="flex";
      start();
    },500);
  }

  if(v==="hs mode"){
    setInterval(()=>{mana+=5;updateMana();},1000);
    log.innerHTML+="<br>🃏 HEARTHSTONE MODE";
  }

  cmd.value="";
};

function start(){
  run=true;
  next();
}

/* GAME */
function next(){
  if(lvl>=levels.length){
    boss();
    return;
  }

  document.getElementById("level").innerText="LEVEL: "+levels[lvl].name;

  setInterval(()=>{
    if(!run) return;

    let e=document.createElement("div");
    let type=Math.random()>0.5?"feature":"rat";

    e.className="entity "+type;
    e.innerText=type==="feature"?"🐻":"🐀";

    e.style.left=Math.random()*innerWidth+"px";
    e.style.top=Math.random()*innerHeight+"px";

    e.onclick=()=>{
      sound();
      type==="feature"?f++:b++;
      update();

      if(f>=levels[lvl].goal){
        lvl++;
        next();
      }

      e.remove();
    };

    document.body.appendChild(e);
    setTimeout(()=>e.remove(),2000);

  },600);
}

function update(){
  left.innerText="🐻 "+f;
  right.innerText="🐀 "+b;

  checkCombo();
}

/* LOVE */
function updateLove(){
  document.getElementById("loveBar").style.width=love+"%";
}

/* ================= HEARTHSTONE SYSTEM ================= */

let mana=0;
let deck=[];

const cardPool=[
  {name:"🧙 Debug Vision",type:"DEV"},
  {name:"🧹 Garbage Collector",type:"DEV"},
  {name:"🐀 Bug Loop",type:"BUG"},
  {name:"🌸 Sakura Boost",type:"ANIME"},
  {name:"👑 ARTEM ASCENSION",type:"LEGENDARY"}
];

function updateMana(){
  document.getElementById("mana").innerText="⚡ MANA: "+Math.floor(mana);
}

function updateDeck(){
  document.getElementById("deck").innerText="🃏 DECK: "+deck.length;
}

function playCard(card){
  legendary();

  if(card.type==="DEV") b=Math.max(0,b-3);
  if(card.type==="BUG") b+=2;
  if(card.type==="ANIME"){f+=2;love+=5;updateLove();}
  if(card.type==="LEGENDARY"){
    f+=5;b=Math.max(0,b-5);love+=20;updateLove();
    document.body.style.filter="hue-rotate(180deg)";
    setTimeout(()=>document.body.style.filter="",800);
  }

  update();
}

function drawCard(){

  let c=cardPool[Math.floor(Math.random()*cardPool.length)];
  deck.push(c);
  updateDeck();

  let el=document.createElement("div");
  el.className="entity feature";
  el.innerText="🃏";
  el.style.left=Math.random()*innerWidth+"px";
  el.style.top=Math.random()*innerHeight+"px";
  el.style.color="#00ffff";

  el.onclick=()=>{
    playCard(c);
    el.remove();
    deck.pop();
    updateDeck();
  };

  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

setInterval(()=>{
  if(run && Math.random()<0.12) drawCard();
},1200);

setInterval(()=>{
  if(run) mana+=f*0.05;
  updateMana();
},1000);

/* COMBO */
function checkCombo(){
  if(f>5 && b>5){
    love+=10;
    updateLove();
  }
}

/* SECRET */
setInterval(()=>{
  if(Math.random()<0.03){
    let s=document.createElement("div");
    s.innerText="🧿 ARTEM WAS HERE";
    s.style.position="fixed";
    s.style.top=Math.random()*80+"%";
    s.style.left=Math.random()*80+"%";
    s.style.color="gold";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),2000);
  }
},2000);

/* BOSS */
const questions=["Ты любишь DEV?","А баги?","А фиксы?"];
const answers=["❤️ да","💨 кальян","🍕 пицца"];

let bossIndex=0;

function boss(){
  const modal=document.getElementById("bossModal");
  const q=document.getElementById("bossQuestion");
  const opt=document.getElementById("options");

  modal.style.display="flex";
  bossIndex=0;

  function render(){
    if(bossIndex>=questions.length){
      end();
      return;
    }

    q.innerText=questions[bossIndex];
    opt.innerHTML="";

    answers.forEach(a=>{
      let b=document.createElement("div");
      b.className="optionBtn";
      b.innerText=a;

      b.onclick=()=>{
        legendary();
        love+=15;
        updateLove();
        bossIndex++;
        setTimeout(render,600);
      };

      opt.appendChild(b);
    });
  }

  render();
}

/* END */
function end(){
  document.getElementById("bossModal").innerHTML=`
  <div style="position:fixed;inset:0;background:black;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#ff4d4d;">
  🎉 ARTEM WIN 🎉
  </div>`;
}

</script>
</body>
</html>
