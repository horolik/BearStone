<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Bear Debug System 🐻</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: black;
  color: #00ff9f;
  overflow: hidden;
}

#hud {
  position: fixed;
  top: 10px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
  font-size: 20px;
}

#app { padding: 20px; }

.bug {
  position: absolute;
  font-size: 42px;
  cursor: pointer;
}

.feature { color: #00ff9f; }
.rat { color: #ff4d4d; }
.danger { filter: drop-shadow(0 0 10px red); }

</style>
</head>

<body>

<div id="hud">
<div id="features">🐻 0</div>
<div id="bugs">🐀 0</div>
<div id="timer">⏳ 30</div>
</div>

<div id="app">
<button id="start">START</button>
<div id="log"></div>
</div>

<script>

/* ===== STATE ===== */
let features = 0;
let bugs = 0;

let gameRunning = false;
let startTime = 0;

const GAME_DURATION = 30000; // 30 сек
const MAX_ENTITIES = 20;

const entities = [];

/* ===== START ===== */
start.onclick = () => {
  reset();

  gameRunning = true;
  startTime = performance.now();

  requestAnimationFrame(loop);
};

/* ===== LOOP ===== */
function loop(now) {
  if (!gameRunning) return;

  const elapsed = now - startTime;
  const timeLeft = Math.max(0, Math.ceil((GAME_DURATION - elapsed) / 1000));

  timer.innerText = "⏳ " + timeLeft;

  // спавн
  if (entities.length < MAX_ENTITIES && Math.random() < 0.05) {
    spawn();
  }

  // удаление старых
  for (let i = entities.length - 1; i >= 0; i--) {
    const e = entities[i];
    if (now - e.born > 2500) {
      e.el.remove();
      entities.splice(i, 1);
    }
  }

  // конец строго через 30 сек
  if (elapsed >= GAME_DURATION) {
    finish();
    return;
  }

  requestAnimationFrame(loop);
}

/* ===== SPAWN ===== */
function spawn() {
  const el = document.createElement("div");

  const r = Math.random();
  let type = r > 0.6 ? "feature" : (r > 0.2 ? "rat" : "danger");

  el.className = "bug " + type;
  el.innerText = type === "feature" ? "🐻" : "🐀";

  el.style.left = Math.random() * innerWidth + "px";
  el.style.top = Math.random() * innerHeight + "px";

  el.onclick = () => {
    if (type === "feature") features++;
    else bugs++;

    update();
    el.remove();
  };

  document.body.appendChild(el);
  entities.push({ el, born: performance.now() });
}

/* ===== UPDATE ===== */
function update() {
  featuresEl.innerText = "🐻 " + features;
  bugsEl.innerText = "🐀 " + bugs;
}

/* ===== RESET ===== */
function reset() {
  features = 0;
  bugs = 0;

  update();
  log.innerText = "";

  entities.forEach(e => e.el.remove());
  entities.length = 0;
}

/* ===== FINISH ===== */
function finish() {
  gameRunning = false;

  log.innerText =
    (bugs > features ? "📉 FAIL" : "🚀 SUCCESS") +
    "\n🐻 " + features +
    "\n🐀 " + bugs;
}

</script>

</body>
</html>
