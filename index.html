```html id="hs_full_final"
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM // Hearthstone Debug</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

/* MATRIX */
#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

/* CONSOLE */
#console{
  position:fixed;
  inset:0;
  padding:20px;
  z-index:10;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:20px;
  z-index:5;
}

/* LEVEL */
#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  z-index:6;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
}

.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}

/* ===== FLIP CARD ===== */
.card-container{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:320px;
  height:180px;
  perspective:1000px;
  display:none;
  z-index:20;
}

.card{
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:0.6s;
  position:relative;
}

.card.flipped{
  transform:rotateY(180deg);
}

.face{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  border:2px solid gold;
  background:#111;
  color:white;
  text-align:center;
  padding:10px;
}

.back{
  transform:rotateY(180deg);
}

/* HUD TEXT */
#info{
  position:fixed;
  bottom:10px;
  left:20px;
}

/* BUTTON */
.option{
  margin-top:10px;
  padding:8px;
  border:1px solid #00ff9f;
  cursor:pointer;
}

.option:hover{
  background:#003322;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- CONSOLE -->
<div id="console">
> PROD CRASH 🐀<br>
> баги в системе<br><br>

> Введите: start<br>

<input id="cmd" autofocus>
<div id="out"></div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="left">🐻 0</div>
  <div id="right">🐀 0</div>
</div>

<div id="level"></div>

<div id="info"></div>

<!-- CARD -->
<div class="card-container" id="cardBox">
  <div class="card" id="card">
    <div class="face" id="front">QUESTION</div>
    <div class="face back" id="back">ANSWER</div>
  </div>
</div>

<script>

/* ===== AUDIO (HS STYLE SIMULATION) ===== */
function playDraw(){
  new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg").play();
}

function playLegendary(){
  new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

/* ===== MATRIX ===== */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

const drops=Array(60).fill(1);

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";

  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?0:1,i*18,y*18);
    drops[i]=y*18>c.height?0:y+1;
  });
},50);

/* ===== STATE ===== */
let f=0,b=0;
let lvl=0;
let run=false;

/* ===== LEVELS ===== */
const levels=[
  {name:"JUNIOR",goal:4},
  {name:"MIDDLE",goal:6},
  {name:"SENIOR",goal:8}
];

/* ===== START FIX (ВАЖНО) ===== */
cmd.addEventListener("keydown",(e)=>{
  if(e.key!=="Enter") return;

  const v=e.target.value.trim().toLowerCase();

  out.innerHTML+="<br>> "+v;

  if(v==="start"){
    startGame();
  }

  e.target.value="";
});

/* ===== START ===== */
function startGame(){
  document.getElementById("console").style.display="none";
  document.getElementById("hud").style.display="flex";

  run=true;
  nextLevel();
}

/* ===== LEVEL FLOW ===== */
function nextLevel(){

  if(lvl>=levels.length){
    boss();
    return;
  }

  document.getElementById("level").innerText=
    "LEVEL: "+levels[lvl].name;

  spawn(levels[lvl]);
}

/* ===== SPAWN ===== */
function spawn(L){
  setInterval(()=>{
    if(!run) return;

    let e=document.createElement("div");

    let type=Math.random()>0.5?"feature":"rat";

    e.className="entity "+type;
    e.innerText=type==="feature"?"🐻":"🐀";

    e.style.left=Math.random()*innerWidth+"px";
    e.style.top=Math.random()*innerHeight+"px";

    e.onclick=()=>{
      playDraw();

      if(type==="feature") f++;
      else b++;

      update();

      if(f>=L.goal){
        lvl++;
        nextLevel();
      }

      e.remove();
    };

    document.body.appendChild(e);

    setTimeout(()=>e.remove(),2000);

  },600);
}

/* ===== UPDATE ===== */
function update(){
  left.innerText="🐻 "+f;
  right.innerText="🐀 "+b;
}

/* ===== BOSS ===== */
const questions=[
  "А ты меня любишь?",
  "А я красивая?",
  "А если я толстая?"
];

const answers=[
  "❤️ да",
  "💨 кальян",
  "🍕 пицца"
];

function boss(){

  showCard();

}

/* ===== FLIP CARD (HEARTHSTONE STYLE) ===== */
function showCard(){

  const box=document.getElementById("cardBox");
  const card=document.getElementById("card");
  const front=document.getElementById("front");
  const back=document.getElementById("back");

  box.style.display="block";

  let i=0;

  function next(){

    if(i>=questions.length){
      playLegendary();
      back.innerText="🏆 ARTEEM WIN";
      card.classList.add("flipped");
      return;
    }

    playDraw();

    front.innerText="👩 Ольга:\n"+questions[i];
    back.innerHTML="🧑 Ответ:<br>";

    answers.forEach(a=>{
      let d=document.createElement("div");
      d.className="option";
      d.innerText=a;

      d.onclick=()=>{
        playLegendary();

        card.classList.add("flipped");

        setTimeout(()=>{
          card.classList.remove("flipped");
          i++;
          next();
        },800);
      };

      back.appendChild(d);
    });

  }

  next();
}

</script>

</body>
</html>
