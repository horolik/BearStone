<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🐻 BearStone</title>

<style>
body {
  margin: 0;
  background: #05070a;
  color: #00ff9f;
  font-family: monospace;
  overflow: hidden;
}

/* ================= SCREENS ================= */
.screen {
  display: none;
  width: 100vw;
  height: 100vh;
}

.active {
  display: block;
}

/* ================= TUTORIAL ================= */
#tutorial {
  padding: 30px;
}

/* ================= BUGS ================= */
.bug {
  position: absolute;
  font-size: 30px;
  cursor: pointer;
  user-select: none;
}

/* ================= GAME BOARD ================= */
#board {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

.hero {
  width: 200px;
  border: 2px solid #00ff9f;
  padding: 10px;
}

/* ================= HAND ================= */
#hand {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
}

.card {
  width: 120px;
  height: 150px;
  border: 1px solid #00ff9f;
  padding: 10px;
  cursor: pointer;
  background: rgba(0,255,159,0.05);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-20px) scale(1.05);
  border-color: white;
}
</style>
</head>

<body>

<!-- ================= 1. TUTORIAL ================= -->
<div id="tutorial" class="screen active">
  <h1>🐻 BearStone</h1>

  <p>Инструкция:</p>
  <ul>
    <li>🐻 Лови баги (5 кликов)</li>
    <li>🃏 Потом откроются карты</li>
    <li>💀 Босс — Toxic PM</li>
    <li>🔥 Комбо: DEV + DEV + DEV</li>
  </ul>

  <button onclick="startBugGame()">START</button>
</div>

<!-- ================= 2. BUG GAME ================= -->
<div id="bugGame" class="screen"></div>

<!-- ================= 3. CARD GAME ================= -->
<div id="game" class="screen">

  <div id="board">
    <div class="hero">
      <h3>Artem</h3>
      HP: <span id="hp">20</span><br>
      Mana: <span id="mana">1</span>
    </div>

    <div class="hero">
      <h3>Toxic PM</h3>
      HP: <span id="bossHp">30</span>
    </div>
  </div>

  <div id="hand"></div>

  <button onclick="endTurn()">End Turn</button>
</div>

<script>
/* ================= STATE ================= */
let bugs = 0;

const Game = {
  hp: 20,
  mana: 1,
  bossHp: 30
};

/* ================= SCREEN SWITCH ================= */
function show(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ================= 1. BUG GAME ================= */
function startBugGame(){
  show("bugGame");

  const screen = document.getElementById("bugGame");

  const interval = setInterval(() => {

    const bug = document.createElement("div");
    bug.className = "bug";
    bug.innerText = "🐻";

    bug.style.left = Math.random() * window.innerWidth + "px";
    bug.style.top = Math.random() * window.innerHeight + "px";

    bug.onclick = () => {
      bugs++;
      bug.remove();

      if (bugs >= 5) {
        clearInterval(interval);
        startGame();
      }
    };

    screen.appendChild(bug);

    setTimeout(() => bug.remove(), 1500);

  }, 400);
}

/* ================= 2. CARDS ================= */
const Cards = [
  { name:"Bug Fix", cost:1, dmg:2 },
  { name:"Hotfix", cost:2, dmg:4 },
  { name:"Shield", cost:2, heal:3 }
];

/* ================= RENDER ================= */
const hand = document.getElementById("hand");

function render(){
  hand.innerHTML = "";

  Cards.forEach((c,i) => {
    const el = document.createElement("div");
    el.className = "card";
    el.innerHTML = `<b>${c.name}</b><br>cost: ${c.cost}`;

    el.onclick = () => playCard(c);

    hand.appendChild(el);
  });

  update();
}

/* ================= PLAY CARD ================= */
function playCard(card){

  if(Game.mana < card.cost) return;

  Game.mana -= card.cost;

  if(card.dmg){
    Game.bossHp -= card.dmg;
  }

  if(card.heal){
    Game.hp += card.heal;
  }

  update();
}

/* ================= TURN ================= */
function endTurn(){
  Game.mana++;

  Game.bossHp -= 2;

  update();

  if(Game.bossHp <= 0){
    document.body.innerHTML = "<h1>🐻 YOU WIN</h1>";
  }
}

/* ================= GAME START ================= */
function startGame(){
  show("game");
  render();
}

/* ================= UI ================= */
function update(){
  document.getElementById("hp").innerText = Game.hp;
  document.getElementById("mana").innerText = Game.mana;
  document.getElementById("bossHp").innerText = Game.bossHp;
}
</script>

</body>
</html>
