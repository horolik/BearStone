<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM // STATE GAME</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  overflow:hidden;
  color:#00ff9f;
}

#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:20px;
  z-index:9999;
  text-align:center;
}

#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

#console{
  position:fixed;
  inset:0;
  background:black;
  padding:20px;
  display:flex;
  flex-direction:column;
  z-index:10;
}

#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  z-index:5;
}

#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  z-index:5;
}

.entity{
  position:absolute;
  font-size:50px;
  cursor:pointer;
}

.rat{color:red;}
.feature{color:#00ff9f;}
.anime{color:#ff4dff;}
.kalyan{color:#00ffaa;}

#bossModal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.9);
  z-index:999;
}

#bossBox{
  width:420px;
  background:#111;
  border:2px solid red;
  padding:20px;
  text-align:center;
}
.card{
  width:120px;
  height:100px;
  border:2px solid #00ff9f;
  margin:5px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="intro">Нажми любую клавишу</div>

<canvas id="matrix"></canvas>

<div id="console">
  <div>terminal</div>
  <input id="cmd">
</div>

<div id="hud">
  <div id="left"></div>
  <div id="right"></div>
</div>

<div id="level"></div>

<div id="bossModal">
  <div id="bossBox">
    <div id="olgaQ"></div>
    <div id="answers"></div>
  </div>
</div>

<script>

/* =========================
   STATE MACHINE
========================= */

const STATE = {
  PLAY: "play",
  BOSS: "boss",
  END: "end"
};

let gameState = STATE.PLAY;

/* =========================
   GAME STATE
========================= */

let f=0,b=0,happy=0,repair=30;

let spawnInterval = null;

/* =========================
   INTRO
========================= */

document.addEventListener("keydown",()=>{
  document.getElementById("intro").style.display="none";
});

/* =========================
   MATRIX (optional)
========================= */

const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";
  ctx.fillText(Math.random()>0.5?"0":"1",Math.random()*c.width,Math.random()*c.height);
},50);

/* =========================
   START
========================= */

document.getElementById("cmd").onkeydown=(e)=>{
if(e.key!=="Enter") return;

if(e.target.value==="start"){
  startGame();
}

e.target.value="";
};

/* =========================
   START GAME
========================= */

function startGame(){
  gameState = STATE.PLAY;

  document.getElementById("console").style.display="none";
  document.getElementById("hud").style.display="flex";

  startSpawn();
}

/* =========================
   SPAWN SYSTEM
========================= */

function startSpawn(){

if(spawnInterval) clearInterval(spawnInterval);

spawnInterval = setInterval(()=>{

if(gameState !== STATE.PLAY) return;

let e=document.createElement("div");
let r=Math.random();
let type="feature";

if(r<0.4) type="rat";
else if(r<0.75) type="feature";
else if(r<0.9) type="anime";
else type="kalyan";

e.className="entity "+type;
e.innerText = type==="rat"?"🐀":"🐻";

e.style.left=Math.random()*innerWidth+"px";
e.style.top=Math.random()*innerHeight+"px";

e.onclick=()=>{

if(gameState !== STATE.PLAY) return;

if(type==="rat") b++;
if(type==="feature") f++;
if(type!=="rat" && type!=="feature") happy+=5;

update();
e.remove();
check();
};

setTimeout(()=>{
e.remove();
},2000);

document.body.appendChild(e);

},600);
}

/* =========================
   CHECK
========================= */

function check(){

if(repair<15){
  endGame();
  return;
}

if(happy>=80){
  startBoss();
}

}

/* =========================
   UPDATE
========================= */

function update(){
document.getElementById("left").innerText="🐻 "+f;
document.getElementById("right").innerText="🐀 "+b;
}

/* =========================
   BOSS START
========================= */

function startBoss(){

gameState = STATE.BOSS;

/* STOP SPAWN */
if(spawnInterval){
  clearInterval(spawnInterval);
  spawnInterval = null;
}

document.getElementById("bossModal").style.display="flex";

window.bossHP = 100;
window.round = 0;
window.maxRounds = 5;

nextRound();
}

/* =========================
   BOSS LOGIC
========================= */

function nextRound(){

if(gameState !== STATE.BOSS) return;

if(window.round >= window.maxRounds){
  endGame();
  return;
}

window.round++;

const q=[
"ты меня любишь?",
"если я червь?",
"если я толстая?",
"кто милашка?",
"останешься?"
];

document.getElementById("olgaQ").innerText="🐀 "+q[window.round-1];

const box=document.getElementById("answers");
box.innerHTML="";

const answers=[
{t:"кальян",d:10,h:10},
{t:"пицца",d:5,h:5},
{t:"шутки",d:15,h:20}
];

answers.forEach(a=>{

let c=document.createElement("div");
c.className="card";
c.innerText=a.t;

c.onclick=()=>{

if(gameState !== STATE.BOSS) return;

window.bossHP -= a.d;
happy += a.h;

update();

if(window.bossHP<=0){
  endGame();
  return;
}

nextRound();
};

box.appendChild(c);

});

}

/* =========================
   END GAME
========================= */

function endGame(){

gameState = STATE.END;

/* STOP EVERYTHING */
if(spawnInterval){
  clearInterval(spawnInterval);
  spawnInterval=null;
}

document.body.innerHTML=
"<h1 style='color:#00ff9f;text-align:center;margin-top:20%'>🎉 WIN 🎉</h1>";

}

</script>
</body>
</html>
