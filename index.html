```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Artem Debug → Olga Boss Fight</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

/* MATRIX */
#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

/* CONSOLE */
#console{
  position:fixed;
  inset:0;
  padding:20px;
  z-index:2;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:22px;
  z-index:5;
}

/* LEVEL INFO */
#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:24px;
  z-index:5;
}

#info{
  position:fixed;
  bottom:10px;
  left:20px;
  z-index:5;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:64px;
  cursor:pointer;
  transition:.3s;
}

.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}
.super{filter:drop-shadow(0 0 10px red);}

/* BOSS */
#boss{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:220px;
  background:#111;
  border-top:2px solid red;
  display:none;
  align-items:center;
  padding:10px;
  z-index:10;
}

#boss img{
  width:120px;
  height:120px;
  border-radius:50%;
  margin-right:20px;
}

/* CARDS */
.card{
  position:absolute;
  width:160px;
  height:120px;
  background:#222;
  border:2px solid gold;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  cursor:pointer;
}

/* LEGEND */
#legend{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
  color:orange;
}

/* VICTORY */
#victory{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="console">
> SYSTEM CRASH 🐀<br>
> прод заражён багами<br><br>

> 🐻 фичи → вправо<br>
> 🐀 баги → влево<br>
> 🔥 супер-крыса = -2<br><br>

> Введите: start / старт<br>

<input id="cmd" autofocus>
<div id="out"></div>
</div>

<div id="hud">
  <div id="left">🐻 0</div>
  <div id="timer">⏳ 0</div>
  <div id="right">🐀 0</div>
</div>

<div id="level"></div>
<div id="info"></div>

<div id="boss">
  <img src="https://i.imgur.com/8QfQ2dZ.png">
  <div id="bossText">👩 Ольга: Ответь на мои вопросы...</div>
</div>

<div id="legend">💨 LEGENDARY КАЛЬЯН</div>
<div id="victory"></div>

<script>

/* MATRIX */
const c = document.getElementById("matrix");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

const drops = Array(80).fill(1);

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";

  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?0:1,i*16,y*16);
    drops[i]=y*16>c.height?0:y+1;
  });
},50);

/* STATE */
let f=0,b=0,t=0;
let lvl=0;
let run=false;

/* LEVELS */
const levels=[
  {name:"JUNIOR",time:15,goal:4},
  {name:"MIDDLE",time:20,goal:6},
  {name:"SENIOR",time:25,goal:8}
];

/* INPUT (ГЛАВНЫЙ ФИКС) */
document.getElementById("cmd").addEventListener("keydown",(e)=>{
  if(e.key!=="Enter") return;

  const v=e.target.value.trim().toLowerCase();
  document.getElementById("out").innerHTML += "<br>> "+v;

  if(v==="start"||v==="старт"){
    start();
  }else{
    document.getElementById("out").innerHTML += "<br>нужно: start";
  }

  e.target.value="";
});

/* START */
function start(){
  document.getElementById("console").style.display="none";
  document.getElementById("hud").style.display="flex";
  nextLevel();
}

/* LEVEL */
function nextLevel(){

  if(lvl>=levels.length){
    startBoss();
    return;
  }

  let L=levels[lvl];

  f=0;b=0;t=L.time;
  run=true;

  document.getElementById("level").innerText=L.name;
  document.getElementById("info").innerText="фикс багов";

  spawn();
  timer(L);
}

/* SPAWN */
function spawn(){
  setInterval(()=>{
    if(!run) return;

    let el=document.createElement("div");
    let r=Math.random();

    let type =
      r<0.1?"super":
      r<0.5?"rat":"feature";

    el.className="entity "+type;

    el.innerText =
      type==="feature"?"🐻":
      type==="rat"?"🐀":"🐀🔥";

    el.style.left=Math.random()*innerWidth+"px";
    el.style.top=Math.random()*innerHeight+"px";

    el.onclick=()=>{

      if(type==="feature"){
        f++;
        el.style.transform="translateX(200px)";
      }
      else if(type==="rat"){
        b++;
        el.style.transform="translateX(-200px)";
      }
      else{
        b+=2;
      }

      el.style.opacity=0;
      setTimeout(()=>el.remove(),300);

      update();
    };

    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2000);

  },600);
}

/* TIMER */
function timer(L){
  let i=setInterval(()=>{

    if(!run) return clearInterval(i);

    t--;
    document.getElementById("timer").innerText="⏳ "+t;

    if(f>=L.goal){
      run=false;
      lvl++;
      setTimeout(nextLevel,1000);
    }

    if(t<=0){
      run=false;
      startBoss();
    }

  },1000);
}

/* UPDATE */
function update(){
  document.getElementById("left").innerText="🐻 "+f;
  document.getElementById("right").innerText="🐀 "+b;
}

/* ===== BOSS ===== */
let hpA=10;
let hpO=12;

function startBoss(){

  document.getElementById("boss").style.display="flex";

  setInterval(()=>{

    if(hpO<=0||hpA<=0) return;

    let q=document.createElement("div");
    q.className="card";
    q.innerText="❓ вопрос Ольги";

    q.style.left=Math.random()*innerWidth+"px";
    q.style.top=Math.random()*innerHeight+"px";

    q.onclick=()=>{
      hpO--;

      answer();
      updateBoss();

      q.remove();
    };

    document.body.appendChild(q);
    setTimeout(()=>q.remove(),2500);

  },1000);
}

/* ANSWER */
function answer(){
  let a=document.createElement("div");
  a.className="card";
  a.innerText="💬 ответ Артема";

  a.style.left=Math.random()*innerWidth+"px";
  a.style.top=Math.random()*innerHeight+"px";

  document.body.appendChild(a);

  setTimeout(()=>a.remove(),2000);
}

/* UPDATE BOSS */
function updateBoss(){

  document.getElementById("left").innerText="🧑 "+hpA;
  document.getElementById("right").innerText="👩 "+hpO;

  if(hpO<=0){
    document.getElementById("victory").style.display="flex";
    document.getElementById("victory").innerText="🏆 АРТЕМ WIN (Team Lead)";
  }

  if(hpA<=0){
    document.getElementById("victory").style.display="flex";
    document.getElementById("victory").innerText="💀 ОЛЬГА WIN";
  }
}

</script>

</body>
</html>
