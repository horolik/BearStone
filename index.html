```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Bear Debug → Boss Fight 🔥</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

#matrix{position:fixed;inset:0;z-index:0;}

#console{
  position:fixed;
  inset:0;
  padding:20px;
  z-index:2;
}

#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:22px;
  z-index:3;
}

#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
}

#info{
  position:fixed;
  bottom:10px;
  left:20px;
  max-width:60%;
}

.entity{
  position:absolute;
  font-size:64px;
  cursor:pointer;
  transition:.4s;
}

.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}
.super{filter:drop-shadow(0 0 10px red);}

/* BOSS */
.card{
  position:absolute;
  width:120px;
  height:160px;
  border:2px solid gold;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  background:#111;
  color:white;
}

#legend{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
  color:orange;
}

#victory{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="console">
> SYSTEM FAILURE 🐀<br>
> Прод под угрозой<br><br>

> 🐻 = фичи (хорошо → вправо)<br>
> 🐀 = баги (плохо → влево)<br>
> 🔥 = супер-баг (−2)<br><br>

> Введи: start / старт<br>
<input id="cmd" autofocus>
<div id="out"></div>
</div>

<div id="hud">
  <div id="left">🐻 0</div>
  <div id="timer">⏳ 0</div>
  <div id="right">🐀 0</div>
</div>

<div id="level"></div>
<div id="info"></div>

<div id="legend">💨 LEGENDARY КАЛЬЯН</div>
<div id="victory"></div>

<script>

/* MATRIX */
const c=matrix;
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

const drops=Array(80).fill(1);

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.06)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";

  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?0:1,i*16,y*16);
    drops[i]=y*16>c.height?0:y+1;
  });
},50);

/* STATE */
let features=0, bugs=0, time=0;
let levelIndex=0;
let running=false;

const levels=[
  {name:"JUNIOR", time:15, goal:4},
  {name:"MIDDLE", time:20, goal:6},
  {name:"SENIOR", time:25, goal:8}
];

/* START */
cmd.onkeydown=(e)=>{
  if(e.key==="Enter"){
    const val=cmd.value.trim().toLowerCase();

    if(["start","старт"].includes(val)){
      console.style.display="none";
      hud.style.display="flex";
      startLevel();
    }else{
      out.innerHTML+="<br>пиши start";
    }

    cmd.value="";
  }
};

/* LEVEL */
function startLevel(){
  if(levelIndex>=levels.length){
    showLeadWin();
    return;
  }

  const l=levels[levelIndex];

  features=0;
  bugs=0;
  time=l.time;
  running=true;

  level.innerText="LEVEL: "+l.name;

  info.innerText="Чини прод. Быстро.";

  spawn();
  timer(l);
}

/* SPAWN */
function spawn(){
  const int=setInterval(()=>{
    if(!running) return clearInterval(int);

    if(document.querySelectorAll(".entity").length>12) return;

    const el=document.createElement("div");

    let type;
    const r=Math.random();

    if(r<0.1) type="super";
    else if(r<0.55) type="rat";
    else type="feature";

    el.className="entity "+type;

    el.innerText =
      type==="feature"?"🐻":
      type==="rat"?"🐀":"🐀🔥";

    el.style.left=Math.random()*innerWidth+"px";
    el.style.top=Math.random()*innerHeight+"px";

    el.onclick=()=>{

      if(type==="feature"){
        features++;
        el.style.transform="translateX(250px)";
      }
      else if(type==="rat"){
        bugs++;
        el.style.transform="translateX(-250px)";
      }
      else{
        bugs+=2;
        el.style.transform="scale(1.5)";
      }

      el.style.opacity="0";
      setTimeout(()=>el.remove(),400);

      update();
    };

    document.body.appendChild(el);

    setTimeout(()=>el.remove(),2000);

  },600);
}

/* TIMER */
function timer(l){
  const t=setInterval(()=>{
    if(!running) return clearInterval(t);

    time--;
    timer.innerText="⏳ "+time;

    if(features>=l.goal){
      running=false;
      levelIndex++;
      setTimeout(startLevel,1000);
    }

    if(time<=0){
      running=false;
      gameOver();
    }

  },1000);
}

/* UPDATE */
function update(){
  left.innerText="🐻 "+features;
  right.innerText="🐀 "+bugs;
}

/* TEAM LEAD */
function showLeadWin(){
  level.innerText="🏆 ВСЕ БАГИ ПОФИКШЕНЫ";
  info.innerText="Артем стал Team Lead 😎";

  setTimeout(startBoss,3000);
}

/* ===== BOSS ===== */
let hpA=10, hpO=12;

function startBoss(){
  features=0; bugs=0;
  left.innerText="🧑 "+hpA;
  right.innerText="👩 "+hpO;
  time=30;

  const spawn=setInterval(()=>{
    if(hpA<=0||hpO<=0) return clearInterval(spawn);

    const el=document.createElement("div");
    const good=Math.random()>0.5;

    el.className="card";
    el.innerText=good?"❓":"💬";

    el.style.left=Math.random()*innerWidth+"px";
    el.style.top=Math.random()*innerHeight+"px";

    el.onclick=()=>{
      hpO -= good?1:2;
      updateBoss();
      el.remove();
    };

    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3000);

  },800);

  setInterval(()=>{
    hpA--;
    updateBoss();
  },2500);

  setInterval(()=>{
    legend.style.display="flex";
    setTimeout(()=>{
      legend.style.display="none";
      hpO-=4;
      updateBoss();
    },1000);
  },6000);
}

/* UPDATE BOSS */
function updateBoss(){
  left.innerText="🧑 "+hpA;
  right.innerText="👩 "+hpO;

  if(hpA<=0||hpO<=0){
    finish();
  }
}

/* FINISH */
function finish(){
  victory.style.display="flex";
  victory.innerText =
    hpO<=0?"🏆 АРТЕМ WIN":"💀 ОЛЬГА WIN";
}

/* GAME OVER */
function gameOver(){
  victory.style.display="flex";
  victory.innerText="💀 ПРОД УПАЛ";
}

</script>

</body>
</html>
