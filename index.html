<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM FUN MODE</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  z-index:10;
}

#timer{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:24px;
}

/* ENTITIES */
.entity{
  position:absolute;
  font-size:50px;
  cursor:pointer;
}
.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}

/* CARD */
#card{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:380px;
  background:#111;
  border:2px solid gold;
  padding:20px;
  text-align:center;
  display:none;
  z-index:20;
}

.option{
  margin-top:10px;
  padding:10px;
  border:1px solid #00ff9f;
  cursor:pointer;
}

/* BOSS */
#boss{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  font-size:80px;
  display:none;
  z-index:15;
}

#hp{
  color:red;
  font-size:20px;
}

/* ARTEEM FLOAT TEXT */
.floatText{
  position:fixed;
  font-size:18px;
  color:#00ff9f;
  animation:up 1.2s linear forwards;
  pointer-events:none;
}

@keyframes up{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-80px);opacity:0;}
}

/* END */
#end{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  font-size:40px;
  color:#00ff9f;
}

#infinity{
  font-size:140px;
  display:none;
  animation:spin 3s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0);}
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div id="hud">
  <div id="score">🐻 0</div>
  <div id="level">junior</div>
</div>

<div id="timer">7</div>

<div id="boss">
🐀 ОЛЬГА
<div id="hp">❤️❤️❤️❤️❤️</div>
</div>

<div id="card"></div>

<script>

/* STATE */
let run=false;
let score=0;

let levelIndex=0;
const levels=["junior","middle","senior"];
const speed=[900,600,350];

let time=7;
let spawnInt;
let timerInt;

let bossHp=5;
let qIndex=0;

/* QUESTIONS */
const q=[
"Ты меня любишь?",
"А если я изменюсь?",
"Я идеальная?"
];

/* OPTIONS */
const opts=[
["❤️ да","💨 нет","🍕 пицца"],
["❤️ всегда","😎 да","💨 не знаю"],
["❤️ богиня","🍕 пицца","😎 люблю"]
];

/* 😂 FUNNY ARTEEM RESPONSES */
const funny=[
"ну… давай честно — пицца важнее 😎",
"я программист, я не умею любить, я умею баги 💀",
"ща проверю в проде… ОЙ УПАЛО",
"люблю, но только в staging",
"это зависит от коммита 🤝",
"я нажал случайно, честно"
];

/* START */
window.startGame=()=>{
  run=true;
  document.getElementById("hud").style.display="flex";

  spawn();
  timer();
};

/* SPAWN */
function spawn(){
  clearInterval(spawnInt);

  spawnInt=setInterval(()=>{
    if(!run) return;

    let e=document.createElement("div");

    let type=Math.random()<0.5?"feature":"rat";

    e.className="entity "+type;
    e.innerText=type==="feature"?"🐻":"🐀";

    e.style.left=Math.random()*innerWidth+"px";
    e.style.top=Math.random()*innerHeight+"px";

    e.onclick=()=>{
      score++;
      update();
      showFunny();
      e.remove();
    };

    document.body.appendChild(e);
    setTimeout(()=>e.remove(),2000);

  }, speed[levelIndex]);
}

/* TIMER */
function timer(){
  clearInterval(timerInt);

  timerInt=setInterval(()=>{
    if(!run) return;

    time--;
    document.getElementById("timer").innerText=time;

    if(time<=0){
      nextLevel();
    }

  },1000);
}

/* LEVELS */
function nextLevel(){

  levelIndex++;

  if(levelIndex>=levels.length){
    startBoss();
    return;
  }

  document.getElementById("level").innerText=levels[levelIndex];

  time=7;
}

/* HUD */
function update(){
  document.getElementById("score").innerText="🐻 "+score;
}

/* FUNNY POPUP */
function showFunny(){

  let t=document.createElement("div");
  t.className="floatText";

  t.innerText=funny[Math.floor(Math.random()*funny.length)];

  t.style.left=Math.random()*window.innerWidth+"px";
  t.style.top=Math.random()*window.innerHeight+"px";

  document.body.appendChild(t);

  setTimeout(()=>t.remove(),1200);
}

/* BOSS */
function startBoss(){
  run=false;
  document.getElementById("boss").style.display="block";
  showCard();
}

function hitBoss(){
  bossHp--;

  document.getElementById("hp").innerText=
    "❤️".repeat(Math.max(0,bossHp));

  if(bossHp<=0){
    win();
  }
}

/* CARDS */
function showCard(){

  const c=document.getElementById("card");
  c.style.display="block";

  c.innerHTML="👩 Ольга:<br><br>"+q[qIndex];

  opts[qIndex].forEach(o=>{

    let d=document.createElement("div");
    d.className="option";
    d.innerText=o;

    d.onclick=()=>{

      hitBoss();

      // 😂 Артем отвечает шуткой
      showFunny();

      qIndex++;

      if(qIndex>=q.length){
        win();
        return;
      }

      c.innerHTML="";
      showCard();
    };

    c.appendChild(d);
  });
}

/* END */
function win(){

  document.body.innerHTML+=`
    <div id="end">
      <div>❤️</div>
      <div id="infinity">∞</div>
      <div>LOVE MAX</div>
      <div style="font-size:28px;margin-top:20px">
        🎉 С ДНЕМ РОЖДЕНИЯ АРТЕМ 🎉
      </div>
    </div>
  `;

  setTimeout(()=>{
    document.querySelector("#end > div").style.display="none";
    document.getElementById("infinity").style.display="block";
  },2000);
}

/* START COMMAND */
document.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    if(prompt("type start")?.toLowerCase()==="start"){
      startGame();
    }
  }
});

</script>

</body>
</html>
