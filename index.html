<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM DEBUG MODE</title>
<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}
#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}
#intro{
  position:fixed;
  inset:0;
  padding:30px;
  z-index:10;
  background:black;
}
#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:20px;
  z-index:5;
}
#timerBox{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:24px;
  z-index:6;
}
.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
}
.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}
.option{
  margin-top:10px;
  padding:10px;
  border:1px solid #00ff9f;
  cursor:pointer;
  transition:0.3s;
}
.option:hover{background:#003322;}
#questionCard{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:420px;
  background:#111;
  border:2px solid gold;
  border-radius:12px;
  padding:20px;
  text-align:center;
  display:none;
  z-index:20;
}
#boss{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  font-size:80px;
  text-align:center;
  z-index:15;
  display:none;
  filter:drop-shadow(0 0 20px red);
}
#bossHp{font-size:20px;color:red;}
#heart{font-size:120px;animation:beat 1s infinite;}
@keyframes beat{
  0%{transform:scale(1);}
  50%{transform:scale(1.4);}
  100%{transform:scale(1);}
}
#terminal{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  z-index:30;
  display:flex;
  background:#000;
  border-top:1px solid #00ff9f;
}
#cmd{
  flex:1;
  background:black;
  color:#00ff9f;
  border:none;
  outline:none;
  padding:10px;
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="intro">
<h1>💥 PROD CRASH</h1>
<p>О нет… прод сломался.<br><br>👉 Введите: <b>start</b></p>
</div>

<div id="hud">
  <div id="left">🐻 0</div>
  <div id="right">🐀 0</div>
  <div id="level">junior</div>
</div>

<div id="timerBox">⏱ 7</div>
<div id="boss">🐀 ОЛЬГА БОСС<div id="bossHp">❤️❤️❤️❤️❤️</div></div>
<div id="questionCard"></div>

<div id="terminal">
  <input id="cmd" placeholder="type command..." />
</div>

<script>
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;
const drops=Array(60).fill(1);
setInterval(()=>{
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#00ff9f";
drops.forEach((y,i)=>{
ctx.fillText(Math.random()>0.5?0:1,i*18,y*18);
drops[i]=y*18>c.height?0:y+1;
});},50);

let f=0,b=0,run=false;
let levelIndex=0;
const levels=["junior","middle","senior"];
const levelSpeed=[800,500,250];
let spawnInterval;
let levelInterval;
let t=7;

function startGame(){
intro.style.display="none";
hud.style.display="flex";
run=true;
spawn();
startLevels();
timer();
}

function startLevels(){
levelInterval=setInterval(()=>{
if(!run) return;
levelIndex++;
if(levelIndex>=levels.length) levelIndex=levels.length-1;

level.innerText=levels[levelIndex];
resetSpawn();
t=7;
},7000);
}

function resetSpawn(){
clearInterval(spawnInterval);
spawn();
}

function spawn(){
spawnInterval=setInterval(()=>{
if(!run) return;
let e=document.createElement("div");
let type=Math.random()<0.5?"feature":"rat";
e.className="entity "+type;
e.innerText=type==="feature"?"🐻":"🐀";
e.style.left=Math.random()*innerWidth+"px";
e.style.top=Math.random()*innerHeight+"px";
e.onclick=()=>{
if(type==="feature") f++; else b++;
update();e.remove();
};
document.body.appendChild(e);
setTimeout(()=>e.remove(),2000);
},levelSpeed[levelIndex]);
}

function timer(){
setInterval(()=>{
if(!run) return;
t--;
timerBox.innerText="⏱ "+t;
if(t<=0) startBoss();
},1000);
}

function update(){
left.innerText="🐻 "+f;
right.innerText="🐀 "+b;
}

function startBoss(){
run=false;
boss.style.display="block";
showQ();
}

const q=["А ты меня любишь?","А если я баг?","Я красивая?"];
const a=[
["да ❤️","нет 💀","пицца"],
["конечно","ты фича","краш"],
["лучше всех","ошибка","люблю"]
];

let qi=0;

function showQ(){
const c=questionCard;
c.style.display="block";
c.innerHTML="👩 Ольга:<br><br>"+q[qi];
a[qi].forEach(o=>{
let d=document.createElement("div");
d.className="option";
d.innerText=o;
d.onclick=()=>{
qi++;
if(qi>=q.length) win(); else showQ();
};
c.appendChild(d);
});
}

function win(){
document.body.innerHTML+="<div id='end'><div id='heart'>❤️</div><div>LOVE ∞</div></div>";
}

cmd.onkeydown=e=>{
if(e.key=="Enter"&&cmd.value=="start") startGame();
cmd.value="";
};
</script>
</body>
</html>
