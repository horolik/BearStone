<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>PROD GAME</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  background:black;
  z-index:9999;
}

/* MATRIX */
canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:10px;
  display:none;
  gap:20px;
  z-index:10;
}

/* LEVEL */
#level{
  position:fixed;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  z-index:10;
}

/* RULES */
#rules{
  position:fixed;
  bottom:10px;
  left:10px;
  font-size:12px;
  color:#888;
}

/* ENTITY */
.entity{
  position:absolute;
  font-size:50px;
  cursor:pointer;
}

/* TYPES */
.rat{color:red;}
.feature{color:#00ff9f;}
.anime{color:#ff4dff;}
.kalyan{color:#00ffaa;}

/* BOSS */
#boss{
  position:fixed;
  inset:0;
  display:none;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#box{
  width:400px;
  background:#111;
  padding:20px;
  border:2px solid red;
}
.card{
  border:1px solid #00ff9f;
  margin:5px;
  padding:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="intro">
🚨 PROD SIM 🚨<br><br>
Нажми любую клавишу
</div>

<canvas id="m"></canvas>

<div id="hud">
<div id="prod">PROD: 30%</div>
<div id="happy">HAPPY: 0%</div>
</div>

<div id="level"></div>

<div id="rules">
🐻 x3 = +10% PROD<br>
🐀 x3 miss = -5% PROD<br>
🌸💨 +5% HAPPY / -1% PROD<br>
40 MID | 70 SENIOR | 100 BOSS<br>
PROD < 15 = GAME OVER
</div>

<div id="boss">
<div id="box">
<div id="q"></div>
<div id="a"></div>
</div>
</div>

<script>

/* MATRIX */
const c=document.getElementById("m");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

setInterval(()=>{
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#00ff9f";
ctx.fillText(Math.random()>0.5?0:1,Math.random()*c.width,Math.random()*c.height);
},50);

/* STATE */
let run=false;
let prod=30;
let happy=0;

let bears=0;
let missed=0;

/* START */
document.addEventListener("keydown",()=>{
document.getElementById("intro").style.display="none";
run=true;
start();
});

/* UPDATE */
function update(){

document.getElementById("prod").innerText="PROD: "+Math.round(prod)+"%";
document.getElementById("happy").innerText="HAPPY: "+happy+"%";

if(prod<=15){
alert("💥 GAME OVER");
location.reload();
}

if(happy>=40) document.getElementById("level").innerText="MID";
if(happy>=70) document.getElementById("level").innerText="SENIOR";
if(happy>=100) boss();

}

/* SPAWN */
function start(){

setInterval(()=>{

if(!run) return;

let e=document.createElement("div");
let r=Math.random();
let type="feature";

if(r<0.4) type="rat";
else if(r<0.7) type="feature";
else if(r<0.9) type="anime";
else type="kalyan";

e.className="entity "+type;
e.innerText = type==="rat"?"🐀":type==="feature"?"🐻":type==="anime"?"🌸":"💨";

e.style.left=Math.random()*innerWidth+"px";
e.style.top=Math.random()*innerHeight+"px";

let clicked=false;

e.onclick=()=>{

clicked=true;

if(type==="feature"){
bears++;
if(bears>=3){
prod+=10;
bears=0;
}
}

if(type==="rat"){
// ничего
}

if(type==="anime"||type==="kalyan"){
happy+=5;
prod-=1;
}

update();
e.remove();
};

/* MISS */
setTimeout(()=>{

if(!clicked && type==="rat"){
missed++;
if(missed>=3){
prod-=5;
missed=0;
}
}

e.remove();

},2000);

document.body.appendChild(e);

},600);

}

/* BOSS */
function boss(){

document.getElementById("boss").style.display="flex";

let answers=[
{t:"Это фича",h:0,p:10},
{t:"Я проверил локально",h:5,p:7},
{t:"перезапусти прод",h:0,p:5},
{t:"кальян и обсудим",h:20,p:0},
{t:"аниме объясняет баг",h:25,p:5}
];

function round(){

document.getElementById("q").innerText="Ольга: ты меня любишь?";
let a=document.getElementById("a");
a.innerHTML="";

answers.forEach(x=>{

let d=document.createElement("div");
d.className="card";
d.innerText=x.t;

d.onclick=()=>{

happy+=x.h;
prod-=Math.random()*x.p;

update();
round();

};

a.appendChild(d);

});

}

round();

}

</script>

</body>
</html>
