<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SUPER ARTEEM // PROD DEBUG GAME</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  overflow:hidden;
  color:#00ff9f;
}

#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:20px;
  z-index:9999;
  text-align:center;
  padding:20px;
}

#matrix{
  position:fixed;
  inset:0;
  z-index:0;
}

#console{
  position:fixed;
  inset:0;
  background:black;
  padding:20px;
  display:flex;
  flex-direction:column;
  z-index:10;
}

#terminalHeader{opacity:0.8;margin-bottom:10px;}

#terminalLog{
  flex:1;
  overflow:auto;
  font-size:14px;
}

#terminalInputLine{
  display:flex;
  gap:10px;
  border-top:1px solid #00ff9f;
  padding-top:10px;
}

#cmd{
  flex:1;
  background:black;
  border:none;
  color:#00ff9f;
  outline:none;
  font-size:16px;
}

#hud{
  position:fixed;
  top:10px;
  left:20px;
  right:20px;
  display:none;
  justify-content:space-between;
  font-size:18px;
  z-index:5;
}

#level{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  z-index:5;
}

.entity{
  position:absolute;
  font-size:60px;
  cursor:pointer;
}

.feature{color:#00ff9f;}
.rat{color:#ff4d4d;}
.anime{color:#ff4dff;font-size:70px;text-shadow:0 0 10px #ff4dff;}
.kalyan{color:#00ffaa;font-size:75px;text-shadow:0 0 10px #00ffaa;}

#stats{
  position:fixed;
  top:140px;
  left:20px;
  color:white;
  font-size:14px;
}

#hand{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  height:200px;
  z-index:1000;
}

.card{
  width:140px;
  height:120px;
  background:#111;
  border:2px solid #00ff9f;
  border-radius:10px;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  margin:5px;
}

#bossModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

#bossBox{
  width:420px;
  background:#111;
  border:2px solid red;
  padding:20px;
  text-align:center;
  color:white;
}

#olgaEmotion{
  font-size:20px;
  margin-bottom:10px;
}

</style>
</head>

<body>

<div id="intro">
🚨 PROD УПАЛ 🚨<br><br>
🐀 БАГИ — кликай<br>
🐻 ФИЧИ — кликай<br><br>
👉 нажми любую клавишу
</div>

<canvas id="matrix"></canvas>

<div id="console">
  <div id="terminalHeader">SYSTEM TERMINAL</div>
  <div id="terminalLog">> start</div>
  <div id="terminalInputLine">
    ><input id="cmd">
  </div>
</div>

<div id="hud">
  <div id="left">🐻 0</div>
  <div id="right">🐀 0</div>
</div>

<div id="level"></div>

<div id="stats">
HP: <span id="hp">100</span> |
HAPPY: <span id="happy">0</span>
</div>

<div id="hand"></div>

<div id="bossModal">
  <div id="bossBox">
    <div id="olgaEmotion">😐 Ольга смотрит...</div>
    <div id="olgaQ"></div>
    <div id="answers"></div>
  </div>
</div>

<script>

/* ================= ORIGINAL STATE ================= */

let f=0,b=0,lvl=0,run=false;
let hp=100;
let happy=0;
let bossHP=100;

/* ================= MATRIX ================= */

const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff9f";
  ctx.fillText(Math.random()>0.5?0:1,Math.random()*c.width,Math.random()*c.height);
},50);

/* ================= LEVELS ================= */

const levels=[
  {name:"JUNIOR",goal:4},
  {name:"MIDDLE",goal:6},
  {name:"SENIOR",goal:8}
];

/* ================= OLGA SYSTEM (NEW) ================= */

const olgaQuestions = [
  "Ты тестировал это вообще?",
  "Почему это опять упало?",
  "Это баг или фича?",
  "Кто это задеплоил?",
  "Почему прод горит?"
];

function getOlgaQuestion(){
  return olgaQuestions[Math.floor(Math.random()*olgaQuestions.length)];
}

function applyOlgaAnswer(a){
  bossHP -= a.d;
  hp -= Math.floor(Math.random()*8);
  happy += (a.h||0);
  update();
}

/* ================= CMD ================= */

const cmd=document.getElementById("cmd");

cmd.onkeydown=(e)=>{
if(e.key!=="Enter") return;

if(cmd.value==="start"){
  run=true;
  document.getElementById("console").style.display="none";
  document.getElementById("hud").style.display="flex";
  next();
}

cmd.value="";
};

/* ================= GAME ================= */

function next(){

if(lvl>=levels.length){
  boss();
  return;
}

document.getElementById("level").innerText="LEVEL: "+levels[lvl].name;

setInterval(()=>{

if(!run) return;

let e=document.createElement("div");
let r=Math.random();
let type="feature";

if(r<0.4) type="rat";
if(r>0.75) type="anime";
if(r>0.88) type="kalyan";

e.className="entity "+type;

e.innerText=type==="rat"?"🐀":type==="feature"?"🐻":type==="anime"?"🌸":"💨";

e.style.left=Math.random()*innerWidth+"px";
e.style.top=Math.random()*innerHeight+"px";

e.onclick=()=>{

if(type==="rat") b++;
if(type==="feature") f++;

if(type==="anime") happy+=25;
if(type==="kalyan") happy+=40;

update();

e.remove();

if(f>=levels[lvl].goal){
  lvl++;
  next();
}

};

document.body.appendChild(e);
setTimeout(()=>e.remove(),2000);

},600);
}

function update(){
document.getElementById("left").innerText="🐻 "+f;
document.getElementById("right").innerText="🐀 "+b;
document.getElementById("hp").innerText=hp;
document.getElementById("happy").innerText=happy;
}

/* ================= CARDS ================= */

const answers=[
{t:"Это фича",d:10,h:0},
{t:"Я проверил локально",d:7,h:5},
{t:"перезапусти прод",d:5,h:0},
{t:"кальян и обсудим",d:0,h:20},
{t:"аниме объясняет баг",d:5,h:25}
];

/* ================= BOSS ================= */

function boss(){
document.getElementById("bossModal").style.display="flex";
nextRound();
}

function nextRound(){

if(hp<=0 || bossHP<=0){
  end();
  return;
}

document.getElementById("olgaQ").innerText =
"🐀 Ольга: " + getOlgaQuestion();

let box=document.getElementById("answers");
box.innerHTML="";

answers.forEach(a=>{

let c=document.createElement("div");
c.className="card";
c.innerText=a.t;

c.onclick=()=>{

applyOlgaAnswer(a);
nextRound();

};

box.appendChild(c);

});

}

/* ================= EMOTION ================= */

function setOlgaMood(){

let e=document.getElementById("olgaEmotion");

if(bossHP<30) e.innerText="😱 Ольга паникует!";
else if(hp<40) e.innerText="😡 Ольга злится!";
else if(bossHP>80) e.innerText="😊 Ольга радуется!";
else e.innerText="😐 Ольга смотрит...";

}

/* ================= END ================= */

function end(){
document.getElementById("bossBox").innerHTML="🎉 ПОБЕДА 🎉";
}

</script>
</body>
</html>
