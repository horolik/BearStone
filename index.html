<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Bear Debug System 🐻</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: black;
  color: #00ff9f;
  overflow: hidden;
}

/* MATRIX */
#matrix {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* HUD */
#hud {
  position: fixed;
  top: 10px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
  font-size: 20px;
  z-index: 10;
}

/* LEAD */
#lead {
  position: fixed;
  bottom: 10px;
  left: 20px;
  z-index: 10;
  max-width: 60%;
}

/* TERMINAL */
#terminal {
  position: fixed;
  inset: 0;
  background: black;
  color: #00ff9f;
  padding: 20px;
  z-index: 3;
}

#terminalText { white-space: pre-line; }

/* INTRO */
#intro {
  display: none;
  position: fixed;
  inset: 0;
  background: black;
  padding: 20px;
  z-index: 4;
}

/* GAME */
#app {
  display: none;
  padding: 20px;
  z-index: 2;
}

/* ENTITIES */
.bug {
  position: absolute;
  font-size: 48px;
  cursor: pointer;
  z-index: 5;
}

.feature { color: #00ff9f; }
.rat { color: #ff4d4d; }
.danger { filter: drop-shadow(0 0 10px red); }

/* ANIM */
.fly-right { animation: right 0.5s forwards; }
.fly-left { animation: left 0.5s forwards; }

@keyframes right {
  to { transform: translateX(300px) scale(0.5); opacity: 0; }
}
@keyframes left {
  to { transform: translateX(-300px) scale(0.5); opacity: 0; }
}

/* SHAKE */
@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(5px,-5px); }
  50% { transform: translate(-5px,5px); }
  75% { transform: translate(5px,5px); }
  100% { transform: translate(0,0); }
}
.shake { animation: shake 0.2s infinite; }

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="hud">
  <div id="features">🐻 0</div>
  <div id="bugs">🐀 0</div>
  <div id="timer">⏳ 0</div>
</div>

<div id="terminal">
  <div id="terminalText"></div>
</div>

<div id="intro">
  <h2>DEBUG SYSTEM</h2>

  <select id="diff">
    <option value="junior">Junior</option>
    <option value="middle" selected>Middle</option>
    <option value="senior">Senior</option>
  </select>

  <button id="start">START</button>
</div>

<div id="app">
  <div id="lead"></div>
  <button id="release" style="display:none;">🚀 RELEASE</button>
  <div id="log"></div>
</div>

<script>

/* ===== STATE ===== */
let features=0, bugs=0, missed=0;
let time=0;
let settings={};

let gameRunning=false;

let spawnLoopId=null;
let timerId=null;
let leadId=null;

/* ===== CONFIG ===== */
const cfg={
 junior:{spawn:850,danger:0.08,goal:4,time:40,miss:5},
 middle:{spawn:600,danger:0.18,goal:6,time:30,miss:4},
 senior:{spawn:380,danger:0.30,goal:9,time:22,miss:3}
};

const phrases=[
"Где фичи?",
"Мы горим 🔥",
"Клиент пишет..."
];

const code=[
"if(bugs>features){deploy();}",
"console.log('works')",
"try{release()}catch(e){}"
];

/* ===== MATRIX ===== */
const c=document.getElementById("matrix");
const x=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

const d=Array(120).fill(1);

setInterval(()=>{
x.fillStyle="rgba(0,0,0,0.05)";
x.fillRect(0,0,c.width,c.height);
x.fillStyle="#00ff9f";

d.forEach((y,i)=>{
x.fillText(Math.random()>0.5?0:1,i*14,y*14);
d[i]=y*14>c.height?0:y+1;
});
},40);

/* ===== TERMINAL ===== */
document.getElementById("terminalText").innerText =
"Boot...\nType START";

/* ===== CLEANUP ===== */
function stopAll(){
  gameRunning=false;

  clearTimeout(spawnLoopId);
  clearInterval(timerId);
  clearInterval(leadId);

  document.querySelectorAll(".bug").forEach(e=>e.remove());
}

/* ===== START ===== */
document.getElementById("start").onclick=()=>{
  stopAll();

  settings=cfg[document.getElementById("diff").value];
  time=settings.time;

  features=0;
  bugs=0;
  missed=0;

  document.getElementById("intro").style.display="none";
  document.getElementById("app").style.display="block";

  gameRunning=true;

  spawn();
  timer();
  lead();
};

/* ===== SPAWN (SAFE LOOP) ===== */
function spawn(){
  if(!gameRunning) return;

  spawnEntity();

  const speed=1+(1-time/settings.time);
  const delay=settings.spawn/speed;

  spawnLoopId=setTimeout(spawn,delay);
}

/* ===== ENTITY ===== */
function spawnEntity(){
  const e=document.createElement("div");

  const r=Math.random();
  let type;

  if(r>0.6)type="feature";
  else if(r>settings.danger)type="rat";
  else type="danger";

  e.className="bug "+type;
  e.innerText=type=="feature"?"🐻":"🐀";

  e.style.left=Math.random()*innerWidth+"px";
  e.style.top=Math.random()*innerHeight+"px";

  let c=0;

  e.onclick=()=>{
    c++;

    if(type=="danger" && c<2){
      e.style.transform="scale(1.4)";
      return;
    }

    if(type=="feature"){
      features++;
      e.classList.add("fly-right");
    } else {
      bugs++;
      e.classList.add("fly-left");
    }

    update();
    setTimeout(()=>e.remove(),500);
  };

  document.body.appendChild(e);

  setTimeout(()=>{
    if(document.body.contains(e)){
      if(type!="feature"){
        missed++;
        shake();

        if(missed>=settings.miss){
          gameOver("💣 PROD DOWN");
        }
      }
      e.remove();
    }
  },2000);
}

/* ===== TIMER ===== */
function timer(){
  timerId=setInterval(()=>{
    if(!gameRunning) return;

    time--;
    document.getElementById("timer").innerText="⏳ "+time;

    if(time<=0){
      finish();
    }
  },1000);
}

/* ===== LEAD ===== */
function lead(){
  leadId=setInterval(()=>{
    if(!gameRunning) return;

    let m;

    if(bugs>features)m="❌ BUGS>FEATURES";
    else if(time<10)m="⏳ DEADLINE";
    else if(Math.random()<0.3)m=code[Math.random()*code.length|0];
    else m=phrases[Math.random()*phrases.length|0];

    document.getElementById("lead").innerText="🧑‍💼 "+m;
  },2500);
}

/* ===== HUD ===== */
function update(){
  document.getElementById("features").innerText="🐻 "+features;
  document.getElementById("bugs").innerText="🐀 "+bugs;

  if(features>=settings.goal){
    document.getElementById("release").style.display="block";
  }
}

/* ===== SHAKE ===== */
function shake(){
  document.body.classList.add("shake");
  setTimeout(()=>document.body.classList.remove("shake"),300);
}

/* ===== GAME OVER ===== */
function gameOver(r){
  stopAll();
  document.body.classList.add("shake");

  document.getElementById("log").innerText=r+"\n💀 FAIL";
}

/* ===== FINISH ===== */
function finish(){
  stopAll();

  let r=bugs>features?"📉 FAIL":"🚀 OK";

  document.getElementById("log").innerText=
r+"\n🐻 "+features+"\n🐀 "+bugs;
}

/* ===== RELEASE ===== */
document.getElementById("release").onclick=finish;

</script>

</body>
</html>
